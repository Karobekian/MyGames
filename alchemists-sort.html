<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Alchemist's Sort</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height:100%; }
body {
  font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
  color:#eadcff;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  overflow-x:hidden;
  background:#0a0720;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
}
#stars { position:fixed; inset:0; z-index:-2; display:block; }
#bg { position:fixed; inset:0; z-index:-1;
  background:radial-gradient(ellipse 90% 60% at 50% 6%, rgba(96,54,168,.55) 0%, rgba(40,20,90,.25) 38%, rgba(8,5,26,0) 72%);
  pointer-events:none; }

/* ---- Header ---- */
h1 {
  font-size:clamp(1.3rem, 3.4vw, 2.6rem);
  font-weight:800; color:#f0e2ff; letter-spacing:.06em;
  padding:clamp(10px,2.2vh,26px) 20px 2px; text-align:center;
  text-shadow:0 0 22px rgba(180,120,255,.6), 0 2px 0 rgba(60,20,120,.5);
}
#sub { font-size:clamp(.62rem,1.4vw,1rem); color:#9a7fd0; text-align:center;
  padding-bottom:4px; font-style:italic; letter-spacing:.04em; }

/* ---- HUD ---- */
#hud { display:flex; gap:clamp(8px,1.6vw,20px); flex-wrap:wrap; justify-content:center; margin:6px 0 4px; }
.hs {
  background:linear-gradient(180deg, rgba(150,100,255,.14), rgba(90,50,180,.08));
  border:1px solid rgba(170,120,255,.30);
  border-radius:12px; padding:clamp(4px,1vh,10px) clamp(11px,2vw,22px);
  font-size:clamp(.56rem,1.2vw,.9rem); color:#c4a9f0; text-align:center;
  min-width:clamp(58px,10vw,120px); text-transform:uppercase; letter-spacing:.08em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.hs span { display:block; font-size:clamp(.95rem,2.3vw,1.7rem); color:#f2e6ff; font-weight:800; letter-spacing:0; }

/* ---- Tool buttons ---- */
#actions { display:flex; gap:clamp(6px,1.4vw,16px); flex-wrap:wrap; justify-content:center; margin:6px 0 6px; }
.btn {
  font-family:inherit; font-weight:700;
  font-size:clamp(.62rem,1.3vw,1rem); letter-spacing:.05em;
  padding:clamp(8px,1.4vh,15px) clamp(13px,2.2vw,28px);
  border-radius:14px; border:1px solid; cursor:pointer;
  text-transform:uppercase;
  background:linear-gradient(180deg, rgba(30,18,60,.9), rgba(16,9,36,.95));
  color:inherit; transition:transform .08s ease, box-shadow .15s ease, opacity .15s;
  box-shadow:0 3px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.10);
  min-height:44px;
}
.btn:active { transform:translateY(2px) scale(.97); }
.btn:disabled { opacity:.4; cursor:default; }
.btn-undo   { border-color:#c98a3a; color:#ffcb70; }
.btn-shuf   { border-color:#8a5bd6; color:#c9a6ff; }
.btn-add    { border-color:#3aa878; color:#78ffbe; }
.btn-new    { border-color:#c8446a; color:#ff7f9e; }

/* ---- Board ---- */
#board {
  display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-end;
  gap:clamp(10px,2vw,34px) clamp(8px,1.8vw,28px);
  padding:6px clamp(8px,2vw,30px) 40px;
  max-width:1500px; width:100%;
  position:relative; z-index:1;
}
.tw { display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; position:relative; z-index:2; }
.tlbl { font-size:clamp(.5rem,1vw,.8rem); color:#6a4f9c; letter-spacing:.1em; }

.tw.shake { animation:shk .34s ease; }
@keyframes shk {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px) rotate(-2.5deg);}
  40%{transform:translateX(8px) rotate(2.5deg);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}

#fly-tube { position:fixed; top:0; left:0; pointer-events:none; z-index:900; display:none;
  transform-origin:50% 0%; }
#stream-canvas { position:fixed; top:0; left:0; pointer-events:none; z-index:850; display:none; }

/* ---- Win overlay ---- */
#ov { display:none; position:fixed; inset:0; z-index:999;
  background:radial-gradient(ellipse at 50% 40%, rgba(60,30,120,.92), rgba(6,4,20,.97));
  flex-direction:column; align-items:center; justify-content:center; gap:clamp(14px,3vh,32px); }
#ov.show { display:flex; animation:fade .35s ease; }
@keyframes fade { from{opacity:0;} to{opacity:1;} }
#ov h2 { font-size:clamp(1.7rem,5vw,3.8rem); color:#f4e8ff; text-align:center; font-weight:800;
  text-shadow:0 0 30px rgba(190,130,255,.8); }
#ov p { color:#b7a2e0; font-size:clamp(.9rem,2vw,1.4rem); text-align:center; max-width:80%; font-style:italic; }

#toast { position:fixed; bottom:clamp(16px,4vh,50px); left:50%;
  transform:translateX(-50%) translateY(90px);
  background:rgba(20,10,44,.97); border:1px solid #9a63e0;
  color:#e0ccff; padding:clamp(8px,1.4vh,16px) clamp(18px,3vw,34px); border-radius:12px;
  font-size:clamp(.72rem,1.6vw,1.15rem); z-index:700; white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  transition:transform .24s cubic-bezier(.34,1.4,.5,1); }
#toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="bg"></div>

<h1>&#9877; ALCHEMIST'S SORT</h1>
<p id="sub">Tap a bottle, then tap where to pour</p>

<div id="hud">
  <div class="hs">Level<span id="sl">1</span></div>
  <div class="hs">Moves<span id="sm">0</span></div>
  <div class="hs">Sorted<span id="sd">0/0</span></div>
</div>

<div id="actions">
  <button class="btn btn-undo" onclick="undoMove()">&#8617; Undo</button>
  <button class="btn btn-shuf" onclick="shuffleBottles()">&#128256; Shuffle</button>
  <button class="btn btn-add" id="bex" onclick="addVial()">&#43; Bottle</button>
  <button class="btn btn-new" onclick="restart()">&#10227; Restart</button>
</div>

<div id="board"></div>

<canvas id="fly-tube"></canvas>
<canvas id="stream-canvas"></canvas>

<div id="ov">
  <h2 id="ovh">&#10022; LEVEL COMPLETE &#10022;</h2>
  <p id="ovm"></p>
  <button class="btn btn-add" id="ovbtn" style="font-size:clamp(1rem,2.4vw,1.5rem);padding:clamp(12px,2vh,20px) clamp(26px,5vw,50px)" onclick="ovAction()">Next Level</button>
</div>
<div id="toast"></div>

<script>
"use strict";
// ═══════════════════════════════════════════════
// PALETTE — vivid glossy Magic-Sort colors
// ═══════════════════════════════════════════════
var PAL = [
  {id:'RED',    hi:'#ff4d5e', mid:'#e01230', lo:'#7a0014', r:230,g:30, b:55,  name:'RED'},
  {id:'ORANGE', hi:'#ffb03a', mid:'#f36a12', lo:'#8a3600', r:245,g:120,b:20,  name:'ORANGE'},
  {id:'YELLOW', hi:'#ffe94d', mid:'#ecc21a', lo:'#7a6200', r:245,g:220,b:35,  name:'YELLOW'},
  {id:'LIME',   hi:'#9dff45', mid:'#4fce14', lo:'#1f5c00', r:110,g:210,b:35,  name:'LIME'},
  {id:'GREEN',  hi:'#3dffb0', mid:'#0fbf7a', lo:'#00543a', r:20, g:200,b:130, name:'GREEN'},
  {id:'CYAN',   hi:'#45ecff', mid:'#12b6cf', lo:'#004e5c', r:30, g:200,b:220, name:'CYAN'},
  {id:'BLUE',   hi:'#5b8bff', mid:'#1e46d6', lo:'#001a7a', r:60, g:100,b:230, name:'BLUE'},
  {id:'VIOLET', hi:'#d06bff', mid:'#9a24d6', lo:'#42005c', r:185,g:60, b:230, name:'VIOLET'},
  {id:'MAGENTA',hi:'#ff5bd0', mid:'#d612a0', lo:'#5c0040', r:245,g:40, b:180, name:'MAGENTA'}
];

// ═══════════════════════════════════════════════
// VESSEL SHAPES — corked bottle + tall test-tube
// Geometry in a normalized CW x CH unit box; canvas is
// scaled up via ctx.setTransform for crispness at any size.
// ═══════════════════════════════════════════════
var CW = 60, CH = 260;
var TS = 4;              // segments per full vessel (per level)

function makeVessel(kind){
  var cx = CW/2;
  if(kind==='tube'){
    var tw=36, tx=cx-tw/2, r=tw/2;
    var yb = CH - r - 4, yt = 14, ch = yb - yt;
    return {
      kind:'tube', cx:cx, yBottom:yb, yTop:yt, segH:ch/TS, hasCork:false, mouthY:10,
      widthAt:function(){return tw;}, leftAt:function(){return tx;},
      path:function(ctx){
        ctx.beginPath();
        ctx.moveTo(tx, yt);
        ctx.arcTo(tx, 4, cx, 4, 8);
        ctx.arcTo(tx+tw, 4, tx+tw, yt, 8);
        ctx.lineTo(tx+tw, yb);
        ctx.arc(cx, yb, r, 0, Math.PI, false);
        ctx.lineTo(tx, yt);
        ctx.closePath();
      }
    };
  }
  // bottle (default) — rounded body, tapered shoulder, neck + cork
  var bodyW=50, bx=cx-bodyW/2, neckW=22, nx=cx-neckW/2;
  var byb=CH-8, yt2=98, ch2=byb-yt2, br=11;
  return {
    kind:'bottle', cx:cx, yBottom:byb, yTop:yt2, segH:ch2/TS, hasCork:false, mouthY:24,
    widthAt:function(){return bodyW;}, leftAt:function(){return bx;},
    path:function(ctx){
      ctx.beginPath();
      ctx.moveTo(nx, 32);
      ctx.lineTo(nx, 60);
      ctx.quadraticCurveTo(bx, 78, bx, 96);
      ctx.lineTo(bx, byb-br);
      ctx.arcTo(bx, byb, bx+br, byb, br);
      ctx.lineTo(bx+bodyW-br, byb);
      ctx.arcTo(bx+bodyW, byb, bx+bodyW, byb-br, br);
      ctx.lineTo(bx+bodyW, 96);
      ctx.quadraticCurveTo(bx+bodyW, 78, nx+neckW, 60);
      ctx.lineTo(nx+neckW, 32);
      ctx.closePath();
    }
  };
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var vials=[], shapes=[];
var sel=null, moves=0, extras=1, level=1;
var hist=[], done=[], busy=false;
var flyRAF=0;
var fillIdx=-1, fillBase=null, fillColor=null, fillFrac=0, fillSegs=0;
var wobble={};
var bubbles=[], bubbleRAF=0, lastBub=0;
var sealing={};                                 // indices whose cork is mid-drop
var CUR_DS=1;                                  // current display scale
var PXR=Math.min(window.devicePixelRatio||1, 2);

function isDone(i){ for(var j=0;j<done.length;j++) if(done[j]===i) return true; return false; }

// ═══════════════════════════════════════════════
// LEVEL CONFIG
// ═══════════════════════════════════════════════
function colorsForLevel(L){ return Math.min(9, 4 + Math.floor((L-1)/2)); }
function segsForLevel(L){ return L<4 ? 4 : (L<7 ? 5 : 6); }
function emptiesForLevel(L){ return 2; }                   // buffer bottles
function shapeForLevel(L){ return L>=5 ? 'tube' : 'bottle'; }

function restart(){ level=1; document.getElementById('ov').className=''; buildLevel(); }

function buildLevel(){
  cancelAnimationFrame(flyRAF);
  hideStream();
  document.getElementById('fly-tube').style.display='none';

  TS = segsForLevel(level);
  var nc = colorsForLevel(level), ne = emptiesForLevel(level);
  var kind = shapeForLevel(level);
  moves=0; extras=1; sel=null; hist=[]; done=[]; busy=false;
  fillIdx=-1; fillBase=null; fillColor=null; fillFrac=0; fillSegs=0;
  wobble={}; sealing={};
  document.getElementById('ov').className='';

  var pal = shuffle(PAL.slice()).slice(0, nc);
  var pool=[];
  for(var pi=0; pi<pal.length; pi++)
    for(var si=0; si<TS; si++) pool.push(pal[pi].id);

  // shuffle until not already solved
  do { pool = shuffle(pool); } while(isTriviallySolved(pool, nc));

  vials=[];
  for(var i=0;i<nc;i++) vials.push(pool.slice(i*TS,(i+1)*TS));
  for(var e=0;e<ne;e++) vials.push([]);
  vials = shuffle(vials);

  shapes=[];
  for(var v=0;v<vials.length;v++) shapes.push(makeVessel(kind));

  initBubbles();
  updateHUD(); render();
  if(!bubbleRAF) bubbleRAF=requestAnimationFrame(bubbleTick);
}

function isTriviallySolved(pool, nc){
  for(var i=0;i<nc;i++){
    var base=pool[i*TS];
    for(var j=1;j<TS;j++) if(pool[i*TS+j]!==base) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════
// BUBBLES
// ═══════════════════════════════════════════════
function initBubbles(){ bubbles=[]; for(var i=0;i<vials.length;i++) bubbles.push([]); }
function seedBubble(i){
  var sh=shapes[i]; if(!sh) return;
  var n=vials[i].length; if(n<=0) return;
  var surfaceY=sh.yBottom - n*sh.segH;
  var y=sh.yBottom - Math.random()*(sh.yBottom-surfaceY);
  var halfW=sh.widthAt(y)/2 - 3;
  var x=sh.cx + (Math.random()*2-1)*halfW;
  bubbles[i].push({x:x,y:y,r:0.9+Math.random()*1.8,sp:0.18+Math.random()*0.4,life:0});
}
function bubbleTick(ts){
  if(!lastBub) lastBub=ts;
  var dt=ts-lastBub; lastBub=ts;
  for(var i=0;i<vials.length;i++){
    if(vials[i].length>0 && !isDone(i) && Math.random()<0.02) seedBubble(i);
    var arr=bubbles[i]; if(!arr) continue;
    var sh=shapes[i];
    var surfaceY=sh.yBottom - vials[i].length*sh.segH;
    for(var b=arr.length-1;b>=0;b--){
      arr[b].y -= arr[b].sp*(dt/16);
      arr[b].life += dt;
      if(arr[b].y<=surfaceY+2 || arr[b].life>4000) arr.splice(b,1);
    }
  }
  for(var i2=0;i2<vials.length;i2++){
    if(i2===fillIdx) continue;
    var hasB=bubbles[i2] && bubbles[i2].length>0;
    var hasW=wobble[i2]!==undefined;
    if(hasB||hasW){
      var w=getWrap(i2);
      if(w){var c=w.querySelector('canvas'); if(c) drawVessel(c.getContext('2d'),i2);}
      if(hasW && (ts-wobble[i2].t0)>650) delete wobble[i2];
    }
  }
  bubbleRAF=requestAnimationFrame(bubbleTick);
}

// ═══════════════════════════════════════════════
// SORT LOGIC (preserved from original)
// ═══════════════════════════════════════════════
function topOf(v){ return v.length?v[v.length-1]:null; }
function canPour(f,t){
  if(f===t||!vials[f].length||vials[t].length>=TS) return false;
  var tt=topOf(vials[t]);
  return tt===null||tt===topOf(vials[f]);
}
function numPour(f){
  if(!vials[f].length) return 0;
  var c=topOf(vials[f]),n=0;
  for(var i=vials[f].length-1;i>=0;i--){ if(vials[f][i]===c) n++; else break; }
  return n;
}
function isComp(v){
  if(v.length!==TS) return false;
  for(var i=1;i<v.length;i++) if(v[i]!==v[0]) return false;
  return true;
}
function checkWin(){
  for(var i=0;i<vials.length;i++) if(vials[i].length>0 && !isComp(vials[i])) return false;
  return true;
}
function cloneVials(){ var out=[]; for(var i=0;i<vials.length;i++) out.push(vials[i].slice()); return out; }
function commitPour(f,t){
  var act=Math.min(numPour(f), TS-vials[t].length);
  for(var i=0;i<act;i++) vials[t].push(vials[f].pop());
  moves++;
}

// ═══════════════════════════════════════════════
// CLICK
// ═══════════════════════════════════════════════
function clickTube(idx){
  if(busy) return;
  if(sel===null){
    if(!vials[idx].length){ toast('Empty bottle.'); return; }
    if(isDone(idx)){ toast('Bottle is sealed.'); return; }
    sel=idx; render(); return;
  }
  if(sel===idx){ sel=null; render(); return; }
  if(canPour(sel,idx)){
    var f=sel,t=idx; sel=null; startPour(f,t);
  } else {
    if(vials[idx].length && !isDone(idx)){ sel=idx; render(); }
    else { doShake(idx); sel=null; render(); }
  }
}

function undoMove(){
  if(busy) return;
  if(!hist.length){ toast('Nothing to undo.'); return; }
  vials=hist.pop(); sel=null; moves=Math.max(0,moves-1);
  done=[]; for(var i=0;i<vials.length;i++) if(isComp(vials[i])) done.push(i);
  updateHUD(); render();
}
function addVial(){
  if(busy) return;
  if(extras<=0){ toast('No extra bottles left.'); return; }
  extras--;
  vials.push([]);
  shapes.push(makeVessel(shapeForLevel(level)));
  bubbles.push([]);
  sel=null; updateHUD(); render();
}
function shuffleBottles(){
  if(busy) return;
  var order=[]; for(var i=0;i<vials.length;i++) order.push(i);
  shuffle(order);
  var nv=[],ns=[],nb=[],map={};
  for(var k=0;k<order.length;k++){
    nv.push(vials[order[k]]); ns.push(shapes[order[k]]); nb.push(bubbles[order[k]]); map[order[k]]=k;
  }
  vials=nv; shapes=ns; bubbles=nb;
  var nd=[]; for(var d=0;d<done.length;d++) nd.push(map[done[d]]); done=nd;
  sel=null; render(); toast('Bottles rearranged');
}
function doShake(idx){
  var el=getWrap(idx); if(!el) return;
  el.className='tw'; void el.offsetWidth;
  el.className='tw shake';
  setTimeout(function(){ el.className='tw'; }, 380);
}

// ═══════════════════════════════════════════════
// POUR ANIMATION (tilt + arcing stream + splash + fill)
// ═══════════════════════════════════════════════
function startPour(f, t){
  busy=true;
  hist.push(cloneVials());
  if(hist.length>60) hist.shift();

  var col=getPal(topOf(vials[f]));
  var fEl=getWrap(f), tEl=getWrap(t);
  if(!col||!fEl||!tEl){ commitPour(f,t); finishPour(f,t); return; }

  var fCV=fEl.querySelector('canvas'), tCV=tEl.querySelector('canvas');
  var fR=fCV.getBoundingClientRect(), tR=tCV.getBoundingClientRect();
  var pxW=fR.width, pxH=fR.height;

  fCV.style.visibility='hidden';

  var numSegs=Math.min(numPour(f), TS-vials[t].length);
  fillIdx=t; fillBase=vials[t].slice(); fillColor=topOf(vials[f]);
  fillSegs=numSegs; fillFrac=0;
  drawVessel(tCV.getContext('2d'), t);

  // rotate around the source vessel's MOUTH so the pour stream stays glued to it
  var sh=shapes[f];
  var originXcss=(sh.cx/CW)*pxW, originYcss=(sh.mouthY/CH)*pxH;

  var fly=document.getElementById('fly-tube');
  fly.width=Math.round(CW*CUR_DS*PXR); fly.height=Math.round(CH*CUR_DS*PXR);
  fly.style.width=pxW+'px'; fly.style.height=pxH+'px';
  fly.style.display='block';
  fly.style.transformOrigin=originXcss+'px '+originYcss+'px';
  fly.style.left=fR.left+'px'; fly.style.top=fR.top+'px';
  fly.style.transform='rotate(0deg)';
  drawVessel(fly.getContext('2d'), f);

  var destCX=tR.left+tR.width*0.5, srcCX=fR.left+fR.width*0.5;
  var goLeft=destCX<=srcCX;
  var tiltDeg=goLeft?-78:78;
  // hover the mouth just above and slightly to the near side of the destination
  var mouthTargetX=destCX+(goLeft? pxW*0.18 : -pxW*0.18);
  var mouthTargetY=tR.top - pxH*0.12;
  var hoverLeft=mouthTargetX-originXcss, hoverTop=mouthTargetY-originYcss;
  var streamSrcX=mouthTargetX, streamSrcY=mouthTargetY, streamDstX=destCX;
  var scaleY=tR.height/CH;
  var tShape=shapes[t];

  var sc=document.getElementById('stream-canvas');
  sc.width=window.innerWidth; sc.height=window.innerHeight;
  sc.style.width=window.innerWidth+'px'; sc.style.height=window.innerHeight+'px';
  sc.style.display='none';

  var startTs=null;
  var T_MOVE=340, T_TILT=210, T_POUR=260+fillSegs*120, T_RETURN=240;
  var TOTAL=T_MOVE+T_TILT+T_POUR+T_RETURN;

  function destSurfaceY(filledSegs){
    var topSeg=fillBase.length+filledSegs;
    var segTopCanvas=tShape.yBottom - topSeg*tShape.segH;
    return tR.top + segTopCanvas*scaleY;
  }

  function frame(ts){
    if(!startTs) startTs=ts;
    var e=ts-startTs;
    var p, angle, alpha, landY;

    if(e<T_MOVE){
      p=easeInOut(e/T_MOVE);
      var cx=fR.left+(hoverLeft-fR.left)*p;
      var cy=fR.top +(hoverTop -fR.top )*p;
      cy-=Math.sin(p*Math.PI)*Math.max(46, pxH*0.4);
      fly.style.left=cx+'px'; fly.style.top=cy+'px';
      fly.style.transform='rotate(0deg)';
      sc.style.display='none';

    } else if(e<T_MOVE+T_TILT){
      p=easeOut((e-T_MOVE)/T_TILT);
      angle=tiltDeg*p;
      fly.style.left=hoverLeft+'px'; fly.style.top=hoverTop+'px';
      fly.style.transform='rotate('+angle+'deg)';
      alpha=p<0.55?0:((p-0.55)/0.45);
      if(alpha>0){ sc.style.display='block'; landY=destSurfaceY(0);
        drawStream(sc,streamSrcX,streamSrcY,streamDstX,landY,col,fillSegs,alpha,ts);
      } else sc.style.display='none';

    } else if(e<T_MOVE+T_TILT+T_POUR){
      fly.style.left=hoverLeft+'px'; fly.style.top=hoverTop+'px';
      fly.style.transform='rotate('+tiltDeg+'deg)';
      var dp=(e-T_MOVE-T_TILT)/T_POUR; if(dp>1)dp=1;
      var drained=Math.floor(dp*fillSegs+0.0001);
      drawVesselDrained(fly.getContext('2d'), f, drained);
      fillFrac=dp*fillSegs;
      drawVessel(tCV.getContext('2d'), t);
      sc.style.display='block';
      landY=destSurfaceY(Math.floor(fillFrac));
      drawStream(sc,streamSrcX,streamSrcY,streamDstX,landY,col,fillSegs,1.0,ts);

    } else if(e<TOTAL){
      p=easeInOut((e-T_MOVE-T_TILT-T_POUR)/T_RETURN);
      angle=tiltDeg*(1-p);
      fly.style.left=hoverLeft+'px'; fly.style.top=hoverTop+'px';
      fly.style.transform='rotate('+angle+'deg)';
      fillFrac=fillSegs;
      alpha=1-p;
      if(alpha>0.02){ sc.style.display='block'; landY=destSurfaceY(fillSegs);
        drawStream(sc,streamSrcX,streamSrcY,streamDstX,landY,col,fillSegs,alpha,ts);
      } else sc.style.display='none';

    } else {
      fly.style.display='none';
      fCV.style.visibility='visible';
      hideStream();
      fillIdx=-1; fillBase=null; fillColor=null; fillFrac=0; fillSegs=0;
      commitPour(f,t);
      wobble[t]={t0:performance.now(), amp:3.4};
      finishPour(f,t);
      return;
    }
    flyRAF=requestAnimationFrame(frame);
  }
  flyRAF=requestAnimationFrame(frame);
}

function drawStream(sc, sx, sy, dx, dy, col, segs, alpha, ts){
  var ctx=sc.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,sc.width,sc.height);
  if(alpha<=0) return;
  if(dy<sy) dy=sy+4;

  var S=CUR_DS;
  var sw=(4+segs*1.3)*Math.max(0.9,S*0.85);
  var midX=sx+4*S, midY=(sy+dy)*0.5;

  ctx.save();
  ctx.globalAlpha=alpha*0.26;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(midX,midY,dx,dy);
  ctx.strokeStyle='rgba('+col.r+','+col.g+','+col.b+',1)'; ctx.lineWidth=sw*3.4; ctx.lineCap='round'; ctx.stroke();
  ctx.globalAlpha=alpha*0.45;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(midX,midY,dx,dy);
  ctx.strokeStyle=col.hi; ctx.lineWidth=sw*1.8; ctx.stroke();
  ctx.globalAlpha=alpha;
  var grad=ctx.createLinearGradient(sx,sy,dx,dy);
  grad.addColorStop(0,col.hi); grad.addColorStop(0.45,col.mid); grad.addColorStop(1,col.lo);
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(midX,midY,dx,dy);
  ctx.strokeStyle=grad; ctx.lineWidth=sw; ctx.lineCap='round'; ctx.stroke();
  ctx.globalAlpha=alpha*0.7;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(midX,midY,dx,dy);
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=sw*0.28; ctx.stroke();

  // splash pool at landing
  ctx.globalAlpha=alpha*0.85;
  var br=sw*1.1;
  var bg=ctx.createRadialGradient(dx,dy,0,dx,dy,br*2.2);
  bg.addColorStop(0,col.hi); bg.addColorStop(0.5,col.mid); bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(dx,dy,br*2.2,0,Math.PI*2); ctx.fill();

  // travelling droplets
  var ph=((ts||0)/260)%1;
  ctx.fillStyle=col.hi;
  for(var d=0; d<3; d++){
    var fr=(ph + d/3)%1;
    var px=sx+(dx-sx)*fr + Math.sin(fr*6)*1.5*S;
    var py=sy+(dy-sy)*fr;
    ctx.globalAlpha=alpha*(0.8-fr*0.4);
    ctx.beginPath(); ctx.arc(px,py,sw*(0.34-fr*0.12),0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function hideStream(){
  var sc=document.getElementById('stream-canvas');
  sc.style.display='none';
  var c=sc.getContext('2d'); c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,sc.width,sc.height);
}

function finishPour(f,t){
  var newDone=[];
  for(var i=0;i<vials.length;i++){
    if(isComp(vials[i])&&!isDone(i)){ done.push(i); newDone.push(i); }
  }
  updateHUD(); render(); busy=false;
  for(var ni=0;ni<newDone.length;ni++){
    (function(idx){ setTimeout(function(){ sealVessel(idx); }, 80); })(newDone[ni]);
  }
  if(checkWin()) setTimeout(showLevelComplete, newDone.length?750:320);
}

function easeInOut(t){ return t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2); }
function easeOut(t){ return 1-Math.pow(1-t,2); }

// ═══════════════════════════════════════════════
// SEAL (completed vessel) — cork drops onto tubes
// ═══════════════════════════════════════════════
function sealVessel(idx){
  var wrap=getWrap(idx); if(!wrap) return;
  var cv=wrap.querySelector('canvas'); if(!cv) return;
  // bottles seal instantly with their cork; open test tubes get a cork that drops in
  if(shapes[idx].kind!=='tube'){ drawVessel(cv.getContext('2d'), idx); return; }

  sealing[idx]=true;                      // keep the canvas top open until the cork lands
  drawVessel(cv.getContext('2d'), idx);
  var rect=cv.getBoundingClientRect();
  var sc=rect.width/CW;
  var sh=shapes[idx];
  var topW=sh.widthAt(sh.yTop);
  var cw=(topW+4)*sc;
  var cx=rect.left+(sh.cx-topW/2-2)*sc;
  var targetY=rect.top + (sh.yTop-9)*sc;

  var div=document.createElement('div');
  div.style.cssText='position:fixed;left:'+cx+'px;top:'+(rect.top-60)+'px;width:'+cw+'px;height:'+(17*sc)+
    'px;background:linear-gradient(180deg,#f0cf94 0%,#cf9a52 38%,#9c6526 72%,#6e3f12 100%);'+
    'border-radius:5px 5px 3px 3px;border:1px solid rgba(40,18,0,.5);box-shadow:0 6px 14px rgba(0,0,0,.65);'+
    'z-index:600;pointer-events:none;transition:top .34s cubic-bezier(.34,1.56,.64,1);';
  document.body.appendChild(div);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    div.style.top=targetY+'px';
    setTimeout(function(){
      if(div.parentNode) div.parentNode.removeChild(div);
      delete sealing[idx];                // cork has landed — draw the sealed lid
      var w=getWrap(idx); if(w){var c=w.querySelector('canvas'); if(c) drawVessel(c.getContext('2d'),idx);}
    },360);
  });});
}

// ═══════════════════════════════════════════════
// RESPONSIVE SCALE
// ═══════════════════════════════════════════════
function computeDS(){
  var vw=window.innerWidth, vh=window.innerHeight;
  var m=Math.min(vw, vh);
  var ds=m/430;                                   // phone ~0.9, tablet ~1.9, Tesla ~2.8
  ds=Math.max(0.82, Math.min(ds, 3.1));
  // don't let a full row overflow badly: keep a comfortable min per-row count
  var count=vials.length||6;
  var perRow=Math.min(count, count<=6?count:Math.ceil(count/2));
  var maxByWidth=(vw-24)/(perRow*(CW+16));
  if(maxByWidth<ds) ds=Math.max(0.7, maxByWidth);
  return ds;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  CUR_DS=computeDS();
  var board=document.getElementById('board');
  board.innerHTML='';
  var cssW=Math.round(CW*CUR_DS), cssH=Math.round(CH*CUR_DS);
  for(var i=0;i<vials.length;i++){
    var wrap=document.createElement('div');
    wrap.className='tw'; wrap.setAttribute('data-i',i);
    var cv=document.createElement('canvas');
    cv.width=Math.round(cssW*PXR); cv.height=Math.round(cssH*PXR);
    cv.style.width=cssW+'px'; cv.style.height=cssH+'px';
    var lbl=document.createElement('div');
    lbl.className='tlbl'; lbl.textContent='#'+(i+1);
    wrap.appendChild(cv); wrap.appendChild(lbl);
    ;(function(idx,canvas){
      wrap.addEventListener('click',function(){ clickTube(idx); });
      drawVessel(canvas.getContext('2d'),idx);
    })(i,cv);
    board.appendChild(wrap);
  }
}

function fitCtx(ctx){
  var R=ctx.canvas.width/CW;
  ctx.setTransform(R,0,0,R,0,0);
}

// ═══════════════════════════════════════════════
// DRAW VESSEL
// ═══════════════════════════════════════════════
function drawVessel(ctx, idx){
  fitCtx(ctx);
  ctx.clearRect(0,0,CW,CH);
  var sh=shapes[idx];
  var isSel=(sel===idx), isD=isDone(idx);
  var CX=sh.cx;

  var segList, partialFrac=0, partialColor=null;
  if(idx===fillIdx && fillColor!==null){
    segList=fillBase.slice();
    var whole=Math.floor(fillFrac);
    for(var w=0;w<whole;w++) segList.push(fillColor);
    partialFrac=fillFrac-whole;
    if(partialFrac>0 && segList.length<TS) partialColor=fillColor;
  } else segList=vials[idx];

  var wob=0;
  if(wobble[idx]!==undefined){
    var el=performance.now()-wobble[idx].t0;
    wob=Math.sin(el/55)*wobble[idx].amp*Math.exp(-el/260);
  }

  // selection / seal glow
  if(isSel||isD){
    var rgb=isD?'80,255,150':'220,150,255';
    var gl=ctx.createRadialGradient(CX,CH*0.55,4,CX,CH*0.55,CW*0.95);
    gl.addColorStop(0,'rgba('+rgb+',0.34)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(CX,CH*0.55,CW*0.95,0,Math.PI*2); ctx.fill();
  }

  // glass interior
  ctx.save(); sh.path(ctx); ctx.clip();
  var ig=ctx.createLinearGradient(0,0,CW,0);
  ig.addColorStop(0,'rgba(20,26,40,.55)'); ig.addColorStop(0.5,'rgba(40,52,74,.35)'); ig.addColorStop(1,'rgba(20,26,40,.55)');
  ctx.fillStyle=ig; ctx.fillRect(0,0,CW,CH);
  ctx.restore();

  // liquid bands
  ctx.save(); sh.path(ctx); ctx.clip();
  var nFull=segList.length;
  for(var si=0; si<nFull; si++){
    var col=getPal(segList[si]); if(!col) continue;
    var bandBot=sh.yBottom - si*sh.segH;
    var bandTop=bandBot - sh.segH;
    var isTopBand=(si===nFull-1 && partialColor===null);
    drawLiquidBand(ctx, sh, col, bandTop, bandBot, isTopBand, (isTopBand?wob:0));
  }
  if(partialColor!==null){
    var pcol=getPal(partialColor);
    if(pcol){
      var pBot=sh.yBottom - nFull*sh.segH;
      var pTop=pBot - sh.segH*partialFrac;
      drawLiquidBand(ctx, sh, pcol, pTop, pBot, true, 0);
    }
  }
  // bubbles
  var arr=bubbles[idx];
  if(arr){
    for(var b=0;b<arr.length;b++){
      var bb=arr[b];
      ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.arc(bb.x,bb.y,bb.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
      ctx.beginPath(); ctx.arc(bb.x-bb.r*0.3,bb.y-bb.r*0.3,bb.r*0.4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();

  // vertical glass highlight
  ctx.save(); sh.path(ctx); ctx.clip();
  var lx=sh.leftAt(sh.yTop+20);
  var lsh=ctx.createLinearGradient(lx,0,lx+20,0);
  lsh.addColorStop(0,'rgba(255,255,255,0)');
  lsh.addColorStop(0.12,'rgba(255,255,255,0.34)');
  lsh.addColorStop(0.4,'rgba(255,255,255,0.06)');
  lsh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=lsh; ctx.fillRect(lx,0,20,CH);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillRect(lx+6, sh.yTop+6, 1.6, (sh.yBottom-sh.yTop)*0.55);
  ctx.restore();

  // rim
  ctx.save();
  var rl=sh.leftAt(sh.yTop), rw=sh.widthAt(sh.yTop);
  ctx.beginPath();
  ctx.moveTo(rl, sh.yTop);
  ctx.arcTo(rl, sh.yTop-6, sh.cx, sh.yTop-6, 5);
  ctx.arcTo(rl+rw, sh.yTop-6, rl+rw, sh.yTop, 5);
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.restore();

  // outline
  ctx.save(); sh.path(ctx);
  ctx.strokeStyle=isD ?'rgba(80,255,150,0.92)':
                  isSel?'rgba(225,160,255,1.0)':
                        'rgba(190,205,235,0.4)';
  ctx.lineWidth=(isSel||isD)?2.6:1.6; ctx.stroke();
  ctx.restore();

  // corks / seals — lids only appear once a vessel is completely full & sealed
  if(isD && !sealing[idx]){
    if(sh.kind==='bottle') drawBottleCork(ctx, true);
    else drawTubeCork(ctx, sh);
  }

  // sealed sparkle
  if(isD) drawSparkle(ctx, sh.cx, sh.yTop-2);
}

function drawLiquidBand(ctx, sh, col, yTop, yBot, isTop, wob){
  if(yBot<=yTop) return;
  var steps=6;
  ctx.beginPath();
  for(var i=0;i<=steps;i++){
    var y=yTop+(yBot-yTop)*(i/steps);
    var rx=sh.leftAt(y)+sh.widthAt(y);
    if(i===0) ctx.moveTo(rx,y); else ctx.lineTo(rx,y);
  }
  for(var j=steps;j>=0;j--){
    var y2=yTop+(yBot-yTop)*(j/steps);
    ctx.lineTo(sh.leftAt(y2),y2);
  }
  ctx.closePath();

  var midY=(yTop+yBot)/2;
  var gl=sh.leftAt(midY), gw=sh.widthAt(midY);
  var hg=ctx.createLinearGradient(gl,0,gl+gw,0);
  hg.addColorStop(0,col.lo);
  hg.addColorStop(0.14,col.mid);
  hg.addColorStop(0.36,col.hi);
  hg.addColorStop(0.6,col.hi);
  hg.addColorStop(0.86,col.mid);
  hg.addColorStop(1,col.lo);
  ctx.fillStyle=hg; ctx.fill();

  var vg=ctx.createLinearGradient(0,yTop,0,yBot);
  vg.addColorStop(0,'rgba(255,255,255,0.18)');
  vg.addColorStop(0.35,'rgba(255,255,255,0.02)');
  vg.addColorStop(1,'rgba(0,0,0,0.22)');
  ctx.fillStyle=vg; ctx.fill();

  var sepL=sh.leftAt(yBot), sepW=sh.widthAt(yBot);
  ctx.beginPath(); ctx.moveTo(sepL+2,yBot); ctx.lineTo(sepL+sepW-2,yBot);
  ctx.strokeStyle='rgba(0,0,0,0.32)'; ctx.lineWidth=1; ctx.stroke();

  var surfY=yTop+wob;
  var ml=sh.leftAt(surfY), mw=sh.widthAt(surfY), mcx=ml+mw/2, mrx=mw/2-2;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ml+2,surfY+1);
  ctx.quadraticCurveTo(mcx, surfY-3.5, ml+mw-2, surfY+1);
  ctx.quadraticCurveTo(mcx, surfY+2.5, ml+2, surfY+1);
  ctx.closePath();
  var msg=ctx.createLinearGradient(0,surfY-4,0,surfY+3);
  msg.addColorStop(0,hexA(col.hi,0.9));
  msg.addColorStop(1,hexA(col.mid,0.3));
  ctx.fillStyle=msg; ctx.fill();
  ctx.restore();

  if(isTop){
    var sg=ctx.createRadialGradient(mcx-mrx*0.3,surfY-1,0.5,mcx,surfY,mrx);
    sg.addColorStop(0,'rgba(255,255,255,0.55)');
    sg.addColorStop(0.5,hexA(col.hi,0.25));
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ovalPath(ctx,mcx,surfY,mrx,3.5); ctx.fillStyle=sg; ctx.fill();
    ctx.beginPath(); ctx.moveTo(ml+3,surfY); ctx.lineTo(ml+mw-3,surfY);
    ctx.strokeStyle=hexA(col.hi,0.7); ctx.lineWidth=0.8; ctx.stroke();
  }
}

function drawVesselDrained(ctx, idx, drained){
  var realVial=vials[idx];
  if(drained<=0){ drawVessel(ctx,idx); return; }
  var keep=Math.max(0, realVial.length-drained);
  var saved=vials[idx];
  vials[idx]=realVial.slice(0,keep);
  drawVessel(ctx,idx);
  vials[idx]=saved;
}

// ═══════════════════════════════════════════════
// CORKS
// ═══════════════════════════════════════════════
function drawBottleCork(ctx, sealed){
  var cx=CW/2, cw=30, cl=cx-cw/2, ct=6, cb=34;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cl, cb);
  ctx.lineTo(cl, ct+5);
  ctx.quadraticCurveTo(cl, ct, cx, ct);
  ctx.quadraticCurveTo(cl+cw, ct, cl+cw, ct+5);
  ctx.lineTo(cl+cw, cb);
  ctx.closePath();
  ctx.clip();
  var g=ctx.createLinearGradient(cl,0,cl+cw,0);
  g.addColorStop(0,'#5a3210'); g.addColorStop(0.2,'#9c6526'); g.addColorStop(0.45,'#e6b878');
  g.addColorStop(0.6,'#c89048'); g.addColorStop(0.82,'#8a5318'); g.addColorStop(1,'#4f2c0c');
  ctx.fillStyle=g; ctx.fillRect(cl,ct,cw,cb-ct);
  var tg=ctx.createLinearGradient(0,ct,0,ct+10);
  tg.addColorStop(0,'rgba(255,240,210,.6)'); tg.addColorStop(1,'rgba(255,240,210,0)');
  ctx.fillStyle=tg; ctx.fillRect(cl,ct,cw,12);
  ctx.strokeStyle='rgba(80,44,12,.4)'; ctx.lineWidth=0.8;
  for(var y=ct+7;y<cb-2;y+=4){ ctx.beginPath(); ctx.moveTo(cl+1,y); ctx.lineTo(cl+cw-1,y); ctx.stroke(); }
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(cl,cb-2,cw,3);
  if(sealed){
    // green wax bead top when sealed
    ovalPath(ctx,cx,ct+2,8,3.8);
    var wg=ctx.createRadialGradient(cx-2,ct,0.5,cx,ct+2,8);
    wg.addColorStop(0,'#7dffb4'); wg.addColorStop(0.6,'#18c878'); wg.addColorStop(1,'#065c38');
    ctx.fillStyle=wg; ctx.fill();
  }
}

function drawTubeCork(ctx, sh){
  var cx=sh.cx;
  var topW=sh.widthAt(sh.yTop);
  var halfW=topW/2 + 1;
  var corkTop=sh.yTop-9, corkBot=sh.yTop+9;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx-halfW, corkBot);
  ctx.lineTo(cx-halfW, corkTop+3);
  ctx.quadraticCurveTo(cx-halfW, corkTop, cx, corkTop);
  ctx.quadraticCurveTo(cx+halfW, corkTop, cx+halfW, corkTop+3);
  ctx.lineTo(cx+halfW, corkBot);
  ctx.closePath();
  ctx.clip();
  var cg=ctx.createLinearGradient(cx-halfW,0,cx+halfW,0);
  cg.addColorStop(0,'#5a3210'); cg.addColorStop(0.18,'#9c6526');
  cg.addColorStop(0.42,'#e0b070'); cg.addColorStop(0.6,'#c89048');
  cg.addColorStop(0.82,'#8a5318'); cg.addColorStop(1,'#4f2c0c');
  ctx.fillStyle=cg; ctx.fillRect(cx-halfW,corkTop,halfW*2,corkBot-corkTop);
  var tg=ctx.createLinearGradient(0,corkTop,0,corkTop+8);
  tg.addColorStop(0,'rgba(255,235,200,0.55)'); tg.addColorStop(1,'rgba(255,235,200,0)');
  ctx.fillStyle=tg; ctx.fillRect(cx-halfW,corkTop,halfW*2,10);
  ctx.strokeStyle='rgba(90,48,12,0.4)'; ctx.lineWidth=0.6;
  for(var g=corkTop+5; g<corkBot-1; g+=3){ ctx.beginPath(); ctx.moveTo(cx-halfW+1,g); ctx.lineTo(cx+halfW-1,g); ctx.stroke(); }
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(cx-halfW,corkBot-2,halfW*2,2);
}

function drawSparkle(ctx, x, y){
  ctx.save();
  ctx.strokeStyle='rgba(180,255,210,0.9)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-4,y); ctx.lineTo(x+4,y); ctx.moveTo(x,y-4); ctx.lineTo(x,y+4); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function ovalPath(ctx,cx,cy,rx,ry){
  var k=0.5523,kx=rx*k,ky=ry*k;
  ctx.beginPath();
  ctx.moveTo(cx,cy-ry);
  ctx.bezierCurveTo(cx+kx,cy-ry,cx+rx,cy-ky,cx+rx,cy);
  ctx.bezierCurveTo(cx+rx,cy+ky,cx+kx,cy+ry,cx,cy+ry);
  ctx.bezierCurveTo(cx-kx,cy+ry,cx-rx,cy+ky,cx-rx,cy);
  ctx.bezierCurveTo(cx-rx,cy-ky,cx-kx,cy-ry,cx,cy-ry);
  ctx.closePath();
}
function hexA(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function getPal(id){ for(var i=0;i<PAL.length;i++) if(PAL[i].id===id) return PAL[i]; return null; }
function getWrap(idx){ return document.querySelector('[data-i="'+idx+'"]'); }
function shuffle(a){
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function updateHUD(){
  document.getElementById('sl').textContent=level;
  document.getElementById('sm').textContent=moves;
  document.getElementById('bex').disabled=(extras<=0);
  document.getElementById('sd').textContent=done.length+'/'+countFull();
}
function countFull(){ var n=0; for(var i=0;i<vials.length;i++) if(vials[i].length>0) n++; return n; }

// ═══════════════════════════════════════════════
// LEVEL COMPLETE
// ═══════════════════════════════════════════════
function showLevelComplete(){
  var ov=document.getElementById('ov');
  document.getElementById('ovh').innerHTML='&#10022; LEVEL '+level+' COMPLETE &#10022;';
  var nextC=colorsForLevel(level+1);
  document.getElementById('ovm').textContent='Solved in '+moves+' moves. '+
    'Level '+(level+1)+' brews '+nextC+' elixirs'+(shapeForLevel(level+1)==='tube'?' in tall tubes.':'.');
  document.getElementById('ovbtn').textContent='Next Level';
  ov.className='show';
}
function ovAction(){
  level++;
  document.getElementById('ov').className='';
  buildLevel();
}

var toastT=0;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='show';
  clearTimeout(toastT);
  toastT=setTimeout(function(){ el.className=''; }, 2200);
}

// ═══════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════
function drawStars(){
  var cv=document.getElementById('stars');
  cv.width=Math.round(window.innerWidth*PXR);
  cv.height=Math.round(window.innerHeight*PXR);
  cv.style.width=window.innerWidth+'px'; cv.style.height=window.innerHeight+'px';
  var ctx=cv.getContext('2d');
  ctx.setTransform(PXR,0,0,PXR,0,0);
  var W=window.innerWidth, H=window.innerHeight;
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#150a34'); bg.addColorStop(0.5,'#0c0726'); bg.addColorStop(1,'#070417');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // dust specks
  var n=Math.round((W*H)/9000);
  for(var i=0;i<n;i++){
    var x=Math.random()*W, y=Math.random()*H, r=Math.random()*1.3+0.2;
    var a=Math.random()*0.6+0.15;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(230,220,255,'+a+')'; ctx.fill();
  }
  // sparkles (4-point stars)
  var s=Math.round(n/14);
  for(var k=0;k<s;k++){
    var sx=Math.random()*W, sy=Math.random()*H, sr=Math.random()*3+2;
    var hue=Math.random()<0.5?'rgba(200,160,255,':'rgba(255,220,180,';
    var grd=ctx.createRadialGradient(sx,sy,0,sx,sy,sr*2);
    grd.addColorStop(0,hue+'0.9)'); grd.addColorStop(1,hue+'0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sx,sy,sr*2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=hue+'0.8)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx-sr,sy); ctx.lineTo(sx+sr,sy);
    ctx.moveTo(sx,sy-sr); ctx.lineTo(sx,sy+sr); ctx.stroke();
  }
}

// ═══════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════
var resizeT=0;
window.addEventListener('resize', function(){
  clearTimeout(resizeT);
  resizeT=setTimeout(function(){
    PXR=Math.min(window.devicePixelRatio||1, 2);
    drawStars();
    if(!busy) render();
  }, 120);
});
window.addEventListener('orientationchange', function(){
  setTimeout(function(){ drawStars(); if(!busy) render(); }, 200);
});

// Boot
drawStars();
buildLevel();
</script>
