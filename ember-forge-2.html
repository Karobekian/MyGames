<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ============================================================================
   EMBER FORGE 2 — Cosmic Blacksmith Idle (AdVenture-Capitalist redesign)
   Endless upgrades + goals, bulk dwarves, big-number formatting.
   ========================================================================== */

const SAVE_KEY = "emberforge2-v3";
const MANAGER_BASE_EFF = 0.5;
const START_ORE = 20;

// ── WEAPON TIERS — auto-level on lifetime (grand total) ore ─────────────────
const WEAPON_TIERS = [
  { name: "Rusty Dagger",         emoji: "🗡️", color: "#8B7355", at: 0     },
  { name: "Iron Sword",           emoji: "⚔️", color: "#9BA4B5", at: 2500  },
  { name: "Steel Blade",          emoji: "🔪", color: "#C0C0C0", at: 75000 },
  { name: "Runed Axe",            emoji: "🪓", color: "#7EC8E3", at: 2e6   },
  { name: "Ember Spear",          emoji: "🔱", color: "#FF6B35", at: 5e7   },
  { name: "Storm Halberd",        emoji: "⚡", color: "#FFD700", at: 1.5e9 },
  { name: "Void Cleaver",         emoji: "🌑", color: "#9B59B6", at: 5e10  },
  { name: "Celestial Lance",      emoji: "✨", color: "#00D4FF", at: 2e12  },
  { name: "Screaming Void Spear", emoji: "🌀", color: "#FF00FF", at: 1e14  },
];
function weaponTierFor(total) { let t = 0; for (let i = 0; i < WEAPON_TIERS.length; i++) if (total >= WEAPON_TIERS[i].at) t = i; return t; }
function weaponMultiplier(tier) { return 1 + tier * 0.4; }

// ── GENERATORS (Smiths) ─────────────────────────────────────────────────────
const HEROES = [
  { id:1, name:"Kira",     emoji:"🧝", title:"The Swift Scout",  color:"#7EC8E3", baseCost:20,       baseReturn:8,      cycleMs:2500,  costMult:1.13,
    lore:'"I was back before you noticed I left." Fastest runner in the guild.' },
  { id:2, name:"Boldar",   emoji:"🧔", title:"The Iron Hauler",  color:"#cc8844", baseCost:650,      baseReturn:40,     cycleMs:6000,  costMult:1.14,
    lore:'Twenty years in the mines gave him purpose — he hauls ore like the world depends on it.' },
  { id:3, name:"Selene",   emoji:"🧙", title:"The Star Weaver",  color:"#b48ce8", baseCost:5500,     baseReturn:210,    cycleMs:10000, costMult:1.15,
    lore:'She pulls raw starlight down into the coals.' },
  { id:4, name:"Rex",      emoji:"🛡️", title:"The Bulwark",      color:"#e0c060", baseCost:45000,    baseReturn:1100,   cycleMs:15000, costMult:1.15,
    lore:'A wall that walks. Where Rex stands, the ore flows.' },
  { id:5, name:"Vex",      emoji:"🦹", title:"The Shadow Broker",color:"#8a7fd6", baseCost:300000,   baseReturn:5500,   cycleMs:22000, costMult:1.16,
    lore:'Deals in secrets and cinder. Nobody asks where the alloys come from.' },
  { id:6, name:"Lyra",     emoji:"🧚", title:"The Sky Courier",  color:"#7ee0c8", baseCost:2000000,  baseReturn:30000,  cycleMs:32000, costMult:1.16,
    lore:'She flies forged blades to the edge of the sky and returns heavier with ore.' },
  { id:7, name:"Drake",    emoji:"🐉", title:"The Ember Wyrm",   color:"#ff7a4d", baseCost:13000000, baseReturn:160000, cycleMs:48000, costMult:1.17,
    lore:'An old dragon who trades fire-breath for forge-tending.' },
  { id:8, name:"The Void", emoji:"👁️", title:"The Hungering Eye",color:"#e26bff", baseCost:70000000, baseReturn:900000, cycleMs:70000, costMult:1.13,
    lore:'It is the space between smiths — and it produces more than all of them combined.' },
];

// ── MANAGERS (idle engine, one per smith) ───────────────────────────────────
const MANAGERS = [
  { heroId:1, name:"Torvin the Watcher",   emoji:"🧐", cost:200,       flavor:'"I keep the roster moving."' },
  { heroId:2, name:"Grenda Ironwatch",     emoji:"📋", cost:2500,      flavor:'"Boldar doesn\'t rest. Neither do I."' },
  { heroId:3, name:"Aethon the Scheduler", emoji:"🗂️", cost:18000,     flavor:'"Efficiency is its own magic."' },
  { heroId:4, name:"Commander Voss",       emoji:"🎖️", cost:120000,    flavor:'"Rex obeys orders. My orders."' },
  { heroId:5, name:"The Shadow Ledger",    emoji:"🕵️", cost:800000,    flavor:'"I just count the cinders."' },
  { heroId:6, name:"The Faerie Queen",     emoji:"👸", cost:6000000,    flavor:'"Lyra flies further with purpose."' },
  { heroId:7, name:"The Dragon Tamer",     emoji:"🪄", cost:40000000,   flavor:'"Drake needs no leash, just direction."' },
  { heroId:8, name:"The Astral Anchor",    emoji:"⚓", cost:300000000,  flavor:'"Something must hold the Eye in place."' },
];

// ── MILESTONES (owning N of a smith doubles its output) ─────────────────────
const MILESTONES = [10, 25, 50, 100, 150, 200, 300, 400, 500, 750, 1000, 1500, 2000, 3000, 5000];
function milestoneCount(count) { let n = 0; for (const m of MILESTONES) if (count >= m) n++; return n; }
function milestoneMult(count) { return Math.pow(2, milestoneCount(count)); }
function nextMilestone(count) { for (const m of MILESTONES) if (count < m) return m; return null; }

// ── ENDLESS UPGRADES (auto-generate tiers forever) ──────────────────────────
const UPG_CATS = [];
HEROES.forEach(h => UPG_CATS.push({
  id:"out"+h.id, icon:h.emoji, kind:"smith",
  name:(l)=>h.name+" Forging "+(l+1), desc:"×2 "+h.name+" output",
  eff:(l)=>"×"+fmt(Math.pow(2,l)),
  cost:(l)=>Math.ceil(h.baseCost*30*Math.pow(3.2,l)),
  unlocked:(st)=>(st.heroCounts[h.id]||0)>0,
}));
UPG_CATS.push({ id:"glob", icon:"🌌", kind:"global",
  name:(l)=>"Cosmic Tempering "+(l+1), desc:"×2 ALL generator output",
  eff:(l)=>"×"+fmt(Math.pow(2,l)),
  cost:(l)=>Math.ceil(3e5*Math.pow(7,l)),
  unlocked:(st)=>totalOwned(st)>=10 });
UPG_CATS.push({ id:"tempo", icon:"⏱️", kind:"speed",
  name:(l)=>"Forge Tempo "+(l+1), desc:"+8% cycle speed (all smiths)",
  eff:(l)=>"+"+(l*8)+"%",
  cost:(l)=>Math.ceil(1.2e5*Math.pow(5.5,l)),
  unlocked:(st)=>totalOwned(st)>=5 });
UPG_CATS.push({ id:"foreman", icon:"🔗", kind:"mgr",
  name:(l)=>"Foreman Training "+(l+1), desc:"+4% manager output",
  eff:(l)=>"+"+(l*4)+"%",
  cost:(l)=>Math.ceil(4e5*Math.pow(6.5,l)),
  unlocked:(st)=>Object.keys(st.managers).length>=1 });
UPG_CATS.push({ id:"ley", icon:"🌐", kind:"passive",
  name:(l)=>"Leyline Attunement "+(l+1), desc:"+2% passive income",
  eff:(l)=>"+"+(l*2)+"%",
  cost:(l)=>Math.ceil(2e5*Math.pow(6,l)),
  unlocked:(st)=>totalOwned(st)>=25 });
function upgLvl(st,id){ return (st.upgLevels && st.upgLevels[id]) || 0; }
function upgCat(id){ return UPG_CATS.find(c=>c.id===id); }
function totalOwned(st){ return HEROES.reduce((s,h)=>s+(st.heroCounts[h.id]||0),0); }
function availableUpgrades(st){ return UPG_CATS.filter(c=>c.unlocked(st)).map(c=>{ const l=upgLvl(st,c.id); return { id:c.id, cat:c, lvl:l, cost:c.cost(l) }; }); }
function affordableUpgrades(st){ return availableUpgrades(st).filter(x=>st.ore>=x.cost); }
function affordableManagers(st){ return MANAGERS.filter(m => !st.managers[m.heroId] && (st.heroCounts[m.heroId]||0) > 0 && st.ore >= m.cost); }

// ── STAR SOULS (spendable prestige currency) ────────────────────────────────
function baseSoulsFor(L) { if (L < 1e7) return 0; return 3 * Math.pow(L / 1e7, 0.4); }
function soulsForReforge(st) {
  const d = dwarfBonuses(st.dwarves);
  return Math.floor(baseSoulsFor(st.lifetimeOre) * soulGainMult(st) * (1 + d.soulPct));
}
function prestigeSpeedBonus(reforges) { return Math.min(reforges * 0.05, 0.5); }
function dwarvesEarned(lifeHours, reforgeNumber) {
  return 2 + Math.min(Math.floor(lifeHours), 12) + Math.max(0, reforgeNumber - 1);
}

// ── SOUL SHOP (permanent upgrades) ──────────────────────────────────────────
const SOUL_UPGRADES = [
  { id:"embers",  name:"Ember Blood",     emoji:"🩸", per:0.20, unit:"% all output",   baseCost:3, costMult:1.7, max:25 },
  { id:"bellows", name:"Astral Bellows",  emoji:"🌬️", per:0.40, unit:"% smith speed",   baseCost:4, costMult:1.8, max:15 },
  { id:"swift",   name:"Swift Forge",     emoji:"⚡", per:0.06, unit:"% cycle speed",   baseCost:4, costMult:1.8, max:15 },
  { id:"foreman", name:"Foreman's Whip",  emoji:"🔗", per:0.05, unit:"% manager output",baseCost:5, costMult:2.0, max:10 },
  { id:"magnet",  name:"Soul Magnet",     emoji:"🧲", per:0.12, unit:"% souls earned",  baseCost:5, costMult:1.9, max:12 },
];
function soulLvl(st, id) { return (st.soulUpgrades && st.soulUpgrades[id]) || 0; }
function soulUpgradeCost(u, lvl) { return Math.ceil(u.baseCost * Math.pow(u.costMult, lvl)); }
function soulOutputMult(st) { return 1 + soulLvl(st, "embers") * 0.20; }
function soulSpeedBonus(st) { return soulLvl(st, "swift") * 0.06 + soulLvl(st, "bellows") * 0.40; }
function managerEfficiency(st) { return Math.min(1, MANAGER_BASE_EFF + soulLvl(st, "foreman") * 0.05) + upgLvl(st, "foreman") * 0.04; }
function soulGainMult(st) { return 1 + soulLvl(st, "magnet") * 0.12; }
function affordableSoulUpgrades(st) {
  return SOUL_UPGRADES.filter(u => soulLvl(st,u.id) < u.max && st.starSouls >= soulUpgradeCost(u, soulLvl(st,u.id))).length;
}

// ── ENDLESS GOALS ───────────────────────────────────────────────────────────
function oreGoalVal(i)     { return Math.pow(10, 4 + i); }
function reforgeGoalVal(i) { const s=[1,5,10,25,50,100]; return i<s.length?s[i]:100+(i-s.length+1)*100; }
function soulGoalVal(i)    { const s=[3,10,25,100,500]; return i<s.length?s[i]:Math.round(500*Math.pow(3,i-s.length+1)); }
function countGoalVal(i)   { const s=[10,25,50,100,250,500,1000]; return i<s.length?s[i]:s[s.length-1]*Math.pow(2,i-s.length+1); }
const GOAL_CATS = [
  { id:"ore",     icon:"💰", name:i=>"Forge "+fmt(oreGoalVal(i))+" total ore",        val:oreGoalVal,     cur:st=>st.grandTotalOre },
  { id:"reforge", icon:"🌌", name:i=>"Reforge "+reforgeGoalVal(i)+" time"+(reforgeGoalVal(i)>1?"s":""), val:reforgeGoalVal, cur:st=>st.reforges },
  { id:"souls",   icon:"✦", name:i=>"Earn "+fmt(soulGoalVal(i))+" total Star Souls",  val:soulGoalVal,    cur:st=>st.lifetimeSouls||0 },
];
HEROES.forEach(h => GOAL_CATS.push({ id:"smith"+h.id, icon:h.emoji, name:i=>"Own "+countGoalVal(i)+" "+h.name, val:countGoalVal, cur:st=>st.heroCounts[h.id]||0 }));
function goalTier(st, catId) { return (st.goalTiers && st.goalTiers[catId]) || 0; }

// ── DWARVES (idle / output / soul roles) ────────────────────────────────────
const DWARF_JOBS = [
  { id:"miners",   name:"Ore Miners",    emoji:"⛏️", color:"#ffaa33", desc:"+0.4% of full output as passive income each (works with no manager, boosts offline)", per:c=>({minerPct:c*0.004}) },
  { id:"smiths",   name:"Forge Smiths",  emoji:"🔨", color:"#ff6633", desc:"+3% generator output each",     per:c=>({heroPct:c*0.03}) },
  { id:"scholars", name:"Rune Scholars", emoji:"📜", color:"#88aaff", desc:"+3% Star Souls per reforge each", per:c=>({soulPct:c*0.03}) },
];
function dwarfBonuses(a) {
  let minerPct=0, heroPct=0, soulPct=0;
  DWARF_JOBS.forEach(j => { const b=j.per(a[j.id]||0); minerPct+=b.minerPct||0; heroPct+=b.heroPct||0; soulPct+=b.soulPct||0; });
  return { minerPct, heroPct, soulPct };
}

// ── NUMBER FORMAT (short-scale ladder to Nonagintillion 10^273, then scientific) ──
const ABBR_FIRST = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No"];
const ABBR_UNITS = ["","Un","Duo","Tre","Quattuor","Quin","Sex","Septen","Octo","Novem"];
const ABBR_TENS  = ["Dc","Vg","Tg","Qag","Qig","Sxg","Spg","Ocg","Nog"];
function abbr(tier) {
  if (tier <= 10) return ABBR_FIRST[tier];
  const k = tier - 11, ten = Math.floor(k / 10), unit = k % 10;
  if (ten >= ABBR_TENS.length) return null;
  return ABBR_UNITS[unit] + ABBR_TENS[ten];
}
function fmt(n) {
  if (typeof n !== "number" || isNaN(n)) return "0";
  if (!isFinite(n)) return "∞";
  if (n < 0) return "-" + fmt(-n);
  if (n < 1000) return (Math.floor(n * 10) / 10).toString().replace(/\.0$/, "");
  const tier = Math.floor(Math.log10(n) / 3);
  const s = tier <= 91 ? abbr(tier) : null;
  if (s !== null) return (n / Math.pow(10, tier * 3)).toFixed(2) + s;
  const exp = Math.floor(Math.log10(n));
  return (n / Math.pow(10, exp)).toFixed(2) + "e" + exp;
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  if (s < 60) return s + "s";
  const m = Math.floor(s/60), h = Math.floor(m/60);
  if (h > 0) return h + "h " + (m%60) + "m";
  return m + "m " + (s%60) + "s";
}

// ── STATE ───────────────────────────────────────────────────────────────────
function defaultState() {
  return {
    ore: START_ORE, lifetimeOre: 0, grandTotalOre: 0,
    weaponTier: 0,
    heroCounts: { 1: 0 }, managers: {}, upgLevels: {},
    starSouls: 0, lifetimeSouls: 0, soulUpgrades: {},
    reforges: 0, ascensions: 0,
    eraStart: Date.now(),
    totalDwarves: 0, dwarves: { miners:0, smiths:0, scholars:0 },
    goalTiers: {}, goalsCleared: 0,
    savedAt: Date.now(), heroEnds: {},
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return { st: defaultState(), offline: null };
    const st = Object.assign(defaultState(), JSON.parse(raw));
    st.heroCounts = st.heroCounts || { 1: 0 };
    st.upgLevels = st.upgLevels || {};
    st.soulUpgrades = st.soulUpgrades || {};
    st.goalTiers = st.goalTiers || {};
    st.dwarves = Object.assign({ miners:0, smiths:0, scholars:0 }, st.dwarves || {});
    st.weaponTier = weaponTierFor(st.grandTotalOre);
    const offline = applyOffline(st);
    return { st, offline };
  } catch (e) {
    return { st: defaultState(), offline: null };
  }
}
function applyOffline(st) {
  const now = Date.now();
  let dt = now - (st.savedAt || now);
  if (dt < 15000) return null;
  const capped = Math.min(dt, 8 * 3600 * 1000);
  const gained = idlePerSec(st) * (capped / 1000);
  if (gained <= 0) return null;
  st.ore += gained; st.lifetimeOre += gained; st.grandTotalOre += gained;
  return { gained, ms: capped, capped: dt > 8*3600*1000 };
}

// ── CORE ECONOMY ────────────────────────────────────────────────────────────
function globalOutputMult(st) {
  const d = dwarfBonuses(st.dwarves);
  return weaponMultiplier(st.weaponTier) * (1 + d.heroPct) * Math.pow(2, upgLvl(st,"glob")) * soulOutputMult(st);
}
function heroRevenue(st, h) {
  const count = st.heroCounts[h.id] || 0;
  if (count <= 0) return 0;
  return count * h.baseReturn * milestoneMult(count) * Math.pow(2, upgLvl(st,"out"+h.id)) * globalOutputMult(st);
}
function heroCycleMs(st, h) {
  return Math.max(200, Math.floor(h.cycleMs / (1 + prestigeSpeedBonus(st.reforges) + soulSpeedBonus(st) + upgLvl(st,"tempo")*0.08)));
}
function heroUnitCost(st, h) {
  const count = st.heroCounts[h.id] || 0;
  return Math.ceil(h.baseCost * Math.pow(h.costMult, count));
}
function bulkCost(st, h, qty) {
  const count = st.heroCounts[h.id] || 0;
  const unit = i => Math.ceil(h.baseCost * Math.pow(h.costMult, count + i));
  if (qty === "max") {
    let n = 0, total = 0;
    while (n < 100000) { const c = unit(n); if (total + c > st.ore) break; total += c; n++; }
    return { n, total };
  }
  let need;
  if (qty === "next") { const nm = nextMilestone(count); need = nm ? nm - count : 1; }
  else need = qty;
  let total = 0;
  for (let i = 0; i < need; i++) total += unit(i);
  return { n: need, total };
}
function totalSmithPerSec(st) {
  let s = 0;
  HEROES.forEach(h => { if ((st.heroCounts[h.id]||0) > 0) s += heroRevenue(st, h) / (heroCycleMs(st, h) / 1000); });
  return s;
}
function managerOutputPerSec(st) {
  const eff = managerEfficiency(st);
  let s = 0;
  HEROES.forEach(h => { if ((st.heroCounts[h.id]||0) > 0 && st.managers[h.id]) s += (heroRevenue(st, h) * eff) / (heroCycleMs(st, h) / 1000); });
  return s;
}
function passivePct(st) {
  return dwarfBonuses(st.dwarves).minerPct + upgLvl(st,"ley") * 0.02;
}
function passivePerSec(st) { return totalSmithPerSec(st) * passivePct(st); }
function idlePerSec(st) { return managerOutputPerSec(st) + passivePerSec(st); }

function advanceGoals(st) {
  const cleared = [];
  GOAL_CATS.forEach(cat => {
    let i = goalTier(st, cat.id), guard = 0;
    while (cat.cur(st) >= cat.val(i) && guard < 400) {
      cleared.push(cat.name(i));
      const reward = Math.max(50, totalSmithPerSec(st) * 15);
      st.ore += reward; st.lifetimeOre += reward; st.grandTotalOre += reward;
      st.goalsCleared = (st.goalsCleared || 0) + 1;
      i++; guard++;
    }
    st.goalTiers[cat.id] = i;
  });
  return cleared;
}

// ── SMALL VISUAL BITS ───────────────────────────────────────────────────────
function ProgressBar({ pct, color, height=8 }) {
  return <div style={{background:"#20160c",borderRadius:6,height,overflow:"hidden",width:"100%"}}>
    <div style={{width:(Math.min(1,pct)*100)+"%",height:"100%",background:color,transition:"width 0.1s linear",
      boxShadow:"0 0 8px "+color}}/></div>;
}
function Stat({ label, value, color }) {
  return <div style={{textAlign:"center"}}>
    <div style={{fontSize:11,color:"#c8a878",letterSpacing:0.5}}>{label}</div>
    <div style={{fontSize:15,fontWeight:800,color:color||"#ffd9a0"}}>{value}</div>
  </div>;
}
const PANEL = { background:"linear-gradient(135deg,#2c1c0f,#20140b)", border:"1px solid #4a3116",
  borderRadius:12, padding:14, marginBottom:12 };

// ── MAIN APP ────────────────────────────────────────────────────────────────
function EmberForge() {
  const init = useRef(loadState());
  const S = useRef(init.current.st);
  const [, setTick] = useState(0);
  const rerender = useCallback(() => setTick(t => t + 1), []);
  const [tab, setTab] = useState("smiths");
  const [offline, setOffline] = useState(init.current.offline);
  const [buyQty, setBuyQty] = useState(1);
  const [toast, setToast] = useState(null);
  const toastRef = useRef(0);

  const showToast = (msg) => { const id = ++toastRef.current; setToast(msg); setTimeout(() => { if (toastRef.current === id) setToast(null); }, 1800); };

  useEffect(() => {
    let last = performance.now();
    const iv = setInterval(() => {
      const now = performance.now();
      const wall = Date.now();
      const st = S.current;
      const eff = managerEfficiency(st);
      const pass = passivePerSec(st) * ((now - last) / 1000);
      if (pass > 0) { st.ore += pass; st.lifetimeOre += pass; st.grandTotalOre += pass; }
      last = now;
      HEROES.forEach(h => {
        const count = st.heroCounts[h.id] || 0;
        if (count <= 0) return;
        const end = st.heroEnds[h.id];
        if (end && wall >= end) {
          const managed = !!st.managers[h.id];
          const rev = heroRevenue(st, h) * (managed ? eff : 1);
          st.ore += rev; st.lifetimeOre += rev; st.grandTotalOre += rev;
          if (managed) st.heroEnds[h.id] = wall + heroCycleMs(st, h);
          else delete st.heroEnds[h.id];
        } else if (!end && st.managers[h.id]) {
          st.heroEnds[h.id] = wall + heroCycleMs(st, h);
        }
      });
      st.weaponTier = weaponTierFor(st.grandTotalOre);
      const cleared = advanceGoals(st);
      if (cleared.length) showToast("🏆 Goal complete: " + cleared[cleared.length-1]);
      rerender();
    }, 100);
    return () => clearInterval(iv);
  }, [rerender]);

  useEffect(() => {
    const save = () => { try { S.current.savedAt = Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(S.current)); } catch (e) {} };
    const iv = setInterval(save, 5000);
    window.addEventListener("beforeunload", save);
    return () => { clearInterval(iv); window.removeEventListener("beforeunload", save); save(); };
  }, []);

  const runHero = (h) => {
    const st = S.current;
    if ((st.heroCounts[h.id]||0) <= 0 || st.heroEnds[h.id]) return;
    st.heroEnds[h.id] = Date.now() + heroCycleMs(st, h);
    rerender();
  };
  const buyHero = (h) => {
    const st = S.current;
    const { n, total } = bulkCost(st, h, buyQty);
    if (n <= 0 || st.ore < total) return;
    st.ore -= total; st.heroCounts[h.id] = (st.heroCounts[h.id] || 0) + n;
    rerender();
  };
  const buyManager = (m) => {
    const st = S.current;
    if (st.managers[m.heroId] || st.ore < m.cost) return;
    st.ore -= m.cost; st.managers[m.heroId] = true;
    if (!st.heroEnds[m.heroId] && (st.heroCounts[m.heroId]||0) > 0)
      st.heroEnds[m.heroId] = Date.now() + heroCycleMs(st, HEROES.find(h=>h.id===m.heroId));
    showToast(m.name + " hired — " + HEROES.find(h=>h.id===m.heroId).name + " now automated");
    rerender();
  };
  const buyUpgrade = (id) => {
    const st = S.current;
    const c = upgCat(id); if (!c) return;
    const l = upgLvl(st, id), cost = c.cost(l);
    if (st.ore < cost) return;
    st.ore -= cost; st.upgLevels[id] = l + 1;
    rerender();
  };
  const buyAllUpgrades = () => {
    const st = S.current;
    let bought = 0, guard = 0;
    while (guard++ < 2000) {
      const list = affordableUpgrades(st).sort((a,b) => a.cost - b.cost);
      if (!list.length) break;
      const x = list[0];
      st.ore -= x.cost; st.upgLevels[x.id] = x.lvl + 1; bought++;
    }
    if (bought > 0) showToast("⚡ Bought " + bought + " upgrade" + (bought>1?"s":""));
    rerender();
  };
  const buySoulUpgrade = (u) => {
    const st = S.current;
    const lvl = soulLvl(st, u.id);
    if (lvl >= u.max) return;
    const cost = soulUpgradeCost(u, lvl);
    if (st.starSouls < cost) return;
    st.starSouls -= cost; st.soulUpgrades[u.id] = lvl + 1; rerender();
  };
  const assignDwarf = (jobId, delta) => {
    const st = S.current;
    const assigned = DWARF_JOBS.reduce((s,j)=>s+(st.dwarves[j.id]||0),0);
    const free = st.totalDwarves - assigned;
    let d = delta;
    if (d > 0) d = Math.min(d, free);
    else d = Math.max(d, -(st.dwarves[jobId]||0));
    if (d === 0) return;
    st.dwarves[jobId] = (st.dwarves[jobId]||0) + d;
    rerender();
  };
  const doReforge = () => {
    const st = S.current;
    const souls = soulsForReforge(st);
    if (souls <= 0) { showToast("Reach 10M lifetime ore this era to earn Star Souls."); return; }
    const lifeHours = (Date.now() - st.eraStart) / 3600000;
    const newDwarves = dwarvesEarned(lifeHours, st.reforges + 1);
    if (!window.confirm(
      "REFORGE IN THE COSMIC CRUCIBLE?\n\n" +
      "Gain " + souls + " Star Souls (spend in the Soul Shop)\n" +
      "Gain " + newDwarves + " dwarves\n\n" +
      "Resets: ore, smiths, managers, ore-upgrades.\n" +
      "Keeps: Star Souls, Soul Shop, dwarves, weapon tier, goals."
    )) return;
    const keep = {
      starSouls: st.starSouls + souls,
      lifetimeSouls: (st.lifetimeSouls || 0) + souls,
      soulUpgrades: st.soulUpgrades,
      reforges: st.reforges + 1,
      ascensions: st.ascensions || 0,
      totalDwarves: st.totalDwarves + newDwarves,
      dwarves: st.dwarves,
      grandTotalOre: st.grandTotalOre,
      goalTiers: st.goalTiers,
      goalsCleared: st.goalsCleared,
    };
    const fresh = defaultState();
    Object.assign(fresh, keep);
    fresh.weaponTier = weaponTierFor(fresh.grandTotalOre);
    S.current = fresh;
    setTab("reforge");
    showToast("Reforged! +" + souls + " Star Souls, +" + newDwarves + " dwarves");
    rerender();
  };
  const hardReset = () => {
    if (!window.confirm("Erase ALL progress permanently?")) return;
    localStorage.removeItem(SAVE_KEY);
    S.current = defaultState();
    setTab("smiths"); rerender();
  };

  const st = S.current;
  const upgAvail = affordableUpgrades(st).length;
  const mgrAvail = affordableManagers(st).length;
  const soulAvail = affordableSoulUpgrades(st);
  const ops = idlePerSec(st);
  const tier = WEAPON_TIERS[st.weaponTier];
  const nextTier = WEAPON_TIERS[st.weaponTier + 1];
  const tierPct = nextTier ? (st.grandTotalOre - tier.at) / (nextTier.at - tier.at) : 1;
  const soulOut = Math.round((soulOutputMult(st) - 1) * 100);

  const TABS = [
    { id:"smiths",   label:"⚔ Smiths" },
    { id:"managers", label:"📋 Managers" },
    { id:"upgrades", label:"⬆ Upgrades" },
    { id:"dwarves",  label:"🪨 Dwarves" },
    { id:"goals",    label:"🏆 Goals" },
    { id:"reforge",  label:"✦ Reforge" },
  ];

  return (
    <div className="ef-app" style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% -10%,#3d1e08,#140f0b 60%)",
      fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:560,margin:"0 auto",paddingBottom:70}}>

      <div style={{position:"sticky",top:0,zIndex:5,background:"linear-gradient(#1a1109,#1a1109ee)",
        borderBottom:"1px solid #4a3116",padding:"10px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:26,fontWeight:900,color:"#ffb85a",lineHeight:1,textShadow:"0 0 14px #ff8c2a55"}}>
              {fmt(st.ore)} <span style={{fontSize:15,color:"#c8a878"}}>ore</span></div>
            <div style={{fontSize:12,color:"#9fd7a0"}}>{fmt(ops)}/sec idle</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,color:"#e26bff",fontWeight:800}}>✦ {fmt(st.starSouls)} Souls</div>
            <div style={{fontSize:11,color:"#c8a878"}}>{soulOut>0 ? "+"+soulOut+"% output" : "spend in Reforge"}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
          <span style={{fontSize:20}}>{tier.emoji}</span>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#c8a878",marginBottom:2}}>
              <span style={{color:tier.color,fontWeight:700}}>{tier.name}</span>
              <span>{nextTier ? fmt(st.grandTotalOre)+" / "+fmt(nextTier.at)+" ore" : "MAX TIER"}</span>
            </div>
            <ProgressBar pct={tierPct} color={tier.color} height={6}/>
          </div>
          <span style={{fontSize:11,color:"#ffcf8a",fontWeight:700}}>{weaponMultiplier(st.weaponTier).toFixed(1)}×</span>
        </div>
      </div>

      <div style={{padding:14}}>
        {tab === "smiths" && <SmithsTab st={st} buyQty={buyQty} setBuyQty={setBuyQty} onBuy={buyHero} onRun={runHero}/>}
        {tab === "managers" && <ManagersTab st={st} onBuy={buyManager}/>}
        {tab === "upgrades" && <UpgradesTab st={st} onBuy={buyUpgrade} onBuyAll={buyAllUpgrades}/>}
        {tab === "dwarves" && <DwarvesTab st={st} onAssign={assignDwarf}/>}
        {tab === "goals" && <GoalsTab st={st}/>}
        {tab === "reforge" && <ReforgeTab st={st} onReforge={doReforge} onBuySoul={buySoulUpgrade} onHardReset={hardReset}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:560,margin:"0 auto",
        display:"flex",background:"#160e07",borderTop:"1px solid #4a3116"}}>
        {TABS.map(t => {
          const badge = t.id==="upgrades" ? upgAvail : t.id==="managers" ? mgrAvail : t.id==="reforge" ? soulAvail : 0;
          return (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 2px",background:"none",position:"relative",
            color: tab===t.id ? "#ffb85a" : "#8a6c46", fontSize:11, fontWeight:700,
            borderTop: tab===t.id ? "2px solid #ffb85a" : "2px solid transparent"}}>{t.label}
            {badge>0 && <span style={{position:"absolute",top:4,left:"50%",marginLeft:16,
              minWidth:15,height:15,borderRadius:8,background:"#4ade80",color:"#0a2a12",fontSize:10,fontWeight:900,
              lineHeight:"15px",textAlign:"center",boxShadow:"0 0 8px #4ade80"}}>{badge}</span>}
          </button>);
        })}
      </div>

      {toast && <div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",
        background:"#3a2410",border:"1px solid #ffb85a",color:"#ffd9a0",padding:"10px 16px",borderRadius:10,
        fontSize:13,maxWidth:"90%",textAlign:"center",zIndex:20,boxShadow:"0 4px 20px #000"}}>{toast}</div>}

      {offline && <OfflineModal data={offline} onClose={()=>setOffline(null)}/>}
    </div>
  );
}

// ── TABS ────────────────────────────────────────────────────────────────────
function QtyPicker({ buyQty, setBuyQty }) {
  const opts = [1, 100, "next", "max"];
  const label = o => o==="max" ? "MAX" : o==="next" ? "NEXT" : "×"+o;
  return <div style={{display:"flex",gap:6,marginBottom:10}}>
    {opts.map(o => <button key={o} onClick={()=>setBuyQty(o)} style={{flex:1,padding:"7px 0",borderRadius:8,
      fontSize:13,fontWeight:800, background: buyQty===o ? "#ffb85a" : "#2c1c0f",
      color: buyQty===o ? "#1a1109" : "#c8a878", border:"1px solid "+(buyQty===o?"#ffb85a":"#4a3116")}}>
      {label(o)}</button>)}
  </div>;
}

function SmithsTab({ st, buyQty, setBuyQty, onBuy, onRun }) {
  return (
    <div>
      <div style={{fontSize:12,color:"#c8a878",marginBottom:10,lineHeight:1.5}}>
        <b style={{color:"#ffb85a"}}>Tap a smith</b> to forge a batch of ore. Buy its <b>Manager</b> to automate it.
        Own more for milestone <b>×2</b> doublings. <b>NEXT</b> buys exactly to the next milestone.</div>
      <QtyPicker buyQty={buyQty} setBuyQty={setBuyQty}/>
      {HEROES.map(h => {
        const count = st.heroCounts[h.id] || 0;
        const prevUnlocked = h.id === 1 || (st.heroCounts[h.id-1]||0) > 0;
        const { n, total } = bulkCost(st, h, buyQty);
        const afford = n > 0 && st.ore >= total;
        const managed = !!st.managers[h.id];
        const end = st.heroEnds[h.id];
        const ct = heroCycleMs(st, h);
        const running = end && Date.now() < end;
        const pct = running ? Math.max(0, Math.min(1, 1 - (end - Date.now())/ct)) : 0;
        const rev = heroRevenue(st, h);
        const nm = nextMilestone(count);
        if (!prevUnlocked && count === 0) {
          return <div key={h.id} style={{...PANEL, opacity:0.55, textAlign:"center", color:"#8a6c46", fontSize:13}}>
            🔒 Unlocks after recruiting {HEROES.find(x=>x.id===h.id-1).name}</div>;
        }
        const buyLabel = buyQty==="max" ? (n>0 ? "Buy "+n+" (max)" : "Buy max")
          : buyQty==="next" ? (nm ? "Buy "+n+" → milestone "+nm : "Buy "+n)
          : "Buy "+n;
        return (
          <div key={h.id} style={{...PANEL, border:"1px solid "+h.color+"66"}}>
            <div onClick={(count>0 && !managed && !running) ? ()=>onRun(h) : undefined}
              style={{display:"flex",alignItems:"center",gap:10,userSelect:"none",
                cursor:(count>0 && !managed && !running)?"pointer":"default"}}>
              <div style={{width:60,height:60,borderRadius:12,fontSize:34,flexShrink:0,display:"flex",
                alignItems:"center",justifyContent:"center",
                background:"radial-gradient(circle at 40% 35%,"+h.color+"44,#20140b)",
                border:"2px solid "+h.color, opacity: count===0?0.5:1}}>{h.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{fontWeight:800,color:h.color,fontSize:15}}>{h.name}
                    <span style={{color:"#c8a878",fontWeight:600,fontSize:12}}> · {h.title}</span></span>
                  <span style={{fontWeight:900,color:"#ffd9a0",fontSize:15}}>×{count}</span>
                </div>
                <div style={{position:"relative",margin:"6px 0"}}>
                  <ProgressBar pct={pct} color={h.color} height={22}/>
                  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",
                    alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,
                    color:"#fff",textShadow:"0 1px 3px #000,0 0 4px #000",pointerEvents:"none",letterSpacing:0.5}}>
                    {count===0 ? "" : managed ? "⚙ AUTO" : running ? "Forging…" : "▶ TAP TO FORGE"}</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#c8a878"}}>
                  <span>{fmt(rev)} / {fmtTime(ct)} {managed && <b style={{color:"#9fd7a0"}}>· AUTO</b>}</span>
                  <span>{milestoneCount(count)>0 && <b style={{color:"#ffb85a"}}>×{fmt(milestoneMult(count))} </b>}
                    {nm ? "next ×2 at "+nm : "MAX"}</span>
                </div>
              </div>
            </div>
            <button onClick={()=>onBuy(h)} disabled={!afford} style={{marginTop:10,width:"100%",padding:"9px 0",
              borderRadius:9,fontWeight:800,fontSize:13,
              background: afford ? "linear-gradient(90deg,#a85e1a,#d4841f)" : "#2c1c0f",
              color: afford ? "#fff" : "#7a5c36", border:"1px solid "+(afford?"#ffb85a":"#4a3116")}}>
              {buyLabel} · {fmt(total)} ore</button>
          </div>
        );
      })}
    </div>
  );
}

function ManagersTab({ st, onBuy }) {
  const eff = Math.round(managerEfficiency(st)*100);
  return (
    <div>
      <div style={{fontSize:13,color:"#c8a878",marginBottom:10,lineHeight:1.5}}>
        Managers run a smith automatically at <b style={{color:"#ffb85a"}}>{eff}%</b> of active output — your idle engine.
        Raise it with <b>Foreman Training</b> (Upgrades) and <b>Foreman's Whip</b> (Soul Shop).</div>
      {MANAGERS.map(m => {
        const h = HEROES.find(x=>x.id===m.heroId);
        const owned = !!st.managers[m.heroId];
        const unlocked = (st.heroCounts[m.heroId]||0) > 0;
        const afford = st.ore >= m.cost;
        return (
          <div key={m.heroId} style={{...PANEL, opacity: owned?0.7:1, display:"flex",alignItems:"center",gap:10,
            border: (!owned && unlocked && afford) ? "1px solid #7dffa8" : "1px solid #4a3116",
            boxShadow: (!owned && unlocked && afford) ? "0 0 12px #4ade8055" : "none"}}>
            <div style={{fontSize:30}}>{m.emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,color:"#ffd9a0",fontSize:14}}>{m.name}</div>
              <div style={{fontSize:11,color:"#c8a878"}}>Automates {h.emoji} {h.name} · {m.flavor}</div>
            </div>
            {owned ? <span style={{color:"#9fd7a0",fontWeight:800,fontSize:13}}>✓ Hired</span>
              : <button onClick={()=>onBuy(m)} disabled={!unlocked||!afford} style={{padding:"8px 12px",borderRadius:9,
                  fontWeight:800,fontSize:12, background: (unlocked&&afford)?"linear-gradient(90deg,#a85e1a,#d4841f)":"#2c1c0f",
                  color:(unlocked&&afford)?"#fff":"#7a5c36",border:"1px solid "+((unlocked&&afford)?"#ffb85a":"#4a3116")}}>
                  {unlocked ? fmt(m.cost) : "locked"}</button>}
          </div>
        );
      })}
    </div>
  );
}

function UpgradesTab({ st, onBuy, onBuyAll }) {
  const avail = availableUpgrades(st).sort((a,b) => a.cost - b.cost);
  const affCount = avail.filter(x => st.ore >= x.cost).length;
  return (
    <div>
      <div style={{fontSize:13,color:"#c8a878",marginBottom:10,lineHeight:1.5}}>
        Endless upgrades — buy a tier and a stronger one appears. Costs and effects scale forever.</div>
      {affCount > 0 &&
        <button onClick={onBuyAll} style={{width:"100%",padding:"12px 0",marginBottom:12,borderRadius:10,
          fontWeight:900,fontSize:14,color:"#0a2a12",border:"1px solid #7dffa8",
          background:"linear-gradient(90deg,#34d17a,#6affa0)",boxShadow:"0 0 14px #4ade8066",
          animation:"pulseGlow 1.8s ease-in-out infinite"}}>
          ⚡ SUPER UPGRADE · buy {affCount} affordable</button>}
      {avail.map(x => {
        const c = x.cat, afford = st.ore >= x.cost;
        return (
          <div key={x.id} style={{...PANEL, display:"flex",alignItems:"center",gap:10,
            border: afford ? "1px solid #7dffa8" : "1px solid #4a3116",
            boxShadow: afford ? "0 0 12px #4ade8055" : "none"}}>
            <div style={{fontSize:26}}>{c.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,color:"#ffd9a0",fontSize:13}}>{c.name(x.lvl)}</div>
              <div style={{fontSize:11,color:"#c8a878"}}>{c.desc} · <b style={{color:"#ffb85a"}}>now {c.eff(x.lvl)}</b></div>
            </div>
            <button onClick={()=>onBuy(x.id)} disabled={!afford} style={{padding:"8px 11px",borderRadius:9,
              fontWeight:800,fontSize:12, background: afford?"linear-gradient(90deg,#6a3ea8,#9a5ed4)":"#2c1c0f",
              color: afford?"#fff":"#7a5c36", border:"1px solid "+(afford?"#c79eff":"#4a3116")}}>
              {fmt(x.cost)}</button>
          </div>
        );
      })}
    </div>
  );
}

function DwarvesTab({ st, onAssign }) {
  const assigned = DWARF_JOBS.reduce((s,j)=>s+(st.dwarves[j.id]||0),0);
  const free = st.totalDwarves - assigned;
  const BIG = 1e9;
  const mkBtn = (label, jobId, delta, active) => <button key={label} onClick={()=>onAssign(jobId,delta)} disabled={!active}
    style={{flex:1,minWidth:0,padding:"6px 0",borderRadius:7,fontSize:11,fontWeight:800,
      background: active?"#3a2410":"#241708", color: active?"#ffb85a":"#5a4428",
      border:"1px solid "+(active?"#ffb85a":"#3a2a14")}}>{label}</button>;
  return (
    <div>
      <div style={{...PANEL, textAlign:"center"}}>
        <div style={{fontSize:13,color:"#c8a878"}}>Dwarves earned through Reforging · assign for a trade-off</div>
        <div style={{fontSize:30,fontWeight:900,color:"#ffb85a"}}>🪨 {fmt(st.totalDwarves)}</div>
        <div style={{fontSize:13,color:free>0?"#9fd7a0":"#8a6c46"}}>{fmt(free)} unassigned</div>
      </div>
      {st.totalDwarves === 0 && <div style={{...PANEL,textAlign:"center",color:"#8a6c46",fontSize:13}}>
        No dwarves yet — earn them by Reforging in the Cosmic Crucible.</div>}
      {DWARF_JOBS.map(j => {
        const c = st.dwarves[j.id] || 0;
        return (
          <div key={j.id} style={{...PANEL, border:"1px solid "+j.color+"55"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{fontSize:26}}>{j.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,color:j.color,fontSize:14}}>{j.name} <span style={{color:"#ffd9a0"}}>· {fmt(c)}</span></div>
                <div style={{fontSize:11,color:"#c8a878"}}>{j.desc}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {mkBtn("−All", j.id, -BIG, c>0)}
              {mkBtn("−100", j.id, -100, c>0)}
              {mkBtn("−10", j.id, -10, c>0)}
              {mkBtn("−1", j.id, -1, c>0)}
              {mkBtn("+1", j.id, 1, free>0)}
              {mkBtn("+10", j.id, 10, free>0)}
              {mkBtn("+100", j.id, 100, free>0)}
              {mkBtn("Max", j.id, BIG, free>0)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function GoalsTab({ st }) {
  const rows = GOAL_CATS.map(cat => {
    const i = goalTier(st, cat.id);
    const target = cat.val(i);
    const cur = cat.cur(st);
    return { cat, i, target, cur, frac: Math.min(1, cur/target) };
  }).sort((a,b) => b.frac - a.frac);
  return (
    <div>
      <div style={{...PANEL, textAlign:"center"}}>
        <div style={{fontSize:13,color:"#c8a878"}}>Endless objectives — clear one and a harder tier appears</div>
        <div style={{fontSize:30,fontWeight:900,color:"#ffb85a"}}>🏆 {fmt(st.goalsCleared||0)}</div>
        <div style={{fontSize:12,color:"#8a6c46"}}>goals cleared · each grants a burst of ore</div>
      </div>
      {rows.map(r => (
        <div key={r.cat.id} style={{...PANEL, padding:"10px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{fontSize:22}}>{r.cat.icon}</div>
            <div style={{flex:1,fontSize:13,fontWeight:700,color:"#ffd9a0"}}>{r.cat.name(r.i)}</div>
            <div style={{fontSize:11,color: r.frac>=1?"#9fd7a0":"#c8a878",fontWeight:700}}>{fmt(r.cur)} / {fmt(r.target)}</div>
          </div>
          <ProgressBar pct={r.frac} color={r.frac>=1?"#4ade80":"#d4841f"}/>
        </div>
      ))}
    </div>
  );
}

function ReforgeTab({ st, onReforge, onBuySoul, onHardReset }) {
  const lifeHours = (Date.now() - st.eraStart)/3600000;
  const newDwarves = dwarvesEarned(lifeHours, st.reforges+1);
  const pending = soulsForReforge(st);
  const progress = Math.min(1, st.lifetimeOre / 1e7);
  return (
    <div>
      <div style={{...PANEL, textAlign:"center", border:"1px solid #e26bff55",
        background:"radial-gradient(ellipse at 50% 0%,#2a1240,#1a0e28)"}}>
        <div style={{fontSize:40}}>🌌</div>
        <div style={{fontSize:18,fontWeight:900,color:"#e26bff"}}>Cosmic Crucible</div>
        <div style={{fontSize:13,color:"#c8a878",lineHeight:1.6,margin:"8px 0"}}>
          Collapse this era into a dying star, carrying forward <b style={{color:"#e26bff"}}>Star Souls</b> to spend below.</div>
        {pending<=0 && <div style={{margin:"8px 0"}}>
          <div style={{fontSize:11,color:"#c8a878",marginBottom:3}}>{fmt(st.lifetimeOre)} / 10M lifetime ore this era</div>
          <ProgressBar pct={progress} color="#e26bff" height={8}/></div>}
        <div style={{display:"flex",justifyContent:"space-around",margin:"14px 0"}}>
          <Stat label="Souls" value={"✦ "+fmt(st.starSouls)} color="#e26bff"/>
          <Stat label="Reforge yields" value={"+"+fmt(pending)} color="#9fd7a0"/>
          <Stat label="+ Dwarves" value={"🪨 "+fmt(newDwarves)} color="#ffb85a"/>
        </div>
        <button onClick={onReforge} disabled={pending<=0} style={{width:"100%",padding:"12px 0",borderRadius:10,
          fontWeight:900,fontSize:15, background: pending>0?"linear-gradient(90deg,#7a2ec8,#c04ee0)":"#2c1c0f",
          color: pending>0?"#fff":"#7a5c36", border:"1px solid "+(pending>0?"#e26bff":"#4a3116")}}>
          {pending>0 ? "REFORGE · +"+fmt(pending)+" Star Souls" : "Reach 10M ore this era"}</button>
        <div style={{fontSize:11,color:"#8a6c46",marginTop:8}}>
          Reforges: {fmt(st.reforges)} · Speed: +{Math.round((prestigeSpeedBonus(st.reforges)+soulSpeedBonus(st))*100)}% · Manager eff: {Math.round(managerEfficiency(st)*100)}%</div>
      </div>

      <div style={{...PANEL}}>
        <div style={{fontWeight:900,color:"#e26bff",fontSize:15,marginBottom:2}}>✦ Soul Shop</div>
        <div style={{fontSize:12,color:"#c8a878",marginBottom:10}}>Permanent upgrades — kept forever, even through reforges.</div>
        {SOUL_UPGRADES.map(u => {
          const lvl = soulLvl(st, u.id);
          const maxed = lvl >= u.max;
          const cost = soulUpgradeCost(u, lvl);
          const afford = !maxed && st.starSouls >= cost;
          const curr = Math.round(lvl * u.per * 100);
          return (
            <div key={u.id} style={{...PANEL, marginBottom:8, padding:"10px 12px", display:"flex",alignItems:"center",gap:10,
              border: afford ? "1px solid #e79eff" : "1px solid #4a3116",
              boxShadow: afford ? "0 0 12px #c04ee055" : "none"}}>
              <div style={{fontSize:24}}>{u.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,color:"#ffd9a0",fontSize:13}}>{u.name}
                  <span style={{color:"#8a6c46",fontWeight:600}}> · Lv {lvl}/{u.max}</span></div>
                <div style={{fontSize:11,color:"#c8a878"}}>+{Math.round(u.per*100)}{u.unit} / lvl · now +{curr}{u.unit}</div>
              </div>
              {maxed ? <span style={{color:"#9fd7a0",fontWeight:800,fontSize:12}}>MAX</span>
                : <button onClick={()=>onBuySoul(u)} disabled={!afford} style={{padding:"8px 11px",borderRadius:9,
                    fontWeight:800,fontSize:12, background: afford?"linear-gradient(90deg,#7a2ec8,#c04ee0)":"#2c1c0f",
                    color: afford?"#fff":"#7a5c36", border:"1px solid "+(afford?"#e26bff":"#4a3116")}}>
                    ✦ {fmt(cost)}</button>}
            </div>
          );
        })}
      </div>

      <div style={{...PANEL, textAlign:"center", opacity:0.6, borderStyle:"dashed"}}>
        <div style={{fontSize:22}}>🌟</div>
        <div style={{fontWeight:800,color:"#c8a878",fontSize:13}}>Ascension</div>
        <div style={{fontSize:11,color:"#8a6c46"}}>A deeper prestige beyond reforging… coming soon.</div>
      </div>

      <button onClick={onHardReset} style={{width:"100%",padding:"9px 0",borderRadius:9,marginTop:4,
        background:"#241010",color:"#a86",fontSize:12,border:"1px solid #4a2116"}}>Erase all progress</button>
    </div>
  );
}

function OfflineModal({ data, onClose }) {
  return (
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:30,display:"flex",
      alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:"linear-gradient(135deg,#2c1c0f,#1a1109)",border:"1px solid #ffb85a",
        borderRadius:16,padding:24,maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:44}}>🔥</div>
        <div style={{fontSize:18,fontWeight:900,color:"#ffb85a",margin:"6px 0"}}>Welcome back!</div>
        <div style={{fontSize:13,color:"#c8a878"}}>Your forge earned idle income for {fmtTime(data.ms)}
          {data.capped && " (capped at 8h)"}:</div>
        <div style={{fontSize:30,fontWeight:900,color:"#ffd9a0",margin:"10px 0"}}>+{fmt(data.gained)} ore</div>
        <button onClick={onClose} style={{padding:"10px 28px",borderRadius:10,fontWeight:800,
          background:"linear-gradient(90deg,#a85e1a,#d4841f)",color:"#fff",fontSize:14}}>Collect</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<EmberForge/>);
</script>
</body>
</html>
