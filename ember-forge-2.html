<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ============================================================================
   EMBER FORGE 2 — Cosmic Blacksmith Idle
   Rebalanced: slower curve, spendable Star Souls, Soul Shop, Goals.
   ========================================================================== */

const SAVE_KEY = "emberforge2-v2";           // v2 = rebalanced (fresh save)
const MANAGER_BASE_EFF = 0.5;                 // managers idle at 50% of active output

// ── FORGE / WEAPON TIERS (global multiplier via forge XP, mostly from tapping) ──
const WEAPON_TIERS = [
  { name: "Rusty Dagger",         emoji: "🗡️", color: "#8B7355", xpNeeded: 150      },
  { name: "Iron Sword",           emoji: "⚔️", color: "#9BA4B5", xpNeeded: 1200     },
  { name: "Steel Blade",          emoji: "🔪", color: "#C0C0C0", xpNeeded: 7000     },
  { name: "Runed Axe",            emoji: "🪓", color: "#7EC8E3", xpNeeded: 40000    },
  { name: "Ember Spear",          emoji: "🔱", color: "#FF6B35", xpNeeded: 220000   },
  { name: "Storm Halberd",        emoji: "⚡", color: "#FFD700", xpNeeded: 1200000  },
  { name: "Void Cleaver",         emoji: "🌑", color: "#9B59B6", xpNeeded: 7000000  },
  { name: "Celestial Lance",      emoji: "✨", color: "#00D4FF", xpNeeded: 45000000 },
  { name: "Screaming Void Spear", emoji: "🌀", color: "#FF00FF", xpNeeded: 3e8      },
];
function weaponMultiplier(tier) { return 1 + tier * 0.4; } // 1x .. ~4.2x

// ── GENERATORS (Heroes as AdCap businesses) — slower tuning ──────────────────
const HEROES = [
  { id:1, name:"Kira",     emoji:"🧝", title:"The Swift Scout",  color:"#7EC8E3", baseCost:20,       baseReturn:8,      cycleMs:2500,  costMult:1.13,
    lore:'"I was back before you noticed I left." Fastest runner in the guild — and she never lets anyone forget it.' },
  { id:2, name:"Boldar",   emoji:"🧔", title:"The Iron Hauler",  color:"#cc8844", baseCost:650,      baseReturn:40,     cycleMs:6000,  costMult:1.14,
    lore:'Twenty years in the mines left him penniless — the Forge gave him purpose, and he hauls ore like the world depends on it.' },
  { id:3, name:"Selene",   emoji:"🧙", title:"The Star Weaver",  color:"#b48ce8", baseCost:5500,     baseReturn:210,    cycleMs:10000, costMult:1.15,
    lore:'She reads the constellations above the anvil and pulls raw starlight down into the coals.' },
  { id:4, name:"Rex",      emoji:"🛡️", title:"The Bulwark",      color:"#e0c060", baseCost:45000,    baseReturn:1100,   cycleMs:15000, costMult:1.15,
    lore:'A wall that walks. Where Rex stands, the ore flows and nothing dares interrupt the work.' },
  { id:5, name:"Vex",      emoji:"🦹", title:"The Shadow Broker",color:"#8a7fd6", baseCost:300000,   baseReturn:5500,   cycleMs:22000, costMult:1.16,
    lore:'Deals in secrets and cinder. Nobody knows where Vex sources the rare alloys — nobody asks.' },
  { id:6, name:"Lyra",     emoji:"🧚", title:"The Sky Courier",  color:"#7ee0c8", baseCost:2000000,  baseReturn:30000,  cycleMs:32000, costMult:1.16,
    lore:'Wings of foil-thin mithril. She flies forged blades to the edge of the sky and returns heavier with ore.' },
  { id:7, name:"Drake",    emoji:"🐉", title:"The Ember Wyrm",   color:"#ff7a4d", baseCost:13000000, baseReturn:160000, cycleMs:48000, costMult:1.17,
    lore:'An old dragon who traded fire-breathing for forge-tending. His exhale alone keeps the crucible white-hot.' },
  { id:8, name:"The Void", emoji:"👁️", title:"The Hungering Eye",color:"#e26bff", baseCost:90000000, baseReturn:900000, cycleMs:70000, costMult:1.18,
    lore:'It is not a smith. It is the space between smiths — and it produces more than all of them combined.' },
];

// ── MANAGERS (automation, one per generator) ────────────────────────────────
const MANAGERS = [
  { heroId:1, name:"Torvin the Watcher",   emoji:"🧐", cost:200,       flavor:'"I keep the roster moving."' },
  { heroId:2, name:"Grenda Ironwatch",     emoji:"📋", cost:2500,      flavor:'"Boldar doesn\'t rest. Neither do I."' },
  { heroId:3, name:"Aethon the Scheduler", emoji:"🗂️", cost:18000,     flavor:'"Efficiency is its own magic."' },
  { heroId:4, name:"Commander Voss",       emoji:"🎖️", cost:120000,    flavor:'"Rex obeys orders. My orders."' },
  { heroId:5, name:"The Shadow Ledger",    emoji:"🕵️", cost:800000,    flavor:'"Vex works best unsupervised — I just count."' },
  { heroId:6, name:"The Faerie Queen",     emoji:"👸", cost:6000000,    flavor:'"Lyra flies further with purpose."' },
  { heroId:7, name:"The Dragon Tamer",     emoji:"🪄", cost:40000000,   flavor:'"Drake needs no leash, just direction."' },
  { heroId:8, name:"The Astral Anchor",    emoji:"⚓", cost:300000000,  flavor:'"Something must hold the Eye in place."' },
];

// ── MILESTONES (owning N of a generator doubles its output) ─────────────────
const MILESTONES = [10, 25, 50, 100, 150, 200, 300, 400, 500, 750, 1000];
function milestoneCount(count) { let n = 0; for (const m of MILESTONES) if (count >= m) n++; return n; }
function milestoneMult(count) { return Math.pow(2, milestoneCount(count)); }
function nextMilestone(count) { for (const m of MILESTONES) if (count < m) return m; return null; }

// ── UPGRADES (per-hero + global, one-time purchases) ────────────────────────
const UPGRADES = [];
const HERO_UP_NAMES = ["Reinforced Tools", "Star-Etched Sigil", "Cosmic Ascension"];
HEROES.forEach(h => {
  [25, 50, 100].forEach((req, i) => {
    UPGRADES.push({
      id:`h${h.id}_u${i}`, kind:"hero", heroId:h.id, req,
      name:`${h.name}: ${HERO_UP_NAMES[i]}`, emoji:h.emoji,
      cost: Math.round((h.baseCost * (i===0?14:i===1?120:1100)) + 250),
      mult: i===2 ? 3 : 2,
      desc:`${h.name} output ×${i===2?3:2}`,
    });
  });
});
[
  { req:25,  cost:5e5,  mult:2 },
  { req:75,  cost:2e7,  mult:2 },
  { req:150, cost:1.5e9,mult:2 },
  { req:300, cost:1e11, mult:3 },
].forEach((g, i) => {
  UPGRADES.push({
    id:`glob${i}`, kind:"global", reqTotal:g.req,
    name:`Cosmic Tempering ${["I","II","III","IV"][i]}`, emoji:"🌌",
    cost:g.cost, mult:g.mult, desc:`ALL generator output ×${g.mult}`,
  });
});
const FORGE_UPGRADES = [
  { id:"bellows", kind:"forge", effect:"tap",     name:"Great Bellows",   emoji:"🔥", cost:800,    val:2,   desc:"Forge tap ore ×2", reqTier:0 },
  { id:"runes",   kind:"forge", effect:"tap",     name:"Rune Carving",    emoji:"🔮", cost:25000,  val:3,   desc:"Forge tap ore ×3", reqTier:2 },
  { id:"crucible",kind:"forge", effect:"passive", name:"Star Crucible",   emoji:"⚗️", cost:150000, val:0.02,desc:"+2% of ore/sec as passive trickle", reqTier:3 },
];

// ── STAR SOULS (spendable prestige currency) ────────────────────────────────
// Steep root curve, small gains. Souls are SPENT in the Soul Shop, not a raw multiplier.
function baseSoulsFor(L) {
  if (L < 1e7) return 0;                       // must reach ~10M lifetime ore to reforge
  return 3 * Math.pow(L / 1e7, 0.4);
}
function soulsForReforge(st) {
  return Math.floor(baseSoulsFor(st.lifetimeOre) * soulGainMult(st));
}
function prestigeSpeedBonus(reforges) { return Math.min(reforges * 0.05, 0.5); } // modest
function dwarvesEarned(lifeHours, reforgeNumber) {
  return 2 + Math.min(Math.floor(lifeHours), 12) + Math.max(0, reforgeNumber - 1);
}

// ── SOUL SHOP (permanent upgrades bought with Star Souls; persist across reforges) ──
const SOUL_UPGRADES = [
  { id:"embers",  name:"Ember Blood",     emoji:"🩸", per:0.20, unit:"% all output",   baseCost:3, costMult:1.7, max:25 },
  { id:"bellows", name:"Astral Bellows",  emoji:"🌬️", per:0.40, unit:"% tap power",     baseCost:2, costMult:1.6, max:25 },
  { id:"swift",   name:"Swift Forge",     emoji:"⚡", per:0.06, unit:"% cycle speed",   baseCost:4, costMult:1.8, max:15 },
  { id:"foreman", name:"Foreman's Whip",  emoji:"🔗", per:0.05, unit:"% manager output",baseCost:5, costMult:2.0, max:10 },
  { id:"magnet",  name:"Soul Magnet",     emoji:"🧲", per:0.12, unit:"% souls earned",  baseCost:5, costMult:1.9, max:12 },
];
function soulLvl(st, id) { return (st.soulUpgrades && st.soulUpgrades[id]) || 0; }
function soulUpgradeCost(u, lvl) { return Math.ceil(u.baseCost * Math.pow(u.costMult, lvl)); }
function soulOutputMult(st) { return 1 + soulLvl(st, "embers") * 0.20; }
function soulTapMult(st)    { return 1 + soulLvl(st, "bellows") * 0.40; }
function soulSpeedBonus(st) { return soulLvl(st, "swift") * 0.06; }
function managerEfficiency(st) { return Math.min(1, MANAGER_BASE_EFF + soulLvl(st, "foreman") * 0.05); }
function soulGainMult(st)   { return 1 + soulLvl(st, "magnet") * 0.12; }

// ── GOALS (achievements — always-visible objectives) ────────────────────────
const GOALS = [
  { id:"g1",  name:"First Sparks",   desc:"Earn 10,000 lifetime ore",        check:st => st.grandTotalOre >= 1e4 },
  { id:"g2",  name:"Automation",     desc:"Hire your first manager",         check:st => Object.keys(st.managers).length >= 1 },
  { id:"g3",  name:"Crew of Ten",    desc:"Own 10 of any one smith",         check:st => HEROES.some(h => (st.heroCounts[h.id]||0) >= 10) },
  { id:"g4",  name:"Steel Age",      desc:"Forge the Steel Blade (tier 3)",  check:st => st.weaponTier >= 2 },
  { id:"g5",  name:"Full Crew",      desc:"Unlock all 8 smiths",             check:st => HEROES.every(h => (st.heroCounts[h.id]||0) > 0) },
  { id:"g6",  name:"Millionaire",    desc:"Reach 1M ore in one era",         check:st => st.lifetimeOre >= 1e6 },
  { id:"g7",  name:"First Reforge",  desc:"Reforge in the Cosmic Crucible",  check:st => st.reforges >= 1 },
  { id:"g8",  name:"Soul Merchant",  desc:"Buy any Soul Shop upgrade",       check:st => Object.values(st.soulUpgrades||{}).some(v => v > 0) },
  { id:"g9",  name:"Milestone x25",  desc:"Own 25 of any smith",             check:st => HEROES.some(h => (st.heroCounts[h.id]||0) >= 25) },
  { id:"g10", name:"Ascendant",      desc:"Reforge 5 times",                 check:st => st.reforges >= 5 },
  { id:"g11", name:"Void Touched",   desc:"Own 100 of The Void",             check:st => (st.heroCounts[8]||0) >= 100 },
  { id:"g12", name:"Star Hoarder",   desc:"Earn 100 total Star Souls",       check:st => (st.lifetimeSouls||0) >= 100 },
];
function goalsDone(st) { return GOALS.filter(g => g.check(st)).length; }

// ── DWARVES (assignable permanent workers) ──────────────────────────────────
const DWARF_JOBS = [
  { id:"miners",   name:"Ore Miners",    emoji:"⛏️", color:"#ffaa33", desc:"+0.5% of ore/sec each as passive", per:c=>({passivePct:c*0.005}) },
  { id:"smiths",   name:"Forge Smiths",  emoji:"🔨", color:"#ff6633", desc:"+3% generator output each",        per:c=>({heroPct:c*0.03}) },
  { id:"scholars", name:"Rune Scholars", emoji:"📜", color:"#88aaff", desc:"+5% forge XP & tap each",           per:c=>({tapPct:c*0.05}) },
];
function dwarfBonuses(a) {
  let passivePct=0, heroPct=0, tapPct=0;
  DWARF_JOBS.forEach(j => { const b=j.per(a[j.id]||0); passivePct+=b.passivePct||0; heroPct+=b.heroPct||0; tapPct+=b.tapPct||0; });
  return { passivePct, heroPct, tapPct };
}

// ── NUMBER FORMAT ───────────────────────────────────────────────────────────
const SUF = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","UDc","DDc"];
function fmt(n) {
  if (n === Infinity) return "∞";
  if (n < 1000) return (Math.floor(n*10)/10).toString().replace(/\.0$/,"");
  let i = Math.floor(Math.log10(n) / 3); i = Math.min(i, SUF.length - 1);
  return (n / Math.pow(10, i*3)).toFixed(2) + SUF[i];
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  if (s < 60) return s + "s";
  const m = Math.floor(s/60), h = Math.floor(m/60);
  if (h > 0) return h + "h " + (m%60) + "m";
  return m + "m " + (s%60) + "s";
}

// ── STATE ───────────────────────────────────────────────────────────────────
function defaultState() {
  return {
    ore: 0, lifetimeOre: 0, grandTotalOre: 0,
    xp: 0, weaponTier: 0,
    heroCounts: { 1: 0 }, managers: {}, upgrades: {},
    starSouls: 0,          // spendable balance
    lifetimeSouls: 0,      // total ever earned (for goals)
    soulUpgrades: {},      // id -> level (permanent)
    reforges: 0,
    eraStart: Date.now(),
    totalDwarves: 0,
    dwarves: { miners:0, smiths:0, scholars:0 },
    savedAt: Date.now(),
    heroEnds: {},
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return { st: defaultState(), offline: null };
    const st = Object.assign(defaultState(), JSON.parse(raw));
    st.heroCounts = st.heroCounts || { 1: 0 };
    st.soulUpgrades = st.soulUpgrades || {};
    st.dwarves = Object.assign({ miners:0, smiths:0, scholars:0 }, st.dwarves || {});
    const offline = applyOffline(st);
    return { st, offline };
  } catch (e) {
    return { st: defaultState(), offline: null };
  }
}
// Idle earnings from managed generators while closed (cap 8h, at manager efficiency)
function applyOffline(st) {
  const now = Date.now();
  let dt = now - (st.savedAt || now);
  if (dt < 15000) return null;
  const CAP = 8 * 3600 * 1000;
  const capped = Math.min(dt, CAP);
  const eff = managerEfficiency(st);
  let gained = 0;
  HEROES.forEach(h => {
    const count = st.heroCounts[h.id] || 0;
    if (count > 0 && st.managers[h.id]) {
      const cycles = Math.floor(capped / heroCycleMs(st, h));
      gained += cycles * heroRevenue(st, h) * eff;
    }
  });
  if (gained <= 0) return null;
  st.ore += gained; st.lifetimeOre += gained; st.grandTotalOre += gained;
  return { gained, ms: capped, capped: dt > CAP };
}

// ── CORE ECONOMY ────────────────────────────────────────────────────────────
function globalOutputMult(st) {
  const d = dwarfBonuses(st.dwarves);
  let globUp = 1;
  UPGRADES.forEach(u => { if (u.kind === "global" && st.upgrades[u.id]) globUp *= u.mult; });
  return weaponMultiplier(st.weaponTier) * (1 + d.heroPct) * globUp * soulOutputMult(st);
}
function heroUpgradeMult(st, heroId) {
  let m = 1;
  UPGRADES.forEach(u => { if (u.kind === "hero" && u.heroId === heroId && st.upgrades[u.id]) m *= u.mult; });
  return m;
}
function heroRevenue(st, h) {
  const count = st.heroCounts[h.id] || 0;
  if (count <= 0) return 0;
  return count * h.baseReturn * milestoneMult(count) * heroUpgradeMult(st, h.id) * globalOutputMult(st);
}
function heroCycleMs(st, h) {
  return Math.max(200, Math.floor(h.cycleMs / (1 + prestigeSpeedBonus(st.reforges) + soulSpeedBonus(st))));
}
function heroUnitCost(st, h) {
  const count = st.heroCounts[h.id] || 0;
  return Math.ceil(h.baseCost * Math.pow(h.costMult, count));
}
function bulkCost(st, h, qty) {
  const count = st.heroCounts[h.id] || 0;
  if (qty === "max") {
    let n = 0, total = 0, ore = st.ore;
    while (n < 5000) {
      const c = Math.ceil(h.baseCost * Math.pow(h.costMult, count + n));
      if (total + c > ore) break;
      total += c; n++;
    }
    return { n, total };
  }
  let total = 0;
  for (let i = 0; i < qty; i++) total += Math.ceil(h.baseCost * Math.pow(h.costMult, count + i));
  return { n: qty, total };
}
function tapValue(st) {
  const d = dwarfBonuses(st.dwarves);
  let mult = 1;
  FORGE_UPGRADES.forEach(u => { if (u.effect === "tap" && st.upgrades[u.id]) mult *= u.val; });
  const base = 1 + st.weaponTier * 0.4;
  return base * mult * (1 + d.tapPct) * soulTapMult(st);
}
// Idle ore/sec = managed generators at manager efficiency + passive trickle
function orePerSec(st) {
  const eff = managerEfficiency(st);
  let ops = 0;
  HEROES.forEach(h => {
    const count = st.heroCounts[h.id] || 0;
    if (count > 0 && st.managers[h.id]) ops += (heroRevenue(st, h) * eff) / (heroCycleMs(st, h) / 1000);
  });
  return ops;
}
function passiveTrickle(st) {
  const d = dwarfBonuses(st.dwarves);
  let pct = d.passivePct;
  if (st.upgrades["crucible"]) pct += 0.02;
  return orePerSec(st) * pct;
}
function availableUpgrades(st) {
  return [...FORGE_UPGRADES, ...UPGRADES].filter(u => {
    if (st.upgrades[u.id]) return false;
    if (u.kind === "forge")  return st.weaponTier >= u.reqTier;
    if (u.kind === "hero")   return (st.heroCounts[u.heroId]||0) >= u.req;
    if (u.kind === "global") return HEROES.reduce((s,h)=>s+(st.heroCounts[h.id]||0),0) >= u.reqTotal;
    return true;
  });
}
function affordableUpgrades(st) { return availableUpgrades(st).filter(u => st.ore >= u.cost); }
function affordableSoulUpgrades(st) {
  return SOUL_UPGRADES.filter(u => soulLvl(st,u.id) < u.max && st.starSouls >= soulUpgradeCost(u, soulLvl(st,u.id))).length;
}

// ── SMALL VISUAL BITS ───────────────────────────────────────────────────────
function FloatText({ text, x, y, color }) {
  return <div style={{position:"absolute",left:x,top:y,color,fontWeight:800,fontSize:20,
    pointerEvents:"none",textShadow:"0 2px 6px #000",animation:"floatUp 0.9s ease-out forwards"}}>{text}</div>;
}
function ProgressBar({ pct, color, height=8 }) {
  return <div style={{background:"#20160c",borderRadius:6,height,overflow:"hidden",width:"100%"}}>
    <div style={{width:(pct*100)+"%",height:"100%",background:color,transition:"width 0.1s linear",
      boxShadow:"0 0 8px "+color}}/></div>;
}
function Stat({ label, value, color }) {
  return <div style={{textAlign:"center"}}>
    <div style={{fontSize:11,color:"#c8a878",letterSpacing:0.5}}>{label}</div>
    <div style={{fontSize:15,fontWeight:800,color:color||"#ffd9a0"}}>{value}</div>
  </div>;
}
const PANEL = { background:"linear-gradient(135deg,#2c1c0f,#20140b)", border:"1px solid #4a3116",
  borderRadius:12, padding:14, marginBottom:12 };

// ── MAIN APP ────────────────────────────────────────────────────────────────
function EmberForge() {
  const init = useRef(loadState());
  const S = useRef(init.current.st);
  const [, setTick] = useState(0);
  const rerender = useCallback(() => setTick(t => t + 1), []);
  const [tab, setTab] = useState("forge");
  const [floats, setFloats] = useState([]);
  const [offline, setOffline] = useState(init.current.offline);
  const [buyQty, setBuyQty] = useState(1);
  const [toast, setToast] = useState(null);
  const floatId = useRef(0);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1800); };

  useEffect(() => {
    let last = performance.now();
    const iv = setInterval(() => {
      const now = performance.now();
      const wall = Date.now();
      const st = S.current;
      const eff = managerEfficiency(st);
      const trickle = passiveTrickle(st) * ((now - last) / 1000);
      if (trickle > 0) { st.ore += trickle; st.lifetimeOre += trickle; st.grandTotalOre += trickle; }
      last = now;
      HEROES.forEach(h => {
        const count = st.heroCounts[h.id] || 0;
        if (count <= 0) return;
        const end = st.heroEnds[h.id];
        if (end && wall >= end) {
          const managed = !!st.managers[h.id];
          const rev = heroRevenue(st, h) * (managed ? eff : 1);
          st.ore += rev; st.lifetimeOre += rev; st.grandTotalOre += rev;
          if (managed) { st.xp += rev * 0.01; st.heroEnds[h.id] = wall + heroCycleMs(st, h); } // only automated smiths trickle weapon XP
          else delete st.heroEnds[h.id];
        } else if (!end && st.managers[h.id]) {
          st.heroEnds[h.id] = wall + heroCycleMs(st, h);
        }
      });
      while (st.weaponTier < WEAPON_TIERS.length - 1 && st.xp >= WEAPON_TIERS[st.weaponTier].xpNeeded) {
        st.xp -= WEAPON_TIERS[st.weaponTier].xpNeeded;
        st.weaponTier++;
      }
      rerender();
    }, 100);
    return () => clearInterval(iv);
  }, [rerender]);

  useEffect(() => {
    const save = () => { try { S.current.savedAt = Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(S.current)); } catch (e) {} };
    const iv = setInterval(save, 5000);
    window.addEventListener("beforeunload", save);
    return () => { clearInterval(iv); window.removeEventListener("beforeunload", save); save(); };
  }, []);

  const tapForge = (e) => {
    const st = S.current;
    const v = tapValue(st);
    st.ore += v; st.lifetimeOre += v; st.grandTotalOre += v; st.xp += v;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX || rect.left + rect.width/2) - rect.left;
    const y = (e.clientY || rect.top + rect.height/2) - rect.top;
    const id = floatId.current++;
    setFloats(f => [...f, { id, text:"+"+fmt(v), x, y, color:"#ffcf8a" }]);
    setTimeout(() => setFloats(f => f.filter(o => o.id !== id)), 900);
    rerender();
  };

  const runHero = (h) => {
    const st = S.current;
    if ((st.heroCounts[h.id]||0) <= 0) return;
    if (st.heroEnds[h.id]) return;
    st.heroEnds[h.id] = Date.now() + heroCycleMs(st, h);
    rerender();
  };

  const buyHero = (h) => {
    const st = S.current;
    const { n, total } = bulkCost(st, h, buyQty);
    if (n <= 0 || st.ore < total) return;
    st.ore -= total;
    st.heroCounts[h.id] = (st.heroCounts[h.id] || 0) + n;
    rerender();
  };

  const buyManager = (m) => {
    const st = S.current;
    if (st.managers[m.heroId] || st.ore < m.cost) return;
    st.ore -= m.cost; st.managers[m.heroId] = true;
    if (!st.heroEnds[m.heroId] && (st.heroCounts[m.heroId]||0) > 0)
      st.heroEnds[m.heroId] = Date.now() + heroCycleMs(st, HEROES.find(h=>h.id===m.heroId));
    showToast(m.name + " hired — " + HEROES.find(h=>h.id===m.heroId).name + " now automated (" + Math.round(managerEfficiency(st)*100) + "%)");
    rerender();
  };

  const buyUpgrade = (u) => {
    const st = S.current;
    if (st.upgrades[u.id] || st.ore < u.cost) return;
    st.ore -= u.cost; st.upgrades[u.id] = true;
    rerender();
  };

  const buyAllUpgrades = () => {
    const st = S.current;
    const list = affordableUpgrades(st).sort((a,b) => a.cost - b.cost);
    let bought = 0;
    for (const u of list) { if (st.ore >= u.cost) { st.ore -= u.cost; st.upgrades[u.id] = true; bought++; } }
    if (bought > 0) showToast("⚡ Bought " + bought + " upgrade" + (bought>1?"s":""));
    rerender();
  };

  const buySoulUpgrade = (u) => {
    const st = S.current;
    const lvl = soulLvl(st, u.id);
    if (lvl >= u.max) return;
    const cost = soulUpgradeCost(u, lvl);
    if (st.starSouls < cost) return;
    st.starSouls -= cost;
    st.soulUpgrades[u.id] = lvl + 1;
    rerender();
  };

  const assignDwarf = (jobId, delta) => {
    const st = S.current;
    const assigned = DWARF_JOBS.reduce((s,j)=>s+(st.dwarves[j.id]||0),0);
    if (delta > 0 && assigned >= st.totalDwarves) return;
    if (delta < 0 && (st.dwarves[jobId]||0) <= 0) return;
    st.dwarves[jobId] = (st.dwarves[jobId]||0) + delta;
    rerender();
  };

  const doReforge = () => {
    const st = S.current;
    const souls = soulsForReforge(st);
    if (souls <= 0) { showToast("Reach 10M lifetime ore this era to earn Star Souls."); return; }
    const lifeHours = (Date.now() - st.eraStart) / 3600000;
    const newDwarves = dwarvesEarned(lifeHours, st.reforges + 1);
    if (!window.confirm(
      "REFORGE IN THE COSMIC CRUCIBLE?\n\n" +
      "Gain " + souls + " Star Souls (spend them in the Soul Shop)\n" +
      "Gain " + newDwarves + " dwarves\n\n" +
      "Resets: ore, generators, managers, ore-upgrades, weapon tier.\n" +
      "Keeps: Star Souls, Soul Shop upgrades, dwarves."
    )) return;
    const keep = {
      starSouls: st.starSouls + souls,
      lifetimeSouls: (st.lifetimeSouls || 0) + souls,
      soulUpgrades: st.soulUpgrades,
      reforges: st.reforges + 1,
      totalDwarves: st.totalDwarves + newDwarves,
      dwarves: st.dwarves,
      grandTotalOre: st.grandTotalOre,
    };
    const fresh = defaultState();
    Object.assign(fresh, keep);
    S.current = fresh;
    setTab("reforge");
    showToast("Reforged! +" + souls + " Star Souls, +" + newDwarves + " dwarves");
    rerender();
  };

  const hardReset = () => {
    if (!window.confirm("Erase ALL progress permanently?")) return;
    localStorage.removeItem(SAVE_KEY);
    S.current = defaultState();
    setTab("forge"); rerender();
  };

  const st = S.current;
  const upgAvail = affordableUpgrades(st).length;
  const soulAvail = affordableSoulUpgrades(st);
  const ops = orePerSec(st) + passiveTrickle(st);
  const tier = WEAPON_TIERS[st.weaponTier];
  const nextTier = WEAPON_TIERS[st.weaponTier + 1];
  const xpPct = nextTier ? Math.min(1, st.xp / tier.xpNeeded) : 1;
  const soulOut = Math.round((soulOutputMult(st) - 1) * 100);

  const TABS = [
    { id:"forge",    label:"⚒ Forge" },
    { id:"heroes",   label:"⚔ Forge Crew" },
    { id:"managers", label:"📋 Managers" },
    { id:"upgrades", label:"⬆ Upgrades" },
    { id:"dwarves",  label:"🪨 Dwarves" },
    { id:"reforge",  label:"✦ Reforge" },
  ];

  return (
    <div className="ef-app" style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% -10%,#3d1e08,#140f0b 60%)",
      fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:560,margin:"0 auto",paddingBottom:70}}>

      <div style={{position:"sticky",top:0,zIndex:5,background:"linear-gradient(#1a1109,#1a1109ee)",
        borderBottom:"1px solid #4a3116",padding:"10px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:26,fontWeight:900,color:"#ffb85a",lineHeight:1,textShadow:"0 0 14px #ff8c2a55"}}>
              {fmt(st.ore)} <span style={{fontSize:15,color:"#c8a878"}}>ore</span></div>
            <div style={{fontSize:12,color:"#9fd7a0"}}>{fmt(ops)}/sec idle</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,color:"#e26bff",fontWeight:800}}>✦ {fmt(st.starSouls)} Souls</div>
            <div style={{fontSize:11,color:"#c8a878"}}>{soulOut>0 ? "+"+soulOut+"% output" : "spend in Reforge"}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
          <span style={{fontSize:20}}>{tier.emoji}</span>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#c8a878",marginBottom:2}}>
              <span style={{color:tier.color,fontWeight:700}}>{tier.name}</span>
              <span>{nextTier ? fmt(st.xp)+" / "+fmt(tier.xpNeeded)+" XP" : "MAX TIER"}</span>
            </div>
            <ProgressBar pct={xpPct} color={tier.color} height={6}/>
          </div>
          <span style={{fontSize:11,color:"#ffcf8a",fontWeight:700}}>{weaponMultiplier(st.weaponTier).toFixed(1)}×</span>
        </div>
      </div>

      <div style={{padding:14}}>
        {tab === "forge" && <ForgeTab st={st} onTap={tapForge} floats={floats} tapV={tapValue(st)}/>}
        {tab === "heroes" && <HeroesTab st={st} buyQty={buyQty} setBuyQty={setBuyQty} onBuy={buyHero} onRun={runHero}/>}
        {tab === "managers" && <ManagersTab st={st} onBuy={buyManager}/>}
        {tab === "upgrades" && <UpgradesTab st={st} onBuy={buyUpgrade} onBuyAll={buyAllUpgrades}/>}
        {tab === "dwarves" && <DwarvesTab st={st} onAssign={assignDwarf}/>}
        {tab === "reforge" && <ReforgeTab st={st} onReforge={doReforge} onBuySoul={buySoulUpgrade} onHardReset={hardReset}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:560,margin:"0 auto",
        display:"flex",background:"#160e07",borderTop:"1px solid #4a3116"}}>
        {TABS.map(t => {
          const badge = (t.id==="upgrades" && upgAvail>0) ? upgAvail : (t.id==="reforge" && soulAvail>0) ? soulAvail : 0;
          return (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 2px",background:"none",position:"relative",
            color: tab===t.id ? "#ffb85a" : "#8a6c46", fontSize:11, fontWeight:700,
            borderTop: tab===t.id ? "2px solid #ffb85a" : "2px solid transparent"}}>{t.label}
            {badge>0 && <span style={{position:"absolute",top:4,left:"50%",marginLeft:18,
              minWidth:15,height:15,borderRadius:8,background:"#4ade80",color:"#0a2a12",fontSize:10,fontWeight:900,
              lineHeight:"15px",textAlign:"center",boxShadow:"0 0 8px #4ade80"}}>{badge}</span>}
          </button>);
        })}
      </div>

      {toast && <div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",
        background:"#3a2410",border:"1px solid #ffb85a",color:"#ffd9a0",padding:"10px 16px",borderRadius:10,
        fontSize:13,maxWidth:"90%",textAlign:"center",zIndex:20,boxShadow:"0 4px 20px #000"}}>{toast}</div>}

      {offline && <OfflineModal data={offline} onClose={()=>setOffline(null)}/>}
    </div>
  );
}

// ── TABS ────────────────────────────────────────────────────────────────────
function ForgeTab({ st, onTap, floats, tapV }) {
  const tier = WEAPON_TIERS[st.weaponTier];
  return (
    <div>
      <div style={{...PANEL, textAlign:"center", position:"relative"}}>
        <div style={{fontSize:13,color:"#c8a878",marginBottom:10}}>
          Strike the anvil — forge ore &amp; weapon XP</div>
        <button onClick={onTap} style={{position:"relative",width:190,height:190,borderRadius:"50%",
          background:"radial-gradient(circle at 40% 35%,#5a3212,#2a1608)",
          border:"3px solid "+tier.color, fontSize:78, color:"#fff",
          boxShadow:"0 0 40px "+tier.color+"55, inset 0 0 30px #00000088",
          animation:"pulseGlow 2.5s ease-in-out infinite"}}>
          {tier.emoji}
          {floats.map(f => <FloatText key={f.id} {...f}/>)}
        </button>
        <div style={{marginTop:12,fontSize:14,color:"#ffcf8a",fontWeight:700}}>+{fmt(tapV)} per strike</div>
      </div>
      <div style={{...PANEL}}>
        <div style={{fontSize:13,color:"#c8a878",lineHeight:1.6}}>
          <b style={{color:"#ffb85a"}}>How it works:</b> Strike the anvil to earn ore and forge XP — weapon tiers
          boost <b>every generator</b>. In <b>Forge Crew</b>, buy more of each smith and <b>tap a smith</b> to run it
          at full output. Milestones (10, 25, 50, 100…) <b>double</b> a smith's output.
          <b> Managers</b> automate a smith but only at <b>{Math.round(managerEfficiency(st)*100)}%</b> of active
          output — so tapping always pays more. <b>Reforge</b> for Star Souls, then spend them in the Soul Shop
          (raise output, tap power, speed, and manager efficiency) and chase the <b>Goals</b>.
        </div>
      </div>
    </div>
  );
}

function QtyPicker({ buyQty, setBuyQty }) {
  const opts = [1, 10, 25, 100, "max"];
  return <div style={{display:"flex",gap:6,marginBottom:10}}>
    {opts.map(o => <button key={o} onClick={()=>setBuyQty(o)} style={{flex:1,padding:"7px 0",borderRadius:8,
      fontSize:13,fontWeight:800, background: buyQty===o ? "#ffb85a" : "#2c1c0f",
      color: buyQty===o ? "#1a1109" : "#c8a878", border:"1px solid "+(buyQty===o?"#ffb85a":"#4a3116")}}>
      {o==="max"?"MAX":"×"+o}</button>)}
  </div>;
}

function HeroesTab({ st, buyQty, setBuyQty, onBuy, onRun }) {
  return (
    <div>
      <QtyPicker buyQty={buyQty} setBuyQty={setBuyQty}/>
      {HEROES.map(h => {
        const count = st.heroCounts[h.id] || 0;
        const prevUnlocked = h.id === 1 || (st.heroCounts[h.id-1]||0) > 0;
        const cost = heroUnitCost(st, h);
        const { n, total } = bulkCost(st, h, buyQty);
        const afford = n > 0 && st.ore >= total;
        const managed = !!st.managers[h.id];
        const end = st.heroEnds[h.id];
        const ct = heroCycleMs(st, h);
        const running = end && Date.now() < end;
        const pct = running ? Math.max(0, Math.min(1, 1 - (end - Date.now())/ct)) : 0;
        const rev = heroRevenue(st, h);
        const nm = nextMilestone(count);
        if (!prevUnlocked && count === 0) {
          return <div key={h.id} style={{...PANEL, opacity:0.55, textAlign:"center", color:"#8a6c46", fontSize:13}}>
            🔒 Unlocks after recruiting {HEROES.find(x=>x.id===h.id-1).name}</div>;
        }
        return (
          <div key={h.id} style={{...PANEL, border:"1px solid "+h.color+"66"}}>
            <div onClick={(count>0 && !managed && !running) ? ()=>onRun(h) : undefined}
              style={{display:"flex",alignItems:"center",gap:10,userSelect:"none",
                cursor:(count>0 && !managed && !running)?"pointer":"default"}}>
              <div style={{width:60,height:60,borderRadius:12,fontSize:34,flexShrink:0,display:"flex",
                alignItems:"center",justifyContent:"center",
                background:"radial-gradient(circle at 40% 35%,"+h.color+"44,#20140b)",
                border:"2px solid "+h.color, opacity: count===0?0.5:1}}>{h.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{fontWeight:800,color:h.color,fontSize:15}}>{h.name}
                    <span style={{color:"#c8a878",fontWeight:600,fontSize:12}}> · {h.title}</span></span>
                  <span style={{fontWeight:900,color:"#ffd9a0",fontSize:15}}>×{count}</span>
                </div>
                <div style={{position:"relative",margin:"6px 0"}}>
                  <ProgressBar pct={pct} color={h.color} height={22}/>
                  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",
                    alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,
                    color:"#fff",textShadow:"0 1px 3px #000,0 0 4px #000",pointerEvents:"none",letterSpacing:0.5}}>
                    {count===0 ? "" : managed ? "⚙ AUTO" : running ? "Forging…" : "▶ TAP TO FORGE"}</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#c8a878"}}>
                  <span>{fmt(rev)} / {fmtTime(ct)} {managed && <b style={{color:"#9fd7a0"}}>· AUTO {Math.round(managerEfficiency(st)*100)}%</b>}</span>
                  <span>{milestoneCount(count)>0 && <b style={{color:"#ffb85a"}}>×{milestoneMult(count)} </b>}
                    {nm ? "next ×2 at "+nm : "MAX"}</span>
                </div>
              </div>
            </div>
            <button onClick={()=>onBuy(h)} disabled={!afford} style={{marginTop:10,width:"100%",padding:"9px 0",
              borderRadius:9,fontWeight:800,fontSize:13,
              background: afford ? "linear-gradient(90deg,#a85e1a,#d4841f)" : "#2c1c0f",
              color: afford ? "#fff" : "#7a5c36", border:"1px solid "+(afford?"#ffb85a":"#4a3116")}}>
              Buy {buyQty==="max" ? (n>0 ? n+" (max)" : "max") : n} · {fmt(n>0?total:cost)} ore</button>
          </div>
        );
      })}
    </div>
  );
}

function ManagersTab({ st, onBuy }) {
  return (
    <div>
      <div style={{fontSize:13,color:"#c8a878",marginBottom:10,lineHeight:1.5}}>
        Managers automate a generator at <b style={{color:"#ffb85a"}}>{Math.round(managerEfficiency(st)*100)}%</b> of
        active output (raise this in the Soul Shop). Tapping a smith yourself always earns full output.</div>
      {MANAGERS.map(m => {
        const h = HEROES.find(x=>x.id===m.heroId);
        const owned = !!st.managers[m.heroId];
        const unlocked = (st.heroCounts[m.heroId]||0) > 0;
        const afford = st.ore >= m.cost;
        return (
          <div key={m.heroId} style={{...PANEL, opacity: owned?0.7:1, display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:30}}>{m.emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,color:"#ffd9a0",fontSize:14}}>{m.name}</div>
              <div style={{fontSize:11,color:"#c8a878"}}>Automates {h.emoji} {h.name} · {m.flavor}</div>
            </div>
            {owned ? <span style={{color:"#9fd7a0",fontWeight:800,fontSize:13}}>✓ Hired</span>
              : <button onClick={()=>onBuy(m)} disabled={!unlocked||!afford} style={{padding:"8px 12px",borderRadius:9,
                  fontWeight:800,fontSize:12, background: (unlocked&&afford)?"linear-gradient(90deg,#a85e1a,#d4841f)":"#2c1c0f",
                  color:(unlocked&&afford)?"#fff":"#7a5c36",border:"1px solid "+((unlocked&&afford)?"#ffb85a":"#4a3116")}}>
                  {unlocked ? fmt(m.cost) : "locked"}</button>}
          </div>
        );
      })}
    </div>
  );
}

function UpgradesTab({ st, onBuy, onBuyAll }) {
  const all = [...FORGE_UPGRADES, ...UPGRADES];
  const visible = all.filter(u => {
    if (st.upgrades[u.id]) return true;
    if (u.kind === "forge") return st.weaponTier >= u.reqTier;
    if (u.kind === "hero") return (st.heroCounts[u.heroId]||0) >= u.req * 0.4;
    if (u.kind === "global") {
      const tot = HEROES.reduce((s,h)=>s+(st.heroCounts[h.id]||0),0);
      return tot >= u.reqTotal * 0.4;
    }
    return true;
  });
  return (
    <div>
      <div style={{fontSize:13,color:"#c8a878",marginBottom:10,lineHeight:1.5}}>
        One-time boosts bought with ore. Per-crew upgrades unlock by owning enough of that smith; global upgrades boost everyone.</div>
      {affordableUpgrades(st).length > 0 &&
        <button onClick={onBuyAll} style={{width:"100%",padding:"12px 0",marginBottom:12,borderRadius:10,
          fontWeight:900,fontSize:14,color:"#0a2a12",border:"1px solid #7dffa8",
          background:"linear-gradient(90deg,#34d17a,#6affa0)",boxShadow:"0 0 14px #4ade8066",
          animation:"pulseGlow 1.8s ease-in-out infinite"}}>
          ⚡ SUPER UPGRADE · buy {affordableUpgrades(st).length} available upgrade{affordableUpgrades(st).length>1?"s":""}</button>}
      {visible.map(u => {
        const owned = !!st.upgrades[u.id];
        let ready = true, reqTxt = "";
        if (u.kind === "hero") { const c = st.heroCounts[u.heroId]||0; ready = c >= u.req; reqTxt = "own "+u.req+" "+HEROES.find(h=>h.id===u.heroId).name; }
        else if (u.kind === "global") { const tot = HEROES.reduce((s,h)=>s+(st.heroCounts[h.id]||0),0); ready = tot >= u.reqTotal; reqTxt = "own "+u.reqTotal+" total"; }
        else if (u.kind === "forge") { ready = st.weaponTier >= u.reqTier; reqTxt = WEAPON_TIERS[u.reqTier].name; }
        const afford = ready && st.ore >= u.cost;
        return (
          <div key={u.id} style={{...PANEL, opacity: owned?0.55:1, display:"flex",alignItems:"center",gap:10,
            border: afford ? "1px solid #7dffa8" : "1px solid #4a3116",
            boxShadow: afford ? "0 0 12px #4ade8055" : "none"}}>
            <div style={{fontSize:26}}>{u.emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,color:"#ffd9a0",fontSize:13}}>{u.name}</div>
              <div style={{fontSize:11,color:"#c8a878"}}>{u.desc}{!ready && !owned && " · needs "+reqTxt}</div>
            </div>
            {owned ? <span style={{color:"#9fd7a0",fontWeight:800,fontSize:12}}>✓</span>
              : <button onClick={()=>onBuy(u)} disabled={!afford} style={{padding:"8px 11px",borderRadius:9,
                  fontWeight:800,fontSize:12, background: afford?"linear-gradient(90deg,#6a3ea8,#9a5ed4)":"#2c1c0f",
                  color: afford?"#fff":"#7a5c36", border:"1px solid "+(afford?"#c79eff":"#4a3116")}}>
                  {ready ? fmt(u.cost) : "🔒"}</button>}
          </div>
        );
      })}
    </div>
  );
}

function DwarvesTab({ st, onAssign }) {
  const assigned = DWARF_JOBS.reduce((s,j)=>s+(st.dwarves[j.id]||0),0);
  const free = st.totalDwarves - assigned;
  return (
    <div>
      <div style={{...PANEL, textAlign:"center"}}>
        <div style={{fontSize:13,color:"#c8a878"}}>Dwarves earned through Reforging</div>
        <div style={{fontSize:30,fontWeight:900,color:"#ffb85a"}}>🪨 {st.totalDwarves}</div>
        <div style={{fontSize:13,color:free>0?"#9fd7a0":"#8a6c46"}}>{free} unassigned</div>
      </div>
      {st.totalDwarves === 0 && <div style={{...PANEL,textAlign:"center",color:"#8a6c46",fontSize:13}}>
        No dwarves yet — earn them by Reforging in the Cosmic Crucible.</div>}
      {DWARF_JOBS.map(j => {
        const c = st.dwarves[j.id] || 0;
        return (
          <div key={j.id} style={{...PANEL, border:"1px solid "+j.color+"55"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:28}}>{j.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,color:j.color,fontSize:14}}>{j.name}</div>
                <div style={{fontSize:11,color:"#c8a878"}}>{j.desc}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>onAssign(j.id,-1)} style={dwBtn(c>0)}>−</button>
                <span style={{fontWeight:900,fontSize:17,minWidth:26,textAlign:"center",color:"#ffd9a0"}}>{c}</span>
                <button onClick={()=>onAssign(j.id,1)} style={dwBtn(free>0)}>+</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}
function dwBtn(active){ return { width:34,height:34,borderRadius:8,fontSize:20,fontWeight:900,
  background: active?"#3a2410":"#241708", color: active?"#ffb85a":"#5a4428",
  border:"1px solid "+(active?"#ffb85a":"#3a2a14") }; }

function ReforgeTab({ st, onReforge, onBuySoul, onHardReset }) {
  const lifeHours = (Date.now() - st.eraStart)/3600000;
  const newDwarves = dwarvesEarned(lifeHours, st.reforges+1);
  const pending = soulsForReforge(st);
  const progress = Math.min(1, st.lifetimeOre / 1e7);
  const done = goalsDone(st);
  return (
    <div>
      <div style={{...PANEL, textAlign:"center", border:"1px solid #e26bff55",
        background:"radial-gradient(ellipse at 50% 0%,#2a1240,#1a0e28)"}}>
        <div style={{fontSize:40}}>🌌</div>
        <div style={{fontSize:18,fontWeight:900,color:"#e26bff"}}>Cosmic Crucible</div>
        <div style={{fontSize:13,color:"#c8a878",lineHeight:1.6,margin:"8px 0"}}>
          Collapse this era into a dying star and reforge anew, carrying forward
          <b style={{color:"#e26bff"}}> Star Souls</b> to spend in the Soul Shop below.</div>
        {pending<=0 && <div style={{margin:"8px 0"}}>
          <div style={{fontSize:11,color:"#c8a878",marginBottom:3}}>{fmt(st.lifetimeOre)} / 10M lifetime ore this era</div>
          <ProgressBar pct={progress} color="#e26bff" height={8}/></div>}
        <div style={{display:"flex",justifyContent:"space-around",margin:"14px 0"}}>
          <Stat label="Souls" value={"✦ "+fmt(st.starSouls)} color="#e26bff"/>
          <Stat label="Reforge yields" value={"+"+pending} color="#9fd7a0"/>
          <Stat label="+ Dwarves" value={"🪨 "+newDwarves} color="#ffb85a"/>
        </div>
        <button onClick={onReforge} disabled={pending<=0} style={{width:"100%",padding:"12px 0",borderRadius:10,
          fontWeight:900,fontSize:15, background: pending>0?"linear-gradient(90deg,#7a2ec8,#c04ee0)":"#2c1c0f",
          color: pending>0?"#fff":"#7a5c36", border:"1px solid "+(pending>0?"#e26bff":"#4a3116")}}>
          {pending>0 ? "REFORGE · +"+pending+" Star Souls" : "Reach 10M ore this era"}</button>
        <div style={{fontSize:11,color:"#8a6c46",marginTop:8}}>
          Reforges: {st.reforges} · Speed bonus: +{Math.round((prestigeSpeedBonus(st.reforges)+soulSpeedBonus(st))*100)}% · Manager eff: {Math.round(managerEfficiency(st)*100)}%</div>
      </div>

      <div style={{...PANEL}}>
        <div style={{fontWeight:900,color:"#e26bff",fontSize:15,marginBottom:2}}>✦ Soul Shop</div>
        <div style={{fontSize:12,color:"#c8a878",marginBottom:10}}>Permanent upgrades — kept forever, even through reforges.</div>
        {SOUL_UPGRADES.map(u => {
          const lvl = soulLvl(st, u.id);
          const maxed = lvl >= u.max;
          const cost = soulUpgradeCost(u, lvl);
          const afford = !maxed && st.starSouls >= cost;
          const curr = Math.round(lvl * u.per * 100);
          return (
            <div key={u.id} style={{...PANEL, marginBottom:8, padding:"10px 12px", display:"flex",alignItems:"center",gap:10,
              border: afford ? "1px solid #e79eff" : "1px solid #4a3116",
              boxShadow: afford ? "0 0 12px #c04ee055" : "none"}}>
              <div style={{fontSize:24}}>{u.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,color:"#ffd9a0",fontSize:13}}>{u.name}
                  <span style={{color:"#8a6c46",fontWeight:600}}> · Lv {lvl}/{u.max}</span></div>
                <div style={{fontSize:11,color:"#c8a878"}}>+{Math.round(u.per*100)}{u.unit} / lvl · now +{curr}{u.unit}</div>
              </div>
              {maxed ? <span style={{color:"#9fd7a0",fontWeight:800,fontSize:12}}>MAX</span>
                : <button onClick={()=>onBuySoul(u)} disabled={!afford} style={{padding:"8px 11px",borderRadius:9,
                    fontWeight:800,fontSize:12, background: afford?"linear-gradient(90deg,#7a2ec8,#c04ee0)":"#2c1c0f",
                    color: afford?"#fff":"#7a5c36", border:"1px solid "+(afford?"#e26bff":"#4a3116")}}>
                    ✦ {fmt(cost)}</button>}
            </div>
          );
        })}
      </div>

      <div style={{...PANEL}}>
        <div style={{fontWeight:900,color:"#ffb85a",fontSize:15,marginBottom:2}}>🏆 Goals <span style={{fontSize:12,color:"#8a6c46",fontWeight:600}}>· {done}/{GOALS.length}</span></div>
        {GOALS.map(g => {
          const ok = g.check(st);
          return (
            <div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 2px",borderBottom:"1px solid #2c1c0f"}}>
              <span style={{fontSize:18}}>{ok ? "✅" : "⬜"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color: ok?"#9fd7a0":"#ffd9a0"}}>{g.name}</div>
                <div style={{fontSize:11,color:"#c8a878"}}>{g.desc}</div>
              </div>
            </div>
          );
        })}
      </div>

      <button onClick={onHardReset} style={{width:"100%",padding:"9px 0",borderRadius:9,marginTop:4,
        background:"#241010",color:"#a86",fontSize:12,border:"1px solid #4a2116"}}>Erase all progress</button>
    </div>
  );
}

function OfflineModal({ data, onClose }) {
  return (
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:30,display:"flex",
      alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:"linear-gradient(135deg,#2c1c0f,#1a1109)",border:"1px solid #ffb85a",
        borderRadius:16,padding:24,maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:44}}>🔥</div>
        <div style={{fontSize:18,fontWeight:900,color:"#ffb85a",margin:"6px 0"}}>Welcome back!</div>
        <div style={{fontSize:13,color:"#c8a878"}}>Your automated forge crew ran for {fmtTime(data.ms)}
          {data.capped && " (capped at 8h)"} and earned:</div>
        <div style={{fontSize:30,fontWeight:900,color:"#ffd9a0",margin:"10px 0"}}>+{fmt(data.gained)} ore</div>
        <button onClick={onClose} style={{padding:"10px 28px",borderRadius:10,fontWeight:800,
          background:"linear-gradient(90deg,#a85e1a,#d4841f)",color:"#fff",fontSize:14}}>Collect</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<EmberForge/>);
</script>
</body>
</html>
