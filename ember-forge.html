// ── DWARF SYSTEM ─────────────────────────────────────────────────────────────
// Dwarves are earned permanently on each reincarnation based on life duration
// Base: 3 dwarves per reincarnation + 1 per hour of life (capped at 20/reincarnation)
// They can be assigned to 3 jobs; unassigned dwarves do nothing

const DWARF_JOBS = [
  {
    id: "miners",
    name: "Ore Miners",
    emoji: "⛏️",
    color: "#ffaa33",
    desc: "Each dwarf mines +25 passive ore/sec",
    bonus: (count) => ({ passiveOre: count * 25 }),
  },
  {
    id: "smiths",
    name: "Forge Smiths",
    emoji: "🔨",
    color: "#ff6633",
    desc: "Each dwarf adds +15% hero ore/run",
    bonus: (count) => ({ heroBonus: count * 0.15 }),
  },
  {
    id: "scholars",
    name: "Rune Scholars",
    emoji: "📜",
    color: "#88aaff",
    desc: "Each dwarf adds +20% forge XP/tap",
    bonus: (count) => ({ tapBonus: count * 0.20 }),
  },
];

function dwarfBonuses(assignments) {
  let passiveOre = 0, heroBonus = 0, tapBonus = 0;
  for (const job of DWARF_JOBS) {
    const count = assignments[job.id] || 0;
    const b = job.bonus(count);
    if (b.passiveOre) passiveOre += b.passiveOre;
    if (b.heroBonus)  heroBonus  += b.heroBonus;
    if (b.tapBonus)   tapBonus   += b.tapBonus;
  }
  return { passiveOre, heroBonus, tapBonus };
}

function dwarfsEarnedOnRebirth(lifeHours, reincarnationNumber) {
  const base = 3;
  const timeBonus = Math.min(Math.floor(lifeHours), 20); // max 20 from time
  const prestigeBonus = reincarnationNumber - 1; // each subsequent rebirth gives +1 extra
  return base + timeBonus + prestigeBonus;
}

function upgradeCost(def, level) {
  return Math.floor(def.baseCost * Math.pow(def.costMult, level));
}

// Hero individual upgrades: each level costs more, gives +25% base ore
// Base cost scales with hero index so Kira is cheapest, The Void is priciest
function heroUpgradeCost(hero, currentLevel) {
  const baseCost = hero.unlockCost > 0 ? hero.unlockCost * 0.3 : 50;
  return Math.floor(baseCost * Math.pow(2.5, currentLevel));
}
function heroEffectiveReturn(hero, heroLevel, heroBonus, weaponTier, rebirthMult) {
  const levelMult = 1 + heroLevel * 0.25; // +25% per level
  return Math.floor(hero.baseReturn * levelMult * (1 + heroBonus) * weaponMultiplier(weaponTier) * rebirthMult);
}

const SAVE_KEY = "emberforge-v6";
const DB_NAME  = "EmberForgeDB";
const DB_STORE = "saves";

// ── IndexedDB wrapper ─────────────────────────────────────────────────────────
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
  } catch { return undefined; }
}
async function idbSet(key, value) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      const req = tx.objectStore(DB_STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror   = () => reject(req.error);
    });
  } catch {}
}

// ── Export / Import helpers ───────────────────────────────────────────────────
function exportSaveCode(state) {
  const payload = { ...state, savedAt: Date.now(), _version: 3 };
  return btoa(JSON.stringify(payload));
}
function importSaveCode(code) {
  try {
    const parsed = JSON.parse(atob(code.trim()));
    if (!parsed || parsed._version !== 3) throw new Error("Invalid save code");
    return { ...defaultState(), ...parsed };
  } catch (e) {
    throw new Error("Could not read save code: " + e.message);
  }
}

function fmt(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9)  return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6)  return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3)  return (n / 1e3).toFixed(1) + "K";
  return Math.floor(n).toString();
}

function weaponMultiplier(tier) { return 1 + tier * 0.5; } // 1× to 5×

function prestigeSpeedBonus(prestige) { return Math.min(prestige * 0.2, 2.0); } // +20%/prestige, cap 200%

function effectiveReturnTime(hero, speedBonus) {
  return Math.max(400, Math.floor(hero.returnTime / (1 + speedBonus)));
}

function calcBonuses(upgradeLevels) {
  let tapBonus = 0, heroBonus = 0, passiveOre = 0;
  for (const def of UPGRADE_DEFS) {
    const lvl = upgradeLevels[def.id] || 0;
    if (lvl === 0) continue;
    const val = def.getValue(lvl - 1); // levels are 1-indexed when bought
    if (def.effect === "tapBonus")   tapBonus   += val;
    if (def.effect === "heroBonus")  heroBonus  += val;
    if (def.effect === "passiveOre") passiveOre += val;
  }
  return { tapBonus, heroBonus, passiveOre };
}

// XP per tap scales with weapon tier so progress always feels fast
function xpPerTapCalc(tapBonus, prestige, weaponTier) {
  // Starts slow, scales with tier so each tier still feels progressable
  const base = Math.floor(20 * Math.pow(3, weaponTier * 0.5));
  return Math.max(1, Math.floor(base * (1 + tapBonus) * (1 + prestige * 0.5)));
}

function defaultState() {
  return {
    ore: 0, totalXp: 0, weaponTier: 0,
    unlockedHeroes: [1], upgradeLevels: {}, heroLevels: {}, hiredManagers: [],
    prestige: 0, savedAt: Date.now(), rebirthStartTime: Date.now(), totalDwarves: 0, dwarfAssignments: { miners: 0, smiths: 0, scholars: 0 },
  };
}

function calcOfflineEarnings(saved) {
  if (!saved.savedAt) return { ore: 0, seconds: 0 };
  const elapsed = Math.floor((Date.now() - saved.savedAt) / 1000);
  if (elapsed < 10) return { ore: 0, seconds: 0 };
  const { heroBonus, passiveOre } = calcBonuses(saved.upgradeLevels || {});
  const prestige = saved.prestige || 0;
  const rebirthMult = prestige > 0 ? (prestige + 1) : 1;
  const speed = prestigeSpeedBonus(prestige);
  // Cap at 24 hours (was 8)
  const cappedSecs = Math.min(elapsed, 24 * 3600);
  // Passive ore runs at full rate offline
  let oreGained = passiveOre * cappedSecs;
  // Hero runs at full rate — no penalty for being offline
  for (const mgr of MANAGERS) {
    if (!(saved.hiredManagers || []).includes(mgr.id)) continue;
    const hero = HEROES.find(h => h.id === mgr.heroId);
    if (!hero) continue;
    const runTime = effectiveReturnTime(hero, speed);
    const runs = Math.floor((cappedSecs * 1000) / runTime);
    const heroLvl = (saved.heroLevels || {})[hero.id] || 0;
    const levelMult = 1 + heroLvl * 0.25;
    const mult = levelMult * (1 + heroBonus) * weaponMultiplier(saved.weaponTier || 0) * rebirthMult;
    oreGained += Math.floor(runs * hero.baseReturn * mult);
  }
  // Offline bonus: +50% on top of everything to reward coming back
  oreGained = Math.floor(oreGained * 1.5);
  return { ore: Math.floor(oreGained), seconds: elapsed, capped: elapsed > 24 * 3600 };
}

function loadSaveSync() {
  // Synchronous load from localStorage for initial render
  try {
    const local = typeof localStorage !== "undefined" ? localStorage.getItem(SAVE_KEY) : null;
    if (local) {
      const p = JSON.parse(local);
      if (p && (p.ore !== undefined || p.weaponTier !== undefined))
        return { ...defaultState(), ...p };
    }
  } catch {}
  return defaultState();
}
// Async load from IndexedDB — called on mount to get the freshest save
async function loadSaveAsync() {
  try {
    const idb = await idbGet(SAVE_KEY);
    if (idb && (idb.ore !== undefined || idb.weaponTier !== undefined))
      return { ...defaultState(), ...idb };
  } catch {}
  return null; // null = use whatever sync load already has
}
// Keep old name so nothing else breaks
function loadSave() { return loadSaveSync(); }

function writeSave(state, force = false) {
  // Never save a completely blank state (guards against race on first load)
  const isBlank = !state || (
    state.ore === 0 && state.weaponTier === 0 &&
    !(state.hiredManagers?.length) &&
    !Object.keys(state.upgradeLevels || {}).length &&
    !(state.totalDwarves > 0) &&
    !(state.prestige > 0)
  );
  if (isBlank && !force) return;
  const payload = { ...state, savedAt: Date.now(), _version: 3 };
  // 1. IndexedDB (primary — survives storage pressure)
  idbSet(SAVE_KEY, payload).catch(() => {});
  // 2. localStorage (fast fallback)
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(payload)); } catch {}
  // 3. URL hash (survives artifact reloads)
  try { saveToURL(payload); } catch {}
  // 4. Artifact storage (belt + suspenders)
  try { if (window.storage) window.storage.set(SAVE_KEY, JSON.stringify(payload)); } catch {}
}

// ── SPARK ────────────────────────────────────────────────────────────────────
function Spark({ x, y, onDone }) {
  const [pos, setPos] = useState({ x, y, opacity: 1 });
  const vx = useRef((Math.random() - 0.5) * 130);
  const vy = useRef(-(Math.random() * 90 + 60));
  const t0 = useRef(Date.now());
  useEffect(() => {
    let raf;
    const tick = () => {
      const t = (Date.now() - t0.current) / 1000;
      if (t > 0.7) { onDone(); return; }
      setPos({ x: x + vx.current * t, y: y + vy.current * t + 50 * t * t, opacity: 1 - t / 0.7 });
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  return <div style={{ position:"fixed", left:pos.x, top:pos.y, pointerEvents:"none", width:6, height:6, borderRadius:"50%", background:"hsl(30,100%,65%)", opacity:pos.opacity, transform:"translate(-50%,-50%)", zIndex:9999 }} />;
}

function FloatText({ x, y, text, color, onDone }) {
  const [fy, setFy] = useState(y);
  const [op, setOp] = useState(1);
  const t0 = useRef(Date.now());
  useEffect(() => {
    let raf;
    const tick = () => {
      const t = (Date.now() - t0.current) / 1000;
      if (t > 0.9) { onDone(); return; }
      setFy(y - t * 60); setOp(1 - t / 0.9);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  return <div style={{ position:"fixed", left:x, top:fy, pointerEvents:"none", color, fontWeight:900, fontSize:16, fontFamily:"serif", opacity:op, transform:"translate(-50%,-50%)", zIndex:9999, textShadow:"0 0 8px #000" }}>{text}</div>;
}

// ── HERO CARD ─────────────────────────────────────────────────────────────────
function HeroCard({ hero, unlocked, ore, adventuring, timeLeft, returnPct, onUnlock, onSend, managed, heroBonus, speedBonus, weaponTier, prestige, heroLevel, onUpgrade, onPortraitClick }) {
  const rebirthMult = prestige > 0 ? (prestige + 1) : 1;
  const levelMult = 1 + heroLevel * 0.25;
  const effOre = Math.floor(hero.baseReturn * levelMult * (1 + heroBonus) * weaponMultiplier(weaponTier) * rebirthMult);
  const effTime = effectiveReturnTime(hero, speedBonus);
  const orePerSec = (effOre / (effTime / 1000)).toFixed(1);
  const upgCost = heroUpgradeCost(hero, heroLevel);
  const canAffordUpg = ore >= upgCost;
  return (
    <div style={{
      background: unlocked ? "linear-gradient(135deg,#3a1e0a,#2a1608)" : "linear-gradient(135deg,#2e2610,#242010)",
      border:`1px solid ${managed?"#8a6828":unlocked?"#6a3a18":"#4a3818"}`,
      borderRadius:10, padding:"10px 12px", position:"relative",
      boxShadow: managed ? "inset 0 0 14px #ffcc2210" : "none",
    }}>
      {managed && <div style={{ position:"absolute", top:6, right:8, color:"#ffcc44", fontSize:9, fontWeight:700, background:"#1a1400", padding:"2px 5px", borderRadius:3, border:"1px solid #3a3000" }}>AUTO</div>}
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ position:"relative", flexShrink:0 }}>
          <div onClick={() => onPortraitClick && onPortraitClick(hero.id)} style={{ fontSize:26, width:42, height:42, background:unlocked?"#3a1e0c":"#2a1e0e", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", border:`1px solid ${unlocked?"#7a4820":"#4a3418"}`, filter:adventuring?"drop-shadow(0 0 7px #ff8c3a)":"none", opacity:unlocked?1:0.7, cursor:"pointer", overflow:"hidden", WebkitTapHighlightColor:"transparent" }}>
            {HERO_IMAGES[hero.id] ? <img src={HERO_IMAGES[hero.id]} alt={hero.name} style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top" }} /> : hero.emoji}
          </div>
          {unlocked && heroLevel > 0 && (
            <div style={{ position:"absolute", bottom:-4, right:-4, background:"#5a3a00", border:"1px solid #cc8800", borderRadius:4, padding:"1px 4px", fontSize:8, fontWeight:900, color:"#ffcc44" }}>Lv{heroLevel}</div>
          )}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ color:unlocked?"#ffe8a0":"#ddbb80", fontWeight:700, fontSize:13 }}>{hero.name}</div>
          {unlocked ? (
            <div style={{ fontSize:11, marginTop:2 }}>
              <span style={{ color:"#ffdd44", fontWeight:700 }}>{fmt(effOre)} ore/run</span>
              <span style={{ color:"#998844", marginLeft:6 }}>{orePerSec}/sec · {(effTime/1000).toFixed(1)}s</span>
              {heroLevel > 0 && <span style={{ color:"#cc8822", marginLeft:5 }}>({Math.round(levelMult*100)}% power)</span>}
            </div>
          ) : (
            <div style={{ color:"#bb8833", fontSize:11 }}>+{fmt(hero.baseReturn)} base ore/run</div>
          )}
        </div>
        {!unlocked ? (
          <button onClick={() => ore >= hero.unlockCost && onUnlock(hero.id)} style={{
            background: ore>=hero.unlockCost?"linear-gradient(135deg,#c06828,#8a4010)":"linear-gradient(135deg,#2a1e0c,#1e1508)",
            border:`1px solid ${ore>=hero.unlockCost?"#e07830":"#4a3418"}`,
            borderRadius:6, padding:"6px 10px",
            color:ore>=hero.unlockCost?"#fff0cc":"#bb8844",
            fontSize:11, fontWeight:900, cursor:ore>=hero.unlockCost?"pointer":"default", whiteSpace:"nowrap",
          }}>🪨 {fmt(hero.unlockCost)}</button>
        ) : managed ? (
          <div style={{ color:"#ffcc44", fontSize:11, fontWeight:700, minWidth:32, textAlign:"right" }}>
            {adventuring ? `${(timeLeft/1000).toFixed(1)}s` : "↻"}
          </div>
        ) : adventuring ? (
          <div style={{ color:"#ff8c3a", fontSize:11, fontWeight:700 }}>{(timeLeft/1000).toFixed(1)}s</div>
        ) : (
          <button onClick={() => onSend(hero.id)} style={{ background:"linear-gradient(135deg,#c06020,#803010)", border:"none", borderRadius:6, padding:"6px 12px", color:"#ffdd99", fontSize:12, fontWeight:700, cursor:"pointer" }}>Send</button>
        )}
      </div>
      {/* Progress bar */}
      <div style={{ marginTop:8, height:3, background:"#1a0e05", borderRadius:2, overflow:"hidden" }}>
        <div style={{ height:"100%", width:adventuring?`${returnPct*100}%`:"0%", background:managed?"linear-gradient(90deg,#cc9900,#ffdd44)":"linear-gradient(90deg,#ff6020,#ffaa40)", borderRadius:2, transition: adventuring ? "width 0.1s linear" : "width 0s" }} />
      </div>
      {/* Upgrade buttons — 1 and MAX */}
      {unlocked && (() => {
        // Max calc
        let maxBought = 0, maxCost = 0, rem = ore;
        for (let i = 0; i < 99999; i++) {
          const c = heroUpgradeCost(hero, heroLevel + i);
          if (rem < c) break;
          rem -= c; maxCost += c; maxBought++;
        }
        const canMax = maxBought > 0;
        return (
          <div style={{ display:"flex", gap:6, marginTop:8 }}>
            <button onClick={() => canAffordUpg && onUpgrade(hero.id, 1)} style={{
              flex:1, padding:"6px 0", borderRadius:6,
              background: canAffordUpg ? "linear-gradient(135deg,#5a3a00,#3a2400)" : "linear-gradient(135deg,#1e1a0a,#181408)",
              border:`1px solid ${canAffordUpg?"#cc8800":"#4a3c18"}`,
              color: canAffordUpg ? "#ffdd66" : "#776030",
              fontSize:11, fontWeight:700, cursor:canAffordUpg?"pointer":"default",
              display:"flex", flexDirection:"column", alignItems:"center", gap:1,
            }}>
              <span>⬆ ×1</span>
              <span style={{ color:canAffordUpg?"#ffaa33":"#5a4020", fontSize:9 }}>🪨{fmt(upgCost)}</span>
            </button>
            <button onClick={() => canMax && onUpgrade(hero.id, "max")} style={{
              flex:1, padding:"6px 0", borderRadius:6,
              background: canMax ? "linear-gradient(135deg,#004a20,#003018)" : "linear-gradient(135deg,#1e1a0a,#181408)",
              border:`1px solid ${canMax?"#00aa44":"#4a3c18"}`,
              color: canMax ? "#44ff88" : "#336030",
              fontSize:11, fontWeight:700, cursor:canMax?"pointer":"default",
              display:"flex", flexDirection:"column", alignItems:"center", gap:1,
            }}>
              <span>⬆ MAX {canMax?`×${maxBought}`:""}</span>
              <span style={{ color:canMax?"#00cc55":"#336030", fontSize:9 }}>🪨{fmt(maxCost)}</span>
            </button>
          </div>
        );
      })()}
    </div>
  );
}

          }}>{heroUnlocked ? `🪨 ${fmt(manager.cost)}` : "🔒 Locked"}</button>
        )}
      </div>
    </div>
  );
}

// ── UPGRADE CARD (infinite leveled) ──────────────────────────────────────────
function UpgradeCard({ def, level, ore, onBuy, heroBonus, passiveOre, tapBonus, qty, onSetQty }) {

  // Compute how many we can afford at this qty (max = buy all affordable)
  const effectiveQty = qty === "max" ? 99999 : qty;
  const affordableAtQty = (() => {
    let count = 0, remaining = ore;
    for (let i = 0; i < effectiveQty; i++) {
      const c = upgradeCost(def, level + i);
      if (remaining < c) break;
      remaining -= c;
      count++;
    }
    return count;
  })();

  // Total cost for qty levels (only what we can afford)
  const totalCost = (() => {
    let cost = 0, remaining = ore;
    for (let i = 0; i < effectiveQty; i++) {
      const c = upgradeCost(def, level + i);
      if (remaining < c) break;
      remaining -= c;
      cost += c;
    }
    return cost;
  })();

  const canAfford = affordableAtQty > 0;
  const actualQty = affordableAtQty;

  // Preview after buying actualQty levels
  const newLevel = level + actualQty;
  const newVal = actualQty > 0 ? def.getValue(newLevel - 1) : 0;
  let preview = "";
  if (def.effect === "heroBonus")  preview = `→ total ${Math.round((heroBonus + (actualQty > 0 ? def.getValue(newLevel-1) : 0))*100)}% bonus`;
  if (def.effect === "passiveOre") preview = `→ total ${fmt(passiveOre + (actualQty > 0 ? def.getValue(newLevel-1) : 0))}/sec`;
  if (def.effect === "tapBonus")   preview = `→ total ${Math.round((tapBonus + (actualQty > 0 ? def.getValue(newLevel-1) : 0))*100)}% bonus`;

  const QTY_OPTIONS = [1, 5, 10, 25, 100, "max"];

  return (
    <div style={{
      background: canAfford ? "linear-gradient(135deg,#46280e,#341e0a)" : "linear-gradient(135deg,#2c2614,#221e10)",
      border:`1px solid ${canAfford?"#aa6018":"#6a5a28"}`,
      borderRadius:8, padding:"10px 12px", width:"100%",
    }}>
      {/* Header row */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:16 }}>{def.emoji}</span>
            <span style={{ color:canAfford?"#ffe88a":"#ccaa66", fontSize:13, fontWeight:700 }}>{def.name}</span>
            {level > 0 && <span style={{ background:"#3a2808", border:"1px solid #7a5020", borderRadius:4, padding:"1px 6px", color:"#ffaa44", fontSize:10, fontWeight:700 }}>Lv {level}</span>}
          </div>
          <div style={{ color:canAfford?"#ffcc55":"#aa8844", fontSize:11, marginTop:3 }}>{def.desc(level)}</div>
          {level > 0 && canAfford && <div style={{ color:"#887744", fontSize:10, marginTop:1 }}>{preview}</div>}
        </div>
        <div style={{ textAlign:"right", marginLeft:12, flexShrink:0 }}>
          <div style={{ color:canAfford?"#ffdd44":"#cc9944", fontSize:12, fontWeight:900 }}>🪨 {fmt(totalCost)}</div>
          <div style={{ color:"#665030", fontSize:10 }}>Lv {level}→{level+actualQty}</div>
        </div>
      </div>

      {/* Qty selector + buy button */}
      <div style={{ display:"flex", gap:4, marginTop:8, alignItems:"center" }}>
        <div style={{ display:"flex", gap:2, flex:1, flexWrap:"wrap" }}>
          {QTY_OPTIONS.map(q => (
            <button key={q} onClick={() => onSetQty(q)} style={{
              padding:"3px 7px", borderRadius:5, fontSize:10, fontWeight:700,
              background: qty===q ? (q==="max"?"linear-gradient(135deg,#006a30,#004a20)":"linear-gradient(135deg,#7a4010,#5a2c08)") : "#1e1608",
              border:`1px solid ${qty===q?(q==="max"?"#00cc60":"#cc6820"):"#4a3418"}`,
              color: qty===q?(q==="max"?"#44ff88":"#ffcc66"):"#886644", cursor:"pointer",
            }}>{q==="max" ? "MAX" : `×${q}`}</button>
          ))}
        </div>
        <button
          onClick={() => canAfford && onBuy(def.id, actualQty)}
          style={{
            padding:"6px 14px", borderRadius:6, fontSize:12, fontWeight:900,
            background: canAfford?"linear-gradient(135deg,#c07820,#8a5010)":"#1a1208",
            border:`1px solid ${canAfford?"#e09030":"#3a2810"}`,
            color: canAfford?"#fff0aa":"#554030",
            cursor: canAfford?"pointer":"default", whiteSpace:"nowrap",
          }}
        >Buy {actualQty > 1 ? `×${actualQty}` : ""}</button>
      </div>
    </div>
  );
}

// ── URL HASH SAVE ─────────────────────────────────────────────────────────────
// Encodes save into the URL hash so it survives artifact reloads
function saveToURL(state) {
  try {
    const code = exportSaveCode(state);
    window.location.hash = code;
  } catch {}
}

function loadFromURL() {
  try {
    const hash = window.location.hash.slice(1); // remove #
    if (!hash || hash.length < 20) return null;
    return importSaveCode(hash);
  } catch { return null; }
}

// ── SAVE MODAL ────────────────────────────────────────────────────────────────
function SaveModal({ state, onClose, onImport }) {
  const [code] = useState(() => exportSaveCode(state));
  const [input, setInput] = useState("");
  const [err, setErr] = useState("");
  const [copied, setCopied] = useState(false);
  const [imported, setImported] = useState(false);

  function handleCopy() {
    navigator.clipboard?.writeText(code).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    }).catch(() => {
      // fallback: select the textarea
      const el = document.getElementById("ef-export-code");
      if (el) { el.select(); document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2000); }
    });

  function handleImport() {
    try {
      const s = importSaveCode(input);
      onImport(s);
      setImported(true);
      setTimeout(onClose, 1200);
    } catch(e) {
      setErr(e.message);

  return (
    <div style={{ position:"fixed", inset:0, background:"#000000bb", display:"flex", alignItems:"center", justifyContent:"center", zIndex:10001, padding:"0 16px" }} onClick={e => e.target===e.currentTarget && onClose()}>

// ── MAIN GAME ─────────────────────────────────────────────────────────────────
function EmberForge() {
  const saved = loadSave();

  // Migrate old boughtUpgrades array → upgradeLevels object
  const initLevels = saved.upgradeLevels || {};
  if (saved.boughtUpgrades && Array.isArray(saved.boughtUpgrades) && !saved.upgradeLevels) {
    for (const id of saved.boughtUpgrades) { initLevels[id] = 1; }
  }

  const initAdventuring = {};
  for (const mgrId of saved.hiredManagers || []) {
    const mgr = MANAGERS.find(m => m.id === mgrId);
    if (!mgr) continue;
    const hero = HEROES.find(h => h.id === mgr.heroId);
    if (!hero) continue;
    const speed = prestigeSpeedBonus(saved.prestige || 0);
    initAdventuring[mgr.heroId] = { startTime: Date.now(), duration: effectiveReturnTime(hero, speed) };
  }

  const [ore,            setOre]            = useState(saved.ore);
  const [totalXp,        setTotalXp]        = useState(saved.totalXp);
  const [weaponTier,     setWeaponTier]     = useState(saved.weaponTier);
  const [unlockedHeroes, setUnlockedHeroes] = useState(saved.unlockedHeroes);
  const [upgradeLevels,  setUpgradeLevels]  = useState(initLevels);
  const [heroLevels,     setHeroLevels]     = useState(saved.heroLevels || {});
  const [hiredManagers,  setHiredManagers]  = useState(saved.hiredManagers);
  const [prestige,       setPrestige]       = useState(saved.prestige);
  const [adventuring,    setAdventuring]    = useState(initAdventuring);
  const [sparks,         setSparks]         = useState([]);
  const [floats,         setFloats]         = useState([]);
  const [tab,            setTab]            = useState("forge");
  const [saveToast,      setSaveToast]      = useState(false);
  const [offlineModal,   setOfflineModal]   = useState(null);
  const [rebirthStartTime, setRebirthStartTime] = useState(saved.rebirthStartTime || Date.now());
  const [totalDwarves,     setTotalDwarves]     = useState(saved.totalDwarves || 0);
  const [dwarfAssignments, setDwarfAssignments] = useState(saved.dwarfAssignments || { miners:0, smiths:0, scholars:0 });
  const [lastDwarfEarned,  setLastDwarfEarned]  = useState(0);
  const [cheatTaps,       setCheatTaps]       = useState(0);
  const [upgradeQty,      setUpgradeQty]      = useState({});  // { [defId]: qty }
  const saveReady = useRef(false); // don't write until load is complete
  const [selectedHero,    setSelectedHero]    = useState(null);
  const [showSaveModal,   setShowSaveModal]   = useState(false);
  const [importCode,      setImportCode]      = useState("");
  const [importError,     setImportError]     = useState("");
  const [importSuccess,   setImportSuccess]   = useState(false);


  const sparkId = useRef(0);

  // live refs
  const bonusRef      = useRef(calcBonuses(initLevels));
  const prestigeRef   = useRef(prestige);
  const hiredMgrsRef  = useRef(saved.hiredManagers);
  const weaponTierRef = useRef(saved.weaponTier);
  const speedRef      = useRef(prestigeSpeedBonus(saved.prestige));
  const rebirthMultRef  = useRef(1);
  const heroLevelsRef   = useRef(saved.heroLevels || {});

  useEffect(() => { bonusRef.current = calcBonuses(upgradeLevels); }, [upgradeLevels]);
  useEffect(() => { heroLevelsRef.current = heroLevels; }, [heroLevels]);
  useEffect(() => { prestigeRef.current = prestige;                   }, [prestige]);
  useEffect(() => { hiredMgrsRef.current= hiredManagers;              }, [hiredManagers]);
  useEffect(() => { weaponTierRef.current=weaponTier;                 }, [weaponTier]);
  useEffect(() => { speedRef.current    = prestigeSpeedBonus(prestige);}, [prestige]);

  const { tapBonus: upgTapBonus, heroBonus: upgHeroBonus, passiveOre: upgPassiveOre } = calcBonuses(upgradeLevels);
  const { tapBonus: dTapBonus, heroBonus: dHeroBonus, passiveOre: dPassiveOre } = dwarfBonuses(dwarfAssignments);
  const tapBonus   = upgTapBonus   + dTapBonus;
  const heroBonus  = upgHeroBonus  + dHeroBonus;
  const passiveOre = upgPassiveOre + dPassiveOre;
  const speedBonus  = prestigeSpeedBonus(prestige);
  const xpPerTap    = xpPerTapCalc(tapBonus, prestige, weaponTier);
  const currentWeapon = WEAPON_TIERS[weaponTier];
  const xpNeeded    = currentWeapon.xpNeeded;
  const onFinalTier = weaponTier >= WEAPON_TIERS.length - 1;
  const finalTierXpNeeded = WEAPON_TIERS[WEAPON_TIERS.length - 1].xpNeeded;
  const allHeroesUnlocked = HEROES.every(h => unlockedHeroes.includes(h.id));
  const allManagersHired  = MANAGERS.every(m => hiredManagers.includes(m.id));
  const weaponComplete    = onFinalTier && totalXp >= finalTierXpNeeded;
  const canPrestige       = weaponComplete && allHeroesUnlocked && allManagersHired;

  // Time bonus: +10% multiplier per hour spent this life, capped at +200% (3× total)
  const lifeSeconds = Math.floor((Date.now() - rebirthStartTime) / 1000);
  const lifeHours   = lifeSeconds / 3600;
  const timeBonus   = Math.min(lifeHours * 0.10, 2.0); // 0 to +200%
  const totalRebirthMult = (prestige + 1) * (1 + timeBonus);
  rebirthMultRef.current = totalRebirthMult; // keep ref in sync every render
  // Keep bonusRef in sync with combined upgrade + dwarf bonuses
  bonusRef.current = { tapBonus, heroBonus, passiveOre };

  // ── Notification badges ──────────────────────────────────────────────────
  // Heroes: unlockable heroes + upgradeable heroes
  const heroNotifs = HEROES.filter(h =>
    (!unlockedHeroes.includes(h.id) && ore >= h.unlockCost) ||
    (unlockedHeroes.includes(h.id) && ore >= heroUpgradeCost(h, heroLevels[h.id] || 0))
  ).length;
  // Managers: any unhired manager whose hero is unlocked and player can afford
  const mgrNotifs = MANAGERS.filter(m =>
    !hiredManagers.includes(m.id) &&
    unlockedHeroes.includes(m.heroId) &&
    ore >= m.cost
  ).length;
  // Upgrades: any upgrade the player can afford
  const upgradeNotifs = UPGRADE_DEFS.filter(def =>
    ore >= upgradeCost(def, upgradeLevels[def.id] || 0)
  ).length;
  // Rebirth: all requirements met
  const rebirthNotifs = canPrestige ? 1 : 0;

  const unassignedDwarves = totalDwarves - Object.values(dwarfAssignments).reduce((a,b)=>a+b,0);
  const dwarfNotifs = unassignedDwarves > 0 ? 1 : 0;
  const TAB_NOTIFS = { heroes: heroNotifs, managers: mgrNotifs, upgrades: upgradeNotifs, dwarves: dwarfNotifs, reincarnate: rebirthNotifs };

  // stateRef for saving
  const stateRef = useRef({});
  stateRef.current = { ore, totalXp, weaponTier, unlockedHeroes, upgradeLevels, heroLevels, hiredManagers, prestige, rebirthStartTime, totalDwarves, dwarfAssignments };

  // auto-save + save on hide
  useEffect(() => {
    const t = setInterval(() => { if (saveReady.current) writeSave(stateRef.current); }, 30000);
    const onHide = () => { if (document.visibilityState === "hidden" && saveReady.current) writeSave(stateRef.current); };
    document.addEventListener("visibilitychange", onHide);
    window.addEventListener("pagehide", onHide);
    return () => { clearInterval(t); document.removeEventListener("visibilitychange", onHide); window.removeEventListener("pagehide", onHide); };
  }, []);

  // offline earnings on mount + URL hash load (highest priority) + IDB load
  useEffect(() => {
    (async () => {
      // 1. Try URL hash first — survives artifact reloads
      const urlSave = loadFromURL();
      // 2. Try IndexedDB
      const idbSave = await loadSaveAsync();
      // Pick the freshest save across all sources
      const candidates = [urlSave, idbSave].filter(Boolean);
      const best = candidates.reduce((a, b) => {
        if (!a) return b;
        if (!b) return a;
        return (a.savedAt || 0) > (b.savedAt || 0) ? a : b;
      }, null);
      if (best && best.savedAt && (!saved.savedAt || best.savedAt > saved.savedAt)) {
        // Found a fresher save — apply it
        const s = best;
        setOre(s.ore || 0);
        setTotalXp(s.totalXp || 0);
        setWeaponTier(s.weaponTier || 0);
        setUnlockedHeroes(s.unlockedHeroes || [1]);
        setUpgradeLevels(s.upgradeLevels || {});
        setHeroLevels(s.heroLevels || {});
        setHiredManagers(s.hiredManagers || []);
        setPrestige(s.prestige || 0);
        setTotalDwarves(s.totalDwarves || 0);
        setDwarfAssignments(s.dwarfAssignments || { miners:0, smiths:0, scholars:0 });
        setRebirthStartTime(s.rebirthStartTime || Date.now());
        // Restart managed heroes
        const spd = prestigeSpeedBonus(s.prestige || 0);
        const adv = {};
        for (const mgrId of s.hiredManagers || []) {
          const mgr = MANAGERS.find(m => m.id === mgrId);
          if (!mgr) continue;
          const hero = HEROES.find(h => h.id === mgr.heroId);
          if (!hero) continue;
          adv[hero.id] = { startTime: Date.now(), duration: effectiveReturnTime(hero, spd) };
        }
        if (Object.keys(adv).length > 0) setAdventuring(adv);
        // Apply offline earnings from IDB save
        const offline = calcOfflineEarnings(s);
        if (offline.ore > 0) { setOre(o => o + offline.ore); setOfflineModal(offline); }
      } else {
        // Use localStorage save (already loaded synchronously)
        const offline = calcOfflineEarnings(saved);
        if (offline.ore > 0) { setOre(o => o + offline.ore); setOfflineModal(offline); }
      }
      saveReady.current = true;
      setTimeout(() => writeSave(stateRef.current, true), 800);
    })();
  }, []);

  // passive ore tick — single stable interval
  useEffect(() => {
    const t = setInterval(() => {
      // read directly from bonusRef so it is always fresh
      const po = bonusRef.current.passiveOre;
      if (po > 0) setOre(o => o + po);
    }, 1000);
    return () => clearInterval(t);
  }, []); // runs once on mount, never recreated

  // sendHero
  const sendHeroRef = useRef(null);
  const sendHero = useCallback((heroId) => {
    const hero = HEROES.find(h => h.id === heroId);
    if (!hero) return;
    const dur = effectiveReturnTime(hero, speedRef.current);
    setAdventuring(prev => ({ ...prev, [heroId]: { startTime: Date.now(), duration: dur } }));
  }, []);
  sendHeroRef.current = sendHero;

  // hero return tick — stable interval, inline redispatch for managed heroes
  useEffect(() => {
    const t = setInterval(() => {
      const now = Date.now();
      setAdventuring(prev => {
        const next = { ...prev };
        let gained = 0, changed = false;
        for (const [idStr, adv] of Object.entries(prev)) {
          if (now - adv.startTime >= adv.duration) {
            const heroId = Number(idStr);
            const hero = HEROES.find(h => h.id === heroId);
            if (!hero) { delete next[idStr]; changed = true; continue; }
            // Calculate ore earned with hero's own level
            const heroLvl = heroLevelsRef.current[heroId] || 0;
            const levelMult = 1 + heroLvl * 0.25;
            const mult = levelMult
              * (1 + bonusRef.current.heroBonus)
              * weaponMultiplier(weaponTierRef.current)
              * rebirthMultRef.current;
            gained += Math.floor(hero.baseReturn * mult);
            // Check if managed — redispatch inline immediately
            const mgr = MANAGERS.find(m => m.heroId === heroId);
            const isManaged = mgr && hiredMgrsRef.current.includes(mgr.id);
            if (isManaged) {
              // Immediately restart — no setTimeout, no gap
              const dur = effectiveReturnTime(hero, speedRef.current);
              next[heroId] = { startTime: now, duration: dur };
            } else {
              delete next[idStr];
            }
            changed = true;
          }
        }
        if (gained > 0) setOre(o => o + gained);
        return changed ? next : prev;
      });
    }, 150);
    return () => clearInterval(t);
  }, []);

  // forge tap
  const handleForge = useCallback((cx, cy) => {
    const gained = xpPerTap;
    setTotalXp(prev => {
      const next = prev + gained;
      const isLastTier = weaponTier >= WEAPON_TIERS.length - 1;
      if (!isLastTier && next >= xpNeeded) {
        setWeaponTier(t => t + 1); return 0;
      }
      // On final tier, cap at xpNeeded so bar fills and stays full
      return isLastTier ? Math.min(next, xpNeeded) : next;
    });
    setSparks(s => [...s, ...Array.from({ length:5 }, () => ({ id:sparkId.current++, x:cx, y:cy }))]);
    setFloats(f => [...f, { id:sparkId.current++, x:cx, y:cy-20, text:`+${fmt(gained)} XP`, color:currentWeapon.glow }]);
  }, [xpPerTap, xpNeeded, weaponTier, currentWeapon]);

  const unlockHero = useCallback((heroId) => {
    const hero = HEROES.find(h => h.id === heroId);
    setOre(o => { if (o < hero.unlockCost) return o; return o - hero.unlockCost; });
    setUnlockedHeroes(prev => prev.includes(heroId) ? prev : [...prev, heroId]);
  }, []);

  const buyUpgrade = useCallback((id, qty = 1) => {
    const def = UPGRADE_DEFS.find(d => d.id === id);
    if (!def) return;
    const effectiveQty = qty === "max" ? 99999 : qty;
    // Calculate outside setters using current ref values
    const currentLevel = upgradeLevels[id] || 0;
    let bought = 0;
    let totalCost = 0;
    let remaining = ore;
    for (let i = 0; i < effectiveQty; i++) {
      const cost = upgradeCost(def, currentLevel + i);
      if (remaining < cost) break;
      remaining -= cost;
      totalCost += cost;
      bought++;
    }
    if (bought === 0) return;
    setOre(o => o - totalCost);
    setUpgradeLevels(prev => ({ ...prev, [id]: (prev[id] || 0) + bought }));
  }, [upgradeLevels, ore]);

  const handleImport = useCallback((s) => {
    setOre(s.ore || 0);
    setTotalXp(s.totalXp || 0);
    setWeaponTier(s.weaponTier || 0);
    setUnlockedHeroes(s.unlockedHeroes || [1]);
    setUpgradeLevels(s.upgradeLevels || {});
    setHeroLevels(s.heroLevels || {});
    setHiredManagers(s.hiredManagers || []);
    setPrestige(s.prestige || 0);
    setTotalDwarves(s.totalDwarves || 0);
    setDwarfAssignments(s.dwarfAssignments || { miners:0, smiths:0, scholars:0 });
    setRebirthStartTime(s.rebirthStartTime || Date.now());
    setAdventuring({});
    writeSave(s);
    setTimeout(() => window.location.reload(), 800);
  }, []);

  const buyHeroUpgrade = useCallback((heroId, qty = 1) => {
    const hero = HEROES.find(h => h.id === heroId);
    if (!hero) return;
    const effectiveQty = qty === "max" ? 99999 : qty;
    const currentLevel = heroLevels[heroId] || 0;
    let bought = 0, totalCost = 0, remaining = ore;
    for (let i = 0; i < effectiveQty; i++) {
      const cost = heroUpgradeCost(hero, currentLevel + i);
      if (remaining < cost) break;
      remaining -= cost;
      totalCost += cost;
      bought++;
    }
    if (bought === 0) return;
    setOre(o => o - totalCost);
    setHeroLevels(prev => ({ ...prev, [heroId]: (prev[heroId] || 0) + bought }));
  }, [heroLevels, ore]);

  const hireManager = useCallback((managerId) => {
    const mgr = MANAGERS.find(m => m.id === managerId);
    if (!mgr) return;
    setOre(o => { if (o < mgr.cost) return o; return o - mgr.cost; });
    setHiredManagers(prev => prev.includes(managerId) ? prev : [...prev, managerId]);
    setAdventuring(prev => {
      if (prev[mgr.heroId]) return prev;
      const hero = HEROES.find(h => h.id === mgr.heroId);
      return { ...prev, [mgr.heroId]: { startTime: Date.now(), duration: effectiveReturnTime(hero, speedRef.current) } };
    });
  }, []);

  const doPrestige = () => {
    const np = prestige + 1;
    // Award dwarves based on life duration
    const earned = dwarfsEarnedOnRebirth(lifeHours, np);
    setTotalDwarves(prev => prev + earned);
    setLastDwarfEarned(earned);
    setPrestige(np);
    setWeaponTier(0); setTotalXp(0); setOre(0);
    setAdventuring({});
    setUpgradeLevels({});
    setUnlockedHeroes([1]);
    setHiredManagers([]);
    setHeroLevels({});
    setRebirthStartTime(Date.now());
    // Keep dwarfAssignments — dwarves are permanent
    setTimeout(() => writeSave(stateRef.current), 100);
  };

  const now = Date.now();
  const TABS = [
    { id:"forge",       label:"⚒ Forge"    },
    { id:"heroes",      label:"⚔ Heroes"   },
    { id:"managers",    label:"📋 Managers" },
    { id:"upgrades",    label:"⬆ Upgrades" },
    { id:"dwarves",     label:"🪨 Dwarves"  },
    { id:"reincarnate", label:"✦ Rebirth"  },
  ];

  return (
    <div style={{ height:"100vh", background:"radial-gradient(ellipse at 50% 0%,#3d1e08 0%,#2a1206 40%,#1a0d04 100%)", fontFamily:"'Georgia',serif", color:"#e8c090", display:"flex", flexDirection:"column", alignItems:"center", overflow:"hidden", position:"fixed", inset:0, userSelect:"none", WebkitUserSelect:"none", WebkitTouchCallout:"none" }}>
      <div style={{ position:"fixed", top:-100, left:"50%", transform:"translateX(-50%)", width:600, height:300, background:"radial-gradient(ellipse,#ff450015 0%,transparent 70%)", pointerEvents:"none", zIndex:0 }} />

      {sparks.map(s => <Spark key={s.id} x={s.x} y={s.y} onDone={() => setSparks(sp => sp.filter(x => x.id!==s.id))} />)}
      {floats.map(f => <FloatText key={f.id} x={f.x} y={f.y} text={f.text} color={f.color} onDone={() => setFloats(fl => fl.filter(x => x.id!==f.id))} />)}
      <SaveToast show={saveToast} />
      {offlineModal && <OfflineModal data={offlineModal} onClose={() => setOfflineModal(null)} />}
      {showSaveModal && <SaveModal state={stateRef.current} onClose={() => setShowSaveModal(false)} onImport={handleImport} />}
      {selectedHero && (() => { const h = HEROES.find(x => x.id === selectedHero); if (!h) return null; const lvl = heroLevels[h.id]||0; const spd = speedBonus; const eff = Math.floor(h.baseReturn*(1+heroBonus)*weaponMultiplier(weaponTier)*(prestige>0?prestige+1:1)*(1+lvl*0.25)); const effT = effectiveReturnTime(h,spd); return <HeroModal hero={h} heroLevel={lvl} effOre={eff} effTime={effT} onClose={() => setSelectedHero(null)} />; })()}

      {/* HEADER */}
      <div style={{ width:"100%", maxWidth:520, padding:"16px 16px 0", flexShrink:0, zIndex:100 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div
              onClick={() => {
                setCheatTaps(n => {
                  const next = n + 1;
                  if (next >= 5) {
                    // CHEAT: unlock all heroes, hire all managers, give 1B ore
                    setOre(o => o + 1000000000);
                    setUnlockedHeroes(HEROES.map(h => h.id));
                    setHiredManagers(MANAGERS.map(m => m.id));
                    // Dispatch all heroes
                    setAdventuring(() => {
                      const newAdv = {};
                      for (const hero of HEROES) {
                        const dur = effectiveReturnTime(hero, speedRef.current);
                        newAdv[hero.id] = { startTime: Date.now(), duration: dur };
                      }
                      return newAdv;
                    });
                    return 0;
                  }
                  return next;
                });
              }}
              style={{ fontSize:20, fontWeight:900, letterSpacing:2, background:"linear-gradient(90deg,#ff8c35,#ffcc66,#ff6010)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", whiteSpace:"nowrap", cursor:"pointer", userSelect:"none" }}>
              ⚒ EMBER FORGE{cheatTaps > 0 && cheatTaps < 5 ? ` (${5-cheatTaps})` : ""}
            </div>
            <div style={{ display:"flex", gap:4, marginTop:3, flexWrap:"nowrap", overflow:"hidden" }}>
              {prestige > 0 && <span style={{ color:"#c084fc", fontSize:10, whiteSpace:"nowrap" }}>✦ R{prestige} +{Math.round(speedBonus*100)}%spd</span>}
              {heroBonus > 0 && <span style={{ color:"#ffcc44", fontSize:10, whiteSpace:"nowrap" }}>⛏+{Math.round(heroBonus*100)}%</span>}
              {passiveOre > 0 && <span style={{ color:"#88cc44", fontSize:10, whiteSpace:"nowrap" }}>+{fmt(passiveOre)}/s</span>}
            </div>
          </div>
          <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
            <div style={{ color:"#ffaa44", fontSize:22, fontWeight:900, whiteSpace:"nowrap" }}>🪨 {fmt(ore)}</div>
            <button onClick={() => { writeSave(stateRef.current, true); setSaveToast(true); setTimeout(()=>setSaveToast(false),1600); }} style={{ background:"none", border:"none", color:"#7a6030", fontSize:10, cursor:"pointer", padding:0 }}>💾 Save</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:3, marginTop:12 }}>
          {TABS.map(t => {
            const notif = TAB_NOTIFS[t.id] || 0;
            return (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, padding:"6px 0", borderRadius:7, background:tab===t.id?"linear-gradient(135deg,#3a1a05,#5a2808)":"transparent", border:`1px solid ${tab===t.id?"#8a4818":"#4a3418"}`, color:tab===t.id?"#ffdd88":"#bb8844", fontSize:10, fontWeight:700, cursor:"pointer", position:"relative" }}>
                {t.label}
                {notif > 0 && (
                  <span style={{ position:"absolute", top:-5, right:-3, background:"#e53e3e", color:"#fff", fontSize:9, fontWeight:900, borderRadius:"50%", width:14, height:14, display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1, border:"1px solid #ff6666" }}>
                    {notif > 9 ? "9+" : notif}
                  </span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ width:"100%", maxWidth:520, padding:"16px 16px 40px", flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>

        {/* FORGE */}
        {tab==="forge" && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:20 }}>
            <ForgeButton weaponTier={weaponTier} onForge={handleForge} totalXp={totalXp} xpNeeded={xpNeeded} xpPerTap={xpPerTap} weaponMultiplierVal={weaponMultiplier(weaponTier)} speedBonus={speedBonus} prestige={prestige} />
            <div style={{ background:"linear-gradient(135deg,#281608,#1e1006)", border:"1px solid #5a3010", borderRadius:10, padding:"12px 14px", width:"100%" }}>
              <div style={{ color:"#aa7030", fontSize:11, marginBottom:8, letterSpacing:1 }}>WEAPON TIERS — each tier gives +50% hero ore</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {WEAPON_TIERS.map((w,i) => (
                  <div key={i} style={{ padding:"3px 7px", borderRadius:5, fontSize:10, background:i<weaponTier?"#162208":i===weaponTier?"#2a1005":"#120a03", border:`1px solid ${i<weaponTier?"#2a5015":i===weaponTier?w.glow+"66":"#1a1205"}`, color:i<weaponTier?"#4a8030":i===weaponTier?w.glow:"#3a2810" }}>{w.emoji} {i<weaponTier?"✓":w.name.split(" ")[0]}</div>
                ))}
              </div>
            </div>
            <div style={{ color:"#776040", fontSize:11, textAlign:"center" }}>
              {canPrestige
                ? <span style={{color:"#c084fc", fontWeight:700}}>✦ Ready to Reincarnate! Go to the Rebirth tab.</span>
                : <span>onFinalTier ? "Fill the Screaming Void Spear bar to Reincarnate" : `Reach Screaming Void Spear to unlock Rebirth`</span>}
            </div>
          </div>
        )}

        {/* HEROES */}
        {tab==="heroes" && (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {HEROES.map(hero => {
              const unlocked = unlockedHeroes.includes(hero.id);
              const adv = adventuring[hero.id];
              const timeLeft = adv ? Math.max(0, adv.duration-(now-adv.startTime)) : 0;
              const returnPct = adv ? Math.min(1,(now-adv.startTime)/adv.duration) : 0;
              const mgr = MANAGERS.find(m => m.heroId===hero.id);
              const managed = mgr ? hiredManagers.includes(mgr.id) : false;
              return <HeroCard key={hero.id} hero={hero} unlocked={unlocked} ore={ore} adventuring={!!adv} timeLeft={timeLeft} returnPct={returnPct} onUnlock={unlockHero} onSend={sendHero} managed={managed} heroBonus={heroBonus} speedBonus={speedBonus} weaponTier={weaponTier} prestige={prestige} heroLevel={heroLevels[hero.id]||0} onUpgrade={buyHeroUpgrade} onPortraitClick={setSelectedHero} />;
            })}
          </div>
        )}

        {/* MANAGERS */}
        {tab==="managers" && (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ background:"linear-gradient(135deg,#2e2208,#221a06)", border:"1px solid #6a5018", borderRadius:10, padding:"10px 14px", marginBottom:4 }}>
              <div style={{ color:"#ffe880", fontWeight:700, fontSize:13 }}>💼 Guild Management Office</div>
              <div style={{ color:"#ccaa55", fontSize:11, marginTop:2 }}>Hire managers to auto-dispatch heroes. Everything resets on Reincarnation — but you'll be much faster.</div>
            </div>
            {MANAGERS.map(mgr => (
              <ManagerCard key={mgr.id} manager={mgr} hired={hiredManagers.includes(mgr.id)} ore={ore} onHire={hireManager} heroUnlocked={unlockedHeroes.includes(mgr.heroId)} />
            ))}
          </div>
        )}

        {/* DWARVES */}
        {tab==="dwarves" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {/* Summary banner */}
            <div style={{ background:"linear-gradient(135deg,#1e180a,#16120a)", border:"1px solid #6a5020", borderRadius:12, padding:"14px 16px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                <span style={{ fontSize:28 }}>⛏️</span>
                <div>
                  <div style={{ color:"#ffdd88", fontWeight:700, fontSize:15 }}>Dwarven Guild</div>
                  <div style={{ color:"#cc9944", fontSize:11 }}>Earned on Reincarnation · permanent across lives</div>
                </div>
                <div style={{ marginLeft:"auto", textAlign:"right" }}>
                  <div style={{ color:"#ffcc44", fontSize:22, fontWeight:900 }}>{totalDwarves}</div>
                  <div style={{ color:"#886630", fontSize:10 }}>total dwarves</div>
                </div>
              </div>
              {/* Unassigned count */}
              {unassignedDwarves > 0 ? (
                <div style={{ background:"#2a1e08", border:"1px solid #8a6020", borderRadius:8, padding:"6px 10px", color:"#ffcc44", fontSize:12, fontWeight:700 }}>
                  ⚠ {unassignedDwarves} unassigned dwarf{unassignedDwarves!==1?"s":""} — assign them below!
                </div>
              ) : totalDwarves > 0 ? (
                <div style={{ background:"#0e1a08", border:"1px solid #3a6020", borderRadius:8, padding:"6px 10px", color:"#88cc44", fontSize:12 }}>
                  ✓ All dwarves assigned
                </div>
              ) : (
                <div style={{ background:"#1a1208", border:"1px solid #3a2810", borderRadius:8, padding:"8px 10px", color:"#886640", fontSize:11 }}>
                  Reincarnate to earn dwarves. Longer lives earn more!<br/>
                  <span style={{color:"#cc8830"}}>3 base + 1/hour played + 1/reincarnation number</span>
                </div>
              )}
            </div>

            {/* Next rebirth preview */}
            {totalDwarves === 0 && (
              <div style={{ background:"linear-gradient(135deg,#1a1a2a,#12121e)", border:"1px solid #4a3a6a", borderRadius:10, padding:"12px 14px" }}>
                <div style={{ color:"#c084fc", fontWeight:700, fontSize:12, marginBottom:4 }}>Next Reincarnation Dwarf Reward</div>
                <div style={{ color:"#a070e0", fontSize:12 }}>
                  At current pace: <span style={{color:"#e0c0ff", fontWeight:700}}>{dwarfsEarnedOnRebirth(lifeHours, 1)} dwarves</span>
                  <span style={{color:"#6a5080", fontSize:10, marginLeft:4}}>(play longer for more!)</span>
                </div>
              </div>
            )}

            {/* Job assignment cards */}
            {totalDwarves > 0 && DWARF_JOBS.map(job => {
              const assigned = dwarfAssignments[job.id] || 0;
              const b = job.bonus(assigned);
              const bonusStr = b.passiveOre ? `+${fmt(b.passiveOre)}/sec` : b.heroBonus ? `+${Math.round(b.heroBonus*100)}% hero ore` : `+${Math.round((b.tapBonus||0)*100)}% XP/tap`;
              return (
                <div key={job.id} style={{ background:"linear-gradient(135deg,#1e1a0a,#181408)", border:`1px solid ${assigned>0?"#8a6020":"#4a3a18"}`, borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <span style={{ fontSize:24 }}>{job.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ color:job.color, fontWeight:700, fontSize:13 }}>{job.name}</div>
                      <div style={{ color:"#887744", fontSize:11 }}>{job.desc}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ color:assigned>0?job.color:"#554030", fontSize:18, fontWeight:900 }}>{assigned}</div>
                      <div style={{ color:"#554030", fontSize:9 }}>assigned</div>
                    </div>
                  </div>
                  {assigned > 0 && (
                    <div style={{ background:"#0e1408", border:"1px solid #2a4018", borderRadius:6, padding:"5px 10px", marginBottom:8, color:"#88cc44", fontSize:11 }}>
                      Current bonus: <strong>{bonusStr}</strong>
                    </div>
                  )}
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={() => {
                      if (assigned <= 0) return;
                      setDwarfAssignments(prev => ({ ...prev, [job.id]: prev[job.id] - 1 }));
                    }} style={{ flex:1, padding:"7px 0", borderRadius:6, background:assigned>0?"linear-gradient(135deg,#3a1a08,#2a1206)":"#111008", border:`1px solid ${assigned>0?"#6a3010":"#2a2010"}`, color:assigned>0?"#ff8844":"#3a2810", fontSize:16, fontWeight:900, cursor:assigned>0?"pointer":"default" }}>−</button>
                    <button onClick={() => {
                      if (unassignedDwarves <= 0) return;
                      setDwarfAssignments(prev => ({ ...prev, [job.id]: (prev[job.id]||0) + 1 }));
                    }} style={{ flex:1, padding:"7px 0", borderRadius:6, background:unassignedDwarves>0?"linear-gradient(135deg,#1a3a08,#122a06)":"#0e1008", border:`1px solid ${unassignedDwarves>0?"#3a8020":"#1a2810"}`, color:unassignedDwarves>0?"#88ee44":"#2a3818", fontSize:16, fontWeight:900, cursor:unassignedDwarves>0?"pointer":"default" }}>+</button>
                    <button onClick={() => {
                      const toAdd = unassignedDwarves;
                      if (toAdd <= 0) return;
                      setDwarfAssignments(prev => ({ ...prev, [job.id]: (prev[job.id]||0) + toAdd }));
                    }} style={{ padding:"7px 12px", borderRadius:6, background:unassignedDwarves>0?"linear-gradient(135deg,#1a2e08,#122008)":"#0e1008", border:`1px solid ${unassignedDwarves>0?"#3a6020":"#1a2810"}`, color:unassignedDwarves>0?"#66cc33":"#2a3818", fontSize:11, fontWeight:700, cursor:unassignedDwarves>0?"pointer":"default" }}>All</button>
                  </div>
                </div>
              );
            })}

            {/* Rebirth dwarf preview */}
            {totalDwarves > 0 && (
              <div style={{ background:"linear-gradient(135deg,#1a1a2a,#12121e)", border:"1px solid #4a3a6a", borderRadius:10, padding:"12px 14px" }}>
                <div style={{ color:"#c084fc", fontWeight:700, fontSize:12, marginBottom:4 }}>Next Reincarnation Will Earn</div>
                <div style={{ color:"#e0c0ff", fontSize:14, fontWeight:900 }}>
                  +{dwarfsEarnedOnRebirth(lifeHours, prestige+1)} dwarves
                  <span style={{ color:"#6a5080", fontSize:10, fontWeight:400, marginLeft:6 }}>({totalDwarves + dwarfsEarnedOnRebirth(lifeHours, prestige+1)} total)</span>
                </div>
                <div style={{ color:"#7755aa", fontSize:10, marginTop:4 }}>Play longer before reincarnating for more!</div>
              </div>
            )}
          </div>
        )}

        {/* REINCARNATE */}
        {tab==="reincarnate" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {/* Gate checklist */}
            <div style={{ background:"linear-gradient(135deg,#2a1a08,#1e1206)", border:"1px solid #6a4018", borderRadius:12, padding:"16px" }}>
              <div style={{ color:"#ffdd88", fontWeight:700, fontSize:15, marginBottom:12 }}>✦ Rebirth Requirements</div>
              {[
                { label:"Complete Screaming Void Spear", done: weaponComplete,     detail: weaponComplete ? "Done!" : `${fmt(totalXp)} / ${fmt(finalTierXpNeeded)} XP` },
                { label:"Unlock all 8 heroes",           done: allHeroesUnlocked,  detail: allHeroesUnlocked ? "Done!" : `${unlockedHeroes.length} / 8` },
                { label:"Hire all 8 managers",           done: allManagersHired,   detail: allManagersHired ? "Done!" : `${hiredManagers.length} / 8` },
              ].map(r => (
                <div key={r.label} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                  <div style={{ width:22, height:22, borderRadius:"50%", background:r.done?"#2a5018":"#2a1a08", border:`2px solid ${r.done?"#5aaa30":"#4a3010"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <span style={{ color:r.done?"#88ff66":"#554020", fontSize:12, fontWeight:900 }}>{r.done?"✓":"·"}</span>
                  </div>
                  <div>
                    <div style={{ color:r.done?"#88ff66":"#ccaa60", fontSize:12, fontWeight:700 }}>{r.label}</div>
                    <div style={{ color:r.done?"#4a8030":"#886630", fontSize:10 }}>{r.detail}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Time bonus */}
            <div style={{ background:"linear-gradient(135deg,#1a1a2a,#12121e)", border:"1px solid #4a3a6a", borderRadius:12, padding:"14px 16px" }}>
              <div style={{ color:"#c084fc", fontWeight:700, fontSize:13, marginBottom:6 }}>⏳ Time Bonus</div>
              <div style={{ color:"#a070e0", fontSize:12 }}>
                Life time: <span style={{color:"#e0c0ff", fontWeight:700}}>{Math.floor(lifeHours)}h {Math.floor((lifeHours%1)*60)}m</span>
              </div>
              <div style={{ color:"#a070e0", fontSize:12, marginTop:4 }}>
                Time bonus: <span style={{color:"#e0c0ff", fontWeight:700}}>+{Math.round(timeBonus*100)}%</span>
                <span style={{color:"#6a5080", fontSize:10}}> (max +200% at 20h)</span>
              </div>
              <div style={{ marginTop:8, height:6, background:"#1a1228", borderRadius:3, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${Math.min(timeBonus/2*100,100)}%`, background:"linear-gradient(90deg,#7c3aed,#c084fc)", borderRadius:3, transition:"width 1s" }} />
              </div>
              <div style={{ color:"#8855cc", fontSize:11, marginTop:6 }}>
                Total rebirth multiplier: <span style={{color:"#ffcc44", fontWeight:900, fontSize:14}}>{totalRebirthMult.toFixed(2)}×</span>
                <span style={{color:"#554430", fontSize:10}}> (base {prestige+1}× + time)</span>
              </div>
            </div>

            {/* Progress toward reincarnation */}
            <div style={{ background:"linear-gradient(135deg,#1e1a10,#181408)", border:`1px solid ${canPrestige?"#a855f7":"#4a3a18"}`, borderRadius:12, padding:"16px" }}>
              <div style={{ color:canPrestige?"#c084fc":"#aa8844", fontWeight:700, fontSize:13, marginBottom:8 }}>
                {canPrestige ? "🌀 Ready to Reincarnate!" : "⚔ Path to Reincarnation"}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {WEAPON_TIERS.map((w, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:16, opacity: i <= weaponTier ? 1 : 0.4 }}>{w.emoji}</span>
                    <div style={{ flex:1, height:6, background:"#1a0e05", borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width: i < weaponTier ? "100%" : i === weaponTier ? `${Math.min(100,(totalXp/(w.xpNeeded||1))*100)}%` : "0%", background: i < weaponTier ? "#4a8030" : `linear-gradient(90deg,${w.color},${w.glow})`, borderRadius:3, transition:"width 0.3s" }} />
                    </div>
                    <span style={{ fontSize:10, color: i < weaponTier ? "#4a8030" : i === weaponTier ? w.glow : "#3a2810", minWidth:28 }}>
                      {i < weaponTier ? "✓" : i === weaponTier ? `${Math.round(Math.min(100,(totalXp/(w.xpNeeded||1))*100))}%` : ""}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Rewards preview */}
            <div style={{ background:"linear-gradient(135deg,#1e1230,#160e24)", border:"1px solid #6b21a8", borderRadius:12, padding:"16px" }}>
              <div style={{ color:"#c084fc", fontWeight:700, fontSize:13, marginBottom:10 }}>Next Reincarnation Rewards</div>
              {[
                { emoji:"🪙", label:"Ore multiplier", now:`${prestige+1}×`, next:`${prestige+2}×`, color:"#ffaa44" },
                { emoji:"⚡", label:"Hero speed", now:`+${Math.round(speedBonus*100)}%`, next:`+${Math.round(prestigeSpeedBonus(prestige+1)*100)}%`, color:"#88ff88" },
                { emoji:"🛡️", label:"Managers", now:"Reset", next:"Reset", color:"#ff8888" },
                { emoji:"🔁", label:"Resets", now:"—", next:"Ore, Upgrades, Heroes, Weapons", color:"#ff8888" },
                { emoji:"⛏️", label:"Dwarves earned", now:`${totalDwarves} total`, next:`+${dwarfsEarnedOnRebirth(lifeHours, prestige+1)} new dwarves`, color:"#ffcc44" },
              ].map(r => (
                <div key={r.label} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <span style={{ fontSize:18 }}>{r.emoji}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ color:"#ccaa66", fontSize:11 }}>{r.label}</div>
                    <div style={{ color:r.color, fontSize:12, fontWeight:700 }}>{r.now} → {r.next}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* The button — always visible, disabled until ready */}
            <button
              onClick={canPrestige ? doPrestige : undefined}
              style={{
                width:"100%", padding:"18px", borderRadius:12,
                background: canPrestige
                  ? "linear-gradient(135deg,#7c3aed,#a855f7)"
                  : "linear-gradient(135deg,#2a2040,#1e1830)",
                border: `2px solid ${canPrestige ? "#c084fc" : "#4a4060"}`,
                color: canPrestige ? "#f3e8ff" : "#6a5a88",
                fontSize:15, fontWeight:900, cursor:canPrestige?"pointer":"default",
                letterSpacing:1,
                boxShadow: canPrestige ? "0 0 30px #9333ea88" : "none",
                transition:"all 0.3s",
              }}
            >
              {canPrestige
                ? `✦ REINCARNATE NOW — ${totalRebirthMult.toFixed(2)}× total power`
                : onFinalTier ? `🔒 Fill the bar: ${fmt(totalXp)} / ${fmt(finalTierXpNeeded)} XP` : `🔒 Reach the Screaming Void Spear first`}
            </button>
          </div>
        )}

        {/* UPGRADES */}
        {tab==="upgrades" && (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ background:"#3a2e10", border:"1px solid #7a6220", borderRadius:10, padding:"10px 14px", marginBottom:4 }}>
              <div style={{ color:"#ffe880", fontWeight:700, fontSize:13 }}>⬆ Forge Upgrades — infinite levels</div>
              <div style={{ color:"#ccaa55", fontSize:11, marginTop:2 }}>
                Active: <span style={{color:"#ff8c35"}}>+{Math.round(tapBonus*100)}% XP/tap</span>
                {"  "}·{"  "}<span style={{color:"#ffcc44"}}>+{Math.round(heroBonus*100)}% hero ore</span>
                {"  "}·{"  "}<span style={{color:"#88cc44"}}>+{fmt(passiveOre)}/sec passive</span>
              </div>
            </div>
            {UPGRADE_DEFS.map(def => (
              <UpgradeCard key={def.id} def={def} level={upgradeLevels[def.id]||0} ore={ore} onBuy={buyUpgrade} heroBonus={heroBonus} passiveOre={passiveOre} tapBonus={tapBonus} qty={upgradeQty[def.id]||1} onSetQty={(q) => setUpgradeQty(prev => ({...prev, [def.id]: q}))} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<EmberForge />);
</script>
</body>
</html>
