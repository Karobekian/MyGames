<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karobekian / Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #2a2a2a;
      --accent:   #e82127; /* Tesla red */
      --text:     #f0f0f0;
      --muted:    #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    h1 span {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 20px auto 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 32px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-cta {
      margin-top: 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    footer {
      margin-top: 56px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <p class="wordmark">Karobekian</p>
    <h1>My <span>Games</span></h1>
    <div class="divider"></div>
  </header>

  <div class="grid">
    <a class="card" href="sudoku.html">
      <div class="card-icon">🔢</div>
      <div class="card-title">Sudoku</div>
      <div class="card-desc">Classic number puzzle. Fill the grid so every row, column, and box contains 1–9.</div>
      <div class="card-cta">Play →</div>
    </a>

    <a class="card" href="othello.html">
      <div class="card-icon">⚫</div>
      <div class="card-title">Othello</div>
      <div class="card-desc">Flip your opponent's pieces and control the board in this strategy classic.</div>
      <div class="card-cta">Play →</div>
    </a>
  </div>

  <footer>TAP TO PLAY</footer>

</body>
</html>
