<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PONG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    color: #e8e8f0;
  }

  #menu h1 {
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: 0.25em;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 0 60px rgba(120,120,255,0.2);
  }

  .mode-btn {
    background: transparent;
    border: 2px solid #4a4aaa;
    color: #c0c0ff;
    font-family: 'Courier New', monospace;
    font-size: clamp(14px, 3vw, 20px);
    letter-spacing: 0.15em;
    padding: 16px 40px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 260px;
    text-align: center;
    -webkit-appearance: none;
  }

  .mode-btn.selected {
    background: rgba(74, 74, 170, 0.4);
    border-color: #aaaaff;
    color: #ffffff;
    box-shadow: 0 0 20px rgba(120,120,255,0.5);
  }

  .hint {
    font-size: clamp(11px, 2vw, 14px);
    color: #555577;
    letter-spacing: 0.08em;
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
    padding: 0 20px;
  }

  #difficulty-row {
    display: flex;
    gap: 12px;
  }

  .diff-btn {
    background: transparent;
    border: 1px solid #333355;
    color: #666688;
    font-family: 'Courier New', monospace;
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 0.1em;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .diff-btn.selected {
    border-color: #7777cc;
    color: #aaaaee;
    background: rgba(60,60,120,0.3);
  }

  #gameWrap {
    display: none;
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
  }

  #pause-btn {
    pointer-events: all;
    background: transparent;
    border: 1px solid #333355;
    color: #555577;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .score {
    font-size: clamp(28px, 6vw, 52px);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
    min-width: 60px;
    text-align: center;
  }

  #center-hud {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #mode-label {
    font-size: clamp(9px, 1.5vw, 12px);
    color: #44446a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    touch-action: none;
  }

  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10,10,15,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 20;
  }

  #overlay.show { display: flex; }

  #overlay-title {
    font-size: clamp(24px, 5vw, 42px);
    color: #ffffff;
    letter-spacing: 0.2em;
  }

  #overlay-sub {
    font-size: clamp(13px, 2.5vw, 18px);
    color: #8888bb;
    letter-spacing: 0.1em;
    min-height: 1.5em;
  }

  .overlay-btn {
    background: transparent;
    border: 2px solid #4a4aaa;
    color: #c0c0ff;
    font-family: 'Courier New', monospace;
    font-size: clamp(13px, 2.5vw, 18px);
    letter-spacing: 0.15em;
    padding: 14px 36px;
    cursor: pointer;
    margin-top: 4px;
    min-width: 220px;
    text-align: center;
    -webkit-appearance: none;
  }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>PONG</h1>

  <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
    <button class="mode-btn selected" id="btn-vs-ai" onclick="selectMode('ai')">VS COMPUTER</button>
    <button class="mode-btn" id="btn-2p" onclick="selectMode('2p')">2 PLAYERS</button>
  </div>

  <div id="difficulty-row">
    <button class="diff-btn" id="diff-easy" onclick="selectDiff('easy')">EASY</button>
    <button class="diff-btn selected" id="diff-medium" onclick="selectDiff('medium')">MEDIUM</button>
    <button class="diff-btn" id="diff-hard" onclick="selectDiff('hard')">HARD</button>
  </div>

  <button class="mode-btn" style="margin-top:8px" onclick="startGame()">START GAME</button>

  <p class="hint" id="menu-hint">Touch your side of the screen to move your paddle. First to 7 wins.</p>
</div>

<!-- GAME -->
<div id="gameWrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="score" id="score-left">0</div>
    <div id="center-hud">
      <div id="mode-label">VS COMPUTER</div>
      <button id="pause-btn" onclick="togglePause()">PAUSE</button>
    </div>
    <div class="score" id="score-right">0</div>
  </div>

  <div id="overlay">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
    <button class="overlay-btn" id="overlay-continue" onclick="resumeOrNext()">CONTINUE</button>
    <button class="overlay-btn" onclick="goMenu()">MENU</button>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
var WIN_SCORE = 7;
var HUD_H = 60;

// ─── Game state ───────────────────────────────────────────────────────────────
var gameMode = 'ai';
var difficulty = 'medium';

var canvas, ctx, W, H;
var animId = null;
var isPaused = false;
var gameOver = false;
var waitingForNext = false;

var PADDLE_W, PADDLE_H, BALL_R, PADDLE_MARGIN;

var leftPaddle = null;
var rightPaddle = null;
var ball = null;
var scores = {left: 0, right: 0};

// Touch state
var touchLeft = null;
var touchRight = null;

// Mouse state (desktop)
var mouseDragging = null;

// ─── Menu ─────────────────────────────────────────────────────────────────────
function selectMode(m) {
  gameMode = m;
  document.getElementById('btn-vs-ai').className = 'mode-btn' + (m === 'ai' ? ' selected' : '');
  document.getElementById('btn-2p').className   = 'mode-btn' + (m === '2p' ? ' selected' : '');
  document.getElementById('difficulty-row').style.display = m === 'ai' ? 'flex' : 'none';
  document.getElementById('menu-hint').textContent = m === '2p'
    ? 'Left player uses left half, right player uses right half. First to ' + WIN_SCORE + ' wins.'
    : 'Touch your side to move your paddle. First to ' + WIN_SCORE + ' wins.';
}

function selectDiff(d) {
  difficulty = d;
  var names = ['easy','medium','hard'];
  for (var i = 0; i < names.length; i++) {
    document.getElementById('diff-' + names[i]).className = 'diff-btn' + (names[i] === d ? ' selected' : '');
  }
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  var gw = document.getElementById('gameWrap');
  gw.style.display = 'block';
  document.getElementById('mode-label').textContent = gameMode === '2p' ? '2 PLAYERS' : 'VS COMPUTER';

  if (animId) { cancelAnimationFrame(animId); animId = null; }

  initCanvas();
  scores = {left: 0, right: 0};
  updateScoreDisplay();
  initPaddles();
  spawnBall(1);

  isPaused = false;
  gameOver = false;
  waitingForNext = false;
  hideOverlay();

  document.getElementById('pause-btn').textContent = 'PAUSE';

  loop();
}

function goMenu() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  document.getElementById('gameWrap').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

// ─── Canvas / sizing ──────────────────────────────────────────────────────────
function initCanvas() {
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');

  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;

  var shorter   = Math.min(W, H);
  PADDLE_W      = Math.max(7,  Math.round(shorter * 0.014));
  PADDLE_H      = Math.max(50, Math.round(shorter * 0.13));
  BALL_R        = Math.max(7,  Math.round(shorter * 0.015));
  PADDLE_MARGIN = Math.round(W * 0.035);

  // Re-attach touch listeners fresh each time
  canvas.removeEventListener('touchstart', onTouchStart);
  canvas.removeEventListener('touchmove',  onTouchMove);
  canvas.removeEventListener('touchend',   onTouchEnd);
  canvas.removeEventListener('touchcancel',onTouchEnd);
  canvas.addEventListener('touchstart', onTouchStart, {passive: false});
  canvas.addEventListener('touchmove',  onTouchMove,  {passive: false});
  canvas.addEventListener('touchend',   onTouchEnd,   {passive: false});
  canvas.addEventListener('touchcancel',onTouchEnd,   {passive: false});
}

function initPaddles() {
  leftPaddle  = { x: PADDLE_MARGIN, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };
  rightPaddle = { x: W - PADDLE_MARGIN - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };
}

// ─── Ball ─────────────────────────────────────────────────────────────────────
function spawnBall(dirX) {
  var speeds = { easy: 0.007, medium: 0.009, hard: 0.012 };
  var spd = W * (speeds[difficulty] || 0.009);
  var angle = (Math.random() * 36 - 18) * Math.PI / 180;
  ball = {
    x:  W / 2,
    y:  HUD_H + (H - HUD_H) / 2,
    vx: dirX * spd * Math.cos(angle),
    vy: spd * Math.sin(angle),
    trail: []
  };
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function updateAI() {
  var speeds    = { easy: 0.005, medium: 0.007, hard: 0.011 };
  var reactions = { easy: 0.45,  medium: 0.70,  hard: 0.94  };
  var spd  = H * (speeds[difficulty]    || 0.007);
  var reac = reactions[difficulty] || 0.70;

  var target = ball.y - rightPaddle.h / 2;
  var diff   = (target - rightPaddle.y) * reac;
  var move   = Math.sign(diff) * Math.min(Math.abs(diff), spd);
  rightPaddle.y = clamp(rightPaddle.y + move, HUD_H, H - rightPaddle.h);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Trail
  ball.trail.push({x: ball.x, y: ball.y});
  if (ball.trail.length > 9) ball.trail.shift();

  // Top / bottom walls
  if (ball.y - BALL_R < HUD_H) {
    ball.y  = HUD_H + BALL_R;
    ball.vy = Math.abs(ball.vy);
  }
  if (ball.y + BALL_R > H) {
    ball.y  = H - BALL_R;
    ball.vy = -Math.abs(ball.vy);
  }

  // Paddle collisions
  if (hitPaddle(leftPaddle)) {
    ball.vx = Math.abs(ball.vx) * 1.04;
    ball.vy = deflect(leftPaddle);
    ball.x  = leftPaddle.x + leftPaddle.w + BALL_R + 1;
    limitSpeed();
  }
  if (hitPaddle(rightPaddle)) {
    ball.vx = -Math.abs(ball.vx) * 1.04;
    ball.vy = deflect(rightPaddle);
    ball.x  = rightPaddle.x - BALL_R - 1;
    limitSpeed();
  }

  // Scoring
  if (ball.x + BALL_R < 0) {
    score('right');
    return;
  }
  if (ball.x - BALL_R > W) {
    score('left');
    return;
  }

  // AI move
  if (gameMode === 'ai') updateAI();
}

function hitPaddle(p) {
  return ball.x - BALL_R < p.x + p.w &&
         ball.x + BALL_R > p.x &&
         ball.y - BALL_R < p.y + p.h &&
         ball.y + BALL_R > p.y;
}

function deflect(p) {
  var rel = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
  return Math.sin(clamp(rel, -1, 1) * 60 * Math.PI / 180) * Math.abs(ball.vx);
}

function limitSpeed() {
  var max = W * 0.020;
  var spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (spd > max) { ball.vx = ball.vx / spd * max; ball.vy = ball.vy / spd * max; }
}

function score(side) {
  scores[side]++;
  updateScoreDisplay();
  if (scores[side] >= WIN_SCORE) {
    gameOver = true;
    var title = side === 'left'
      ? (gameMode === '2p' ? 'LEFT WINS' : 'YOU WIN')
      : (gameMode === '2p' ? 'RIGHT WINS' : 'COMPUTER WINS');
    showOverlay(title, scores.left + '  —  ' + scores.right, 'PLAY AGAIN');
  } else {
    waitingForNext = true;
    initPaddles();
    spawnBall(side === 'left' ? -1 : 1);
    showOverlay('POINT', scores.left + '  —  ' + scores.right, 'NEXT POINT');
  }
}

function updateScoreDisplay() {
  document.getElementById('score-left').textContent  = scores.left;
  document.getElementById('score-right').textContent = scores.right;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Field background
  ctx.fillStyle = '#090912';
  ctx.fillRect(0, HUD_H, W, H - HUD_H);

  // Center line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 18]);
  ctx.beginPath();
  ctx.moveTo(W/2, HUD_H);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.restore();

  // HUD separator
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, HUD_H - 1, W, 1);

  if (!ball) return;

  // Ball trail
  for (var i = 0; i < ball.trail.length; i++) {
    var t = ball.trail[i];
    var frac = i / ball.trail.length;
    ctx.beginPath();
    ctx.arc(t.x, t.y, BALL_R * frac * 0.75, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(140,140,255,' + (frac * 0.22) + ')';
    ctx.fill();
  }

  // Ball
  var bg = ctx.createRadialGradient(ball.x - BALL_R*0.3, ball.y - BALL_R*0.3, 0, ball.x, ball.y, BALL_R * 1.2);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(0.6, '#c8c8ff');
  bg.addColorStop(1, 'rgba(80,80,200,0)');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();

  // Ball glow
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R * 2.8, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(110,110,255,0.07)';
  ctx.fill();

  // Paddles
  drawPaddle(leftPaddle,  '#5566ff', '#8899ff');
  drawPaddle(rightPaddle, '#ff4455', '#ff8899');
}

function drawPaddle(p, dark, light) {
  var r = Math.min(p.w / 2, 6);

  // Glow halo
  ctx.beginPath();
  rr(p.x - 10, p.y - 10, p.w + 20, p.h + 20, r + 6);
  ctx.fillStyle = dark + '20';
  ctx.fill();

  // Body gradient
  var g = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
  g.addColorStop(0, light);
  g.addColorStop(1, dark);
  ctx.beginPath();
  rr(p.x, p.y, p.w, p.h, r);
  ctx.fillStyle = g;
  ctx.fill();

  // Top shine
  ctx.beginPath();
  rr(p.x, p.y, p.w, p.h * 0.38, r);
  ctx.fillStyle = 'rgba(255,255,255,0.20)';
  ctx.fill();
}

function rr(x, y, w, h, r) {
  // inline roundRect for ES5 compat
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if (!isPaused && !waitingForNext && !gameOver) {
    update();
  }
  draw();
  animId = requestAnimationFrame(loop);
}

// ─── Touch ────────────────────────────────────────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var side = t.clientX < W / 2 ? 'left' : 'right';
    if (side === 'left')  touchLeft  = {id: t.identifier, lastY: t.clientY};
    if (side === 'right') touchRight = {id: t.identifier, lastY: t.clientY};
  }
}

function onTouchMove(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (touchLeft && t.identifier === touchLeft.id && leftPaddle) {
      var dy = t.clientY - touchLeft.lastY;
      leftPaddle.y = clamp(leftPaddle.y + dy, HUD_H, H - leftPaddle.h);
      touchLeft.lastY = t.clientY;
    }
    if (touchRight && t.identifier === touchRight.id && rightPaddle && gameMode === '2p') {
      var dy2 = t.clientY - touchRight.lastY;
      rightPaddle.y = clamp(rightPaddle.y + dy2, HUD_H, H - rightPaddle.h);
      touchRight.lastY = t.clientY;
    }
  }
}

function onTouchEnd(e) {
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (touchLeft  && t.identifier === touchLeft.id)  touchLeft  = null;
    if (touchRight && t.identifier === touchRight.id) touchRight = null;
  }
}

// ─── Mouse (desktop) ─────────────────────────────────────────────────────────
document.addEventListener('mousedown', function(e) {
  if (!canvas) return;
  mouseDragging = e.clientX < W / 2 ? 'left' : 'right';
});
document.addEventListener('mousemove', function(e) {
  if (!mouseDragging || isPaused || !leftPaddle) return;
  if (mouseDragging === 'left') {
    leftPaddle.y = clamp(e.clientY - leftPaddle.h / 2, HUD_H, H - leftPaddle.h);
  } else if (mouseDragging === 'right' && gameMode === '2p' && rightPaddle) {
    rightPaddle.y = clamp(e.clientY - rightPaddle.h / 2, HUD_H, H - rightPaddle.h);
  }
});
document.addEventListener('mouseup', function() { mouseDragging = null; });

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (!leftPaddle) return;
  var spd = H ? H * 0.025 : 20;
  if (e.key === 'Escape' || e.key === 'p') { togglePause(); return; }
  if (e.key === 'w' || e.key === 'W') leftPaddle.y = clamp(leftPaddle.y - spd, HUD_H, H - leftPaddle.h);
  if (e.key === 's' || e.key === 'S') leftPaddle.y = clamp(leftPaddle.y + spd, HUD_H, H - leftPaddle.h);
  if (gameMode === '2p' && rightPaddle) {
    if (e.key === 'ArrowUp')   rightPaddle.y = clamp(rightPaddle.y - spd, HUD_H, H - rightPaddle.h);
    if (e.key === 'ArrowDown') rightPaddle.y = clamp(rightPaddle.y + spd, HUD_H, H - rightPaddle.h);
  }
});

// ─── Pause / overlay ─────────────────────────────────────────────────────────
function togglePause() {
  if (gameOver || waitingForNext) return;
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? 'RESUME' : 'PAUSE';
  if (isPaused) showOverlay('PAUSED', '', 'RESUME');
  else hideOverlay();
}

function resumeOrNext() {
  if (gameOver) {
    scores = {left: 0, right: 0};
    updateScoreDisplay();
    initPaddles();
    spawnBall(1);
    gameOver = false;
    waitingForNext = false;
  } else if (waitingForNext) {
    waitingForNext = false;
  } else {
    isPaused = false;
    document.getElementById('pause-btn').textContent = 'PAUSE';
  }
  hideOverlay();
}

function showOverlay(title, sub, btnLabel) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
  document.getElementById('overlay-continue').textContent = btnLabel;
  document.getElementById('overlay').className = 'show';
}

function hideOverlay() {
  document.getElementById('overlay').className = '';
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  if (document.getElementById('gameWrap').style.display !== 'none') {
    initCanvas();
    initPaddles();
    if (ball) { ball.x = W/2; ball.y = HUD_H + (H-HUD_H)/2; ball.trail = []; }
  }
});

// ─── Utilities ────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

// ─── Init menu ────────────────────────────────────────────────────────────────
selectMode('ai');
selectDiff('medium');
</script>
</body>
</html>
