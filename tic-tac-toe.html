<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --accent: #e82127; --text: #f0f0f0; --muted: #666;
    --x: #e82127; --o: #f5c518;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 20px; gap: 24px; }
  header { text-align: center; }
  .wordmark { font-size: 10px; font-weight: 600; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .status { font-size: 13px; color: var(--muted); letter-spacing: 0.1em;
    text-transform: uppercase; min-height: 20px; text-align: center; }
  .x-text { color: var(--x); font-weight: 600; }
  .o-text { color: var(--o); font-weight: 600; }
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px; }
  .cell { width: clamp(80px, 22vw, 140px); height: clamp(80px, 22vw, 140px);
    background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(36px, 10vw, 64px); font-weight: 300; cursor: pointer;
    transition: background 0.15s; user-select: none; }
  .cell:hover:not(.taken) { background: #1a1a1a; }
  .cell.taken { cursor: default; }
  .cell.x { color: var(--x); }
  .cell.o { color: var(--o); }
  .cell.win { background: #1e1010; border-color: var(--accent); }
  .cell.o.win { background: #1e1a00; border-color: var(--o); }
  .scores { display: flex; gap: 32px; }
  .score-box { text-align: center; }
  .score-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .score-val { font-size: 28px; font-weight: 300; }
  .score-val.x { color: var(--x); }
  .score-val.o { color: var(--o); }
  .controls { display: flex; gap: 12px; }
  button { background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; padding: 10px 20px;
    border-radius: 2px; cursor: pointer; transition: border-color 0.2s; }
  button:hover { border-color: #555; }
  .back { color: var(--muted); text-decoration: none; font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase; }
</style>
</head>
<body>
<header>
  <p class="wordmark">Karobekian</p>
  <h1>Tic Tac <span>Toe</span></h1>
</header>

<div class="scores">
  <div class="score-box">
    <div class="score-label">X</div>
    <div class="score-val x" id="scoreX">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Draws</div>
    <div class="score-val" style="color:var(--muted)" id="scoreD">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">O</div>
    <div class="score-val o" id="scoreO">0</div>
  </div>
</div>

<div id="status" class="status"></div>

<div class="board" id="board"></div>

<div class="controls">
  <button onclick="resetGame()">New Round</button>
</div>
<a class="back" href="index.html">← All Games</a>

<script>
  let cells, currentPlayer, gameOver;
  let scores = { X: 0, O: 0, D: 0 };
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function resetGame() {
    cells = Array(9).fill('');
    currentPlayer = 'X';
    gameOver = false;
    render();
    setStatus();
  }

  function setStatus(result) {
    const el = document.getElementById('status');
    if (result === 'draw') { el.innerHTML = "It's a draw"; return; }
    if (result) { el.innerHTML = `<span class="${result.toLowerCase()}-text">${result}</span> wins!`; return; }
    el.innerHTML = `<span class="${currentPlayer.toLowerCase()}-text">${currentPlayer}</span>'s turn`;
  }

  function play(i) {
    if (gameOver || cells[i]) return;
    cells[i] = currentPlayer;
    const winLine = checkWin();
    render(winLine);
    if (winLine) {
      gameOver = true; scores[currentPlayer]++;
      updateScores(); setStatus(currentPlayer); return;
    }
    if (cells.every(c => c)) {
      gameOver = true; scores.D++;
      updateScores(); setStatus('draw'); return;
    }
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    setStatus();
  }

  function checkWin() {
    for (const [a,b,c] of wins) {
      if (cells[a] && cells[a] === cells[b] && cells[b] === cells[c]) return [a,b,c];
    }
    return null;
  }

  function updateScores() {
    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreD').textContent = scores.D;
  }

  function render(winLine) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    const winSet = new Set(winLine || []);
    cells.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '') + (winSet.has(i) ? ' win' : '');
      cell.textContent = val;
      if (!val && !gameOver) cell.onclick = () => play(i);
      board.appendChild(cell);
    });
  }

  resetGame();
</script>
</body>
</html>
